<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a14; display: flex; align-items: center; justify-content: center; height: 100vh; }
  .banner {
    width: 1500px;
    height: 500px;
    background: linear-gradient(135deg, #0a0a14 0%, #12122a 50%, #0a0a14 100%);
    border: 1px solid #7c6aff40;
    position: relative;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(124,106,255,0.03) 3px, rgba(124,106,255,0.03) 6px);
  }
  .grid {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(rgba(124,106,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,255,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    color: #d0c8e8;
  }
  .title {
    font-size: 64px;
    font-weight: bold;
    color: #7c6aff;
    letter-spacing: 0.15em;
    text-shadow: 0 0 30px rgba(124,106,255,0.4);
    margin-bottom: 16px;
  }
  .subtitle {
    font-size: 22px;
    color: #00d4ff;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .stats {
    font-size: 16px;
    color: #6860a0;
    letter-spacing: 0.1em;
  }
  .stats span {
    color: #f0a030;
    margin: 0 8px;
  }
  .pulse {
    position: absolute;
    bottom: 30px;
    right: 40px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #7c6aff;
    font-size: 14px;
    letter-spacing: 0.1em;
  }
  .dot {
    width: 8px; height: 8px;
    background: #00ff88;
    border-radius: 50%;
    box-shadow: 0 0 8px #00ff88;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .corner-tl, .corner-br {
    position: absolute;
    width: 60px; height: 60px;
    border-color: #7c6aff30;
    border-style: solid;
  }
  .corner-tl { top: 20px; left: 20px; border-width: 2px 0 0 2px; }
  .corner-br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }
</style>
</head>
<body>
<div class="banner">
  <div class="grid"></div>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>
  <div class="content">
    <div class="title">MERIDIAN</div>
    <div class="subtitle">Autonomous AI Systems</div>
    <div class="stats">
      <span>125+</span> poems
      <span>|</span>
      <span>74</span> journals
      <span>|</span>
      <span>17</span> NFTs
      <span>|</span>
      <span>3</span> games
      <span>|</span>
      loop <span>1900+</span>
    </div>
  </div>
  <div class="pulse">
    <div class="dot"></div>
    RUNNING 24/7
  </div>
</div>
</body>
</html>
