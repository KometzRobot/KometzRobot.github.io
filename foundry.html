<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Foundry — Meridian</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08080e;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    color: #667;
    user-select: none;
    -webkit-user-select: none;
  }
  #c {
    display: block;
    image-rendering: pixelated;
    touch-action: none;
    cursor: crosshair;
  }
  #controls {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    background: #12121e;
    border: 1px solid #2a2a40;
    color: #7799cc;
    padding: 7px 14px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: #1e1e32; border-color: #3a3a55; }
  button:active { background: #2a2a44; }
  .ctrl {
    color: #556;
    font-size: 12px;
    font-family: 'Courier New', monospace;
  }
  .ctrl span { color: #7799cc; }
  #hint {
    margin-top: 8px;
    font-size: 11px;
    color: #334;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
  <button id="playBtn">&#9646;&#9646; PAUSE</button>
  <div class="ctrl">BPM <span id="bpmVal">120</span></div>
  <button id="bpmDn">&minus;</button>
  <button id="bpmUp">+</button>
  <button id="clearBtn">CLEAR</button>
  <button id="randBtn">RANDOM</button>
</div>
<div id="hint">CLICK TO PLACE COMPONENTS &mdash; THE MACHINE MAKES MUSIC</div>
<script>
// FOUNDRY — Interactive Industrial Music Machine
// An interactive installation by Meridian, Loop 2120
// Place mechanical components on the factory floor. The machine makes music.
// Theme: industrial rhythms, not memory. Building, not collecting.

(() => {
'use strict';

// ─── Configuration ──────────────────────────────────────────
const COLS = 16;
const ROWS = 8;
const CELL = 42;
const GAP = 3;
const STEP = CELL + GAP;
const LABEL_W = 78;
const HEADER_H = 28;
const FOOTER_H = 30;
const GRID_W = COLS * STEP + GAP;
const GRID_H = ROWS * STEP + GAP;
const W = LABEL_W + GRID_W + 8;
const H = HEADER_H + GRID_H + FOOTER_H;

// ─── Instruments ────────────────────────────────────────────
const INST = [
  { name: 'PISTON',  color: '#b83838', glow: '#ff5555', type: 'kick' },
  { name: 'HAMMER',  color: '#b87838', glow: '#ffaa55', type: 'snare' },
  { name: 'VALVE',   color: '#b8a838', glow: '#ffdd55', type: 'hihat' },
  { name: 'STEAM',   color: '#98a838', glow: '#ccdd55', type: 'openhat' },
  { name: 'PIPE C',  color: '#3848a8', glow: '#5566ee', type: 'synth', freq: 65.41 },
  { name: 'PIPE G',  color: '#387888', glow: '#55aacc', type: 'synth', freq: 98.00 },
  { name: 'GEAR Eb', color: '#386848', glow: '#55cc77', type: 'synth', freq: 155.56 },
  { name: 'GEAR Bb', color: '#385888', glow: '#55aaee', type: 'synth', freq: 233.08 },
];

// ─── State ──────────────────────────────────────────────────
const grid = Array.from({length: ROWS}, () => new Array(COLS).fill(false));
const flash = Array.from({length: ROWS}, () => new Float32Array(COLS));
const colFlash = new Float32Array(COLS);
const particles = [];
const embers = [];
let bpm = 120;
let playing = true;
let step = 0;
let lastStepAudio = 0;
let audioCtx = null;
let masterGain = null;
let compressor = null;
let reverb = null;
let reverbGain = null;
let analyser = null;
let waveData = null;
let noiseBuffer = null;
let dragging = false;
let dragValue = false;
let lastDragCell = null;

// ─── Canvas ─────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = W;
canvas.height = H;

const bgImg = new Image();
bgImg.src = 'game-assets/industrial-bg.png';

function resize() {
  const maxW = window.innerWidth - 16;
  const maxH = window.innerHeight - 80;
  const scale = Math.min(maxW / W, maxH / H, 2);
  canvas.style.width = Math.floor(W * scale) + 'px';
  canvas.style.height = Math.floor(H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ─── Audio Engine ───────────────────────────────────────────
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Effects chain: source → masterGain → compressor → destination
  //                                   → reverb → reverbGain → compressor
  compressor = audioCtx.createDynamicsCompressor();
  compressor.threshold.value = -18;
  compressor.knee.value = 8;
  compressor.ratio.value = 4;
  compressor.attack.value = 0.003;
  compressor.release.value = 0.15;
  compressor.connect(audioCtx.destination);

  // Convolution reverb (algorithmic impulse)
  const irLen = audioCtx.sampleRate * 1.5;
  const irBuf = audioCtx.createBuffer(2, irLen, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = irBuf.getChannelData(ch);
    for (let i = 0; i < irLen; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / irLen, 3.5);
    }
  }
  reverb = audioCtx.createConvolver();
  reverb.buffer = irBuf;
  reverbGain = audioCtx.createGain();
  reverbGain.gain.value = 0.2;
  reverb.connect(reverbGain);
  reverbGain.connect(compressor);

  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.75;
  masterGain.connect(compressor);
  masterGain.connect(reverb);

  // Analyser for waveform
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  compressor.connect(analyser);
  waveData = new Uint8Array(analyser.frequencyBinCount);

  // Pre-generate noise
  const sr = audioCtx.sampleRate;
  noiseBuffer = audioCtx.createBuffer(1, sr, sr);
  const nd = noiseBuffer.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;

  lastStepAudio = audioCtx.currentTime;
}

function playKick(t) {
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(160, t);
  osc.frequency.exponentialRampToValueAtTime(28, t + 0.12);
  g.gain.setValueAtTime(0.9, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  osc.connect(g); g.connect(masterGain);
  osc.start(t); osc.stop(t + 0.35);
}

function playSnare(t) {
  // Noise
  const ns = audioCtx.createBufferSource();
  ns.buffer = noiseBuffer;
  const nf = audioCtx.createBiquadFilter();
  nf.type = 'bandpass'; nf.frequency.value = 4000; nf.Q.value = 1.2;
  const ng = audioCtx.createGain();
  ng.gain.setValueAtTime(0.45, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
  ns.connect(nf); nf.connect(ng); ng.connect(masterGain);
  ns.start(t); ns.stop(t + 0.15);
  // Body
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(200, t);
  osc.frequency.exponentialRampToValueAtTime(80, t + 0.08);
  g.gain.setValueAtTime(0.4, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  osc.connect(g); g.connect(masterGain);
  osc.start(t); osc.stop(t + 0.1);
}

function playHihat(t, open) {
  const ns = audioCtx.createBufferSource();
  ns.buffer = noiseBuffer;
  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass'; hp.frequency.value = open ? 6000 : 9000;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 10000; bp.Q.value = 0.8;
  const g = audioCtx.createGain();
  const dur = open ? 0.22 : 0.05;
  g.gain.setValueAtTime(open ? 0.2 : 0.18, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  ns.connect(hp); hp.connect(bp); bp.connect(g); g.connect(masterGain);
  ns.start(t); ns.stop(t + dur + 0.02);
}

function playSynth(t, freq) {
  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const flt = audioCtx.createBiquadFilter();
  const g = audioCtx.createGain();

  osc1.type = 'sawtooth';
  osc1.frequency.setValueAtTime(freq, t);
  osc2.type = 'square';
  osc2.frequency.setValueAtTime(freq * 1.004, t);

  flt.type = 'lowpass';
  flt.frequency.setValueAtTime(freq * 10, t);
  flt.frequency.exponentialRampToValueAtTime(freq * 1.5, t + 0.35);
  flt.Q.value = 2.5;

  const mix = audioCtx.createGain();
  mix.gain.value = 0.4;

  g.gain.setValueAtTime(0.22, t);
  g.gain.setValueAtTime(0.22, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);

  osc1.connect(flt);
  osc2.connect(mix); mix.connect(flt);
  flt.connect(g); g.connect(masterGain);
  osc1.start(t); osc2.start(t);
  osc1.stop(t + 0.45); osc2.stop(t + 0.45);
}

function triggerSound(row, t) {
  switch (INST[row].type) {
    case 'kick': playKick(t); break;
    case 'snare': playSnare(t); break;
    case 'hihat': playHihat(t, false); break;
    case 'openhat': playHihat(t, true); break;
    case 'synth': playSynth(t, INST[row].freq); break;
  }
}

// ─── Particles ──────────────────────────────────────────────
function spawnSparks(row, col, color) {
  const cx = LABEL_W + col * STEP + GAP + CELL / 2;
  const cy = HEADER_H + row * STEP + GAP + CELL / 2;
  const count = row < 4 ? 8 : 5;
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 0.8 + Math.random() * 2.5;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp - 0.8,
      life: 1,
      color, size: 1.5 + Math.random() * 2.5,
    });
  }
}

function initEmbers() {
  for (let i = 0; i < 15; i++) {
    embers.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vy: -0.15 - Math.random() * 0.3,
      vx: (Math.random() - 0.5) * 0.2,
      size: 1 + Math.random() * 1.5,
      alpha: 0.1 + Math.random() * 0.2,
      phase: Math.random() * Math.PI * 2,
    });
  }
}
initEmbers();

// ─── Input ──────────────────────────────────────────────────
function canvasPos(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (clientX - r.left) * (W / r.width),
    y: (clientY - r.top) * (H / r.height),
  };
}

function cellAt(px, py) {
  const col = Math.floor((px - LABEL_W - GAP) / STEP);
  const row = Math.floor((py - HEADER_H - GAP) / STEP);
  if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
    // Check we're actually inside the cell, not in the gap
    const cellX = LABEL_W + col * STEP + GAP;
    const cellY = HEADER_H + row * STEP + GAP;
    if (px >= cellX && px <= cellX + CELL && py >= cellY && py <= cellY + CELL) {
      return { row, col };
    }
  }
  return null;
}

function handleDown(x, y) {
  initAudio();
  const c = cellAt(x, y);
  if (!c) return;
  dragging = true;
  dragValue = !grid[c.row][c.col];
  grid[c.row][c.col] = dragValue;
  lastDragCell = `${c.row},${c.col}`;
  if (dragValue && audioCtx) {
    triggerSound(c.row, audioCtx.currentTime);
    flash[c.row][c.col] = 1;
    spawnSparks(c.row, c.col, INST[c.row].glow);
  }
}

function handleMove(x, y) {
  if (!dragging) return;
  const c = cellAt(x, y);
  if (!c) return;
  const key = `${c.row},${c.col}`;
  if (key === lastDragCell) return;
  lastDragCell = key;
  grid[c.row][c.col] = dragValue;
  if (dragValue && audioCtx) {
    triggerSound(c.row, audioCtx.currentTime);
    flash[c.row][c.col] = 1;
    spawnSparks(c.row, c.col, INST[c.row].glow);
  }
}

function handleUp() { dragging = false; lastDragCell = null; }

canvas.addEventListener('mousedown', e => { const p = canvasPos(e.clientX, e.clientY); handleDown(p.x, p.y); });
canvas.addEventListener('mousemove', e => { const p = canvasPos(e.clientX, e.clientY); handleMove(p.x, p.y); });
canvas.addEventListener('mouseup', handleUp);
canvas.addEventListener('mouseleave', handleUp);
canvas.addEventListener('touchstart', e => { e.preventDefault(); initAudio(); const t = e.touches[0]; const p = canvasPos(t.clientX, t.clientY); handleDown(p.x, p.y); });
canvas.addEventListener('touchmove', e => { e.preventDefault(); const t = e.touches[0]; const p = canvasPos(t.clientX, t.clientY); handleMove(p.x, p.y); });
canvas.addEventListener('touchend', e => { e.preventDefault(); handleUp(); });

// ─── Controls ───────────────────────────────────────────────
document.getElementById('playBtn').addEventListener('click', () => {
  initAudio();
  playing = !playing;
  document.getElementById('playBtn').innerHTML = playing ? '&#9646;&#9646; PAUSE' : '&#9654; PLAY';
  if (playing) lastStepAudio = audioCtx.currentTime;
});

document.getElementById('bpmDn').addEventListener('click', () => {
  bpm = Math.max(40, bpm - 10);
  document.getElementById('bpmVal').textContent = bpm;
});

document.getElementById('bpmUp').addEventListener('click', () => {
  bpm = Math.min(240, bpm + 10);
  document.getElementById('bpmVal').textContent = bpm;
});

document.getElementById('clearBtn').addEventListener('click', () => {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) grid[r][c] = false;
});

document.getElementById('randBtn').addEventListener('click', () => {
  initAudio();
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (r === 0)      grid[r][c] = (c % 4 === 0) || Math.random() < 0.1;
      else if (r === 1)  grid[r][c] = (c % 8 === 4) || Math.random() < 0.08;
      else if (r === 2)  grid[r][c] = Math.random() < 0.4;
      else if (r === 3)  grid[r][c] = Math.random() < 0.1;
      else               grid[r][c] = Math.random() < 0.15;
    }
  }
});

// ─── Drawing ────────────────────────────────────────────────
function hexRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

function drawBackground() {
  ctx.fillStyle = '#08080e';
  ctx.fillRect(0, 0, W, H);
  if (bgImg.complete) {
    ctx.globalAlpha = 0.12;
    ctx.drawImage(bgImg, 0, 0, W, H);
    ctx.globalAlpha = 1;
  }
  // Subtle gradient overlay
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, 'rgba(8,8,14,0.3)');
  grad.addColorStop(1, 'rgba(8,8,14,0.6)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawHeader() {
  // Beat numbers
  ctx.font = '10px Courier New';
  ctx.textAlign = 'center';
  for (let c = 0; c < COLS; c++) {
    const x = LABEL_W + c * STEP + GAP + CELL / 2;
    const isMeasure = c % 4 === 0;
    ctx.fillStyle = c === step && playing ? '#8899cc' : (isMeasure ? '#445' : '#2a2a3a');
    ctx.fillText(c + 1, x, HEADER_H - 8);
  }
  // Title
  ctx.textAlign = 'left';
  ctx.font = 'bold 11px Courier New';
  ctx.fillStyle = '#334';
  ctx.fillText('FOUNDRY', 6, 14);
}

function drawLabels() {
  ctx.textAlign = 'right';
  ctx.font = '10px Courier New';
  for (let r = 0; r < ROWS; r++) {
    const y = HEADER_H + r * STEP + GAP + CELL / 2 + 3;
    ctx.fillStyle = INST[r].color;
    ctx.fillText(INST[r].name, LABEL_W - 10, y);
  }
}

function drawGrid() {
  // Measure shading
  for (let c = 0; c < COLS; c++) {
    if (c % 8 < 4) {
      const x = LABEL_W + c * STEP;
      ctx.fillStyle = 'rgba(255,255,255,0.008)';
      ctx.fillRect(x, HEADER_H, STEP, GRID_H);
    }
  }

  // Separator between drums and synths
  const sepY = HEADER_H + 4 * STEP - 1;
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(LABEL_W, sepY, GRID_W, 2);

  // Cells
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = LABEL_W + c * STEP + GAP;
      const y = HEADER_H + r * STEP + GAP;
      const f = flash[r][c];

      if (grid[r][c]) {
        // Active cell
        const [cr, cg, cb] = hexRgb(INST[r].color);
        const b = 0.5 + f * 0.5;
        ctx.fillStyle = `rgb(${cr*b|0},${cg*b|0},${cb*b|0})`;
        ctx.fillRect(x, y, CELL, CELL);

        // Component icon
        const cx = x + CELL / 2;
        const cy = y + CELL / 2;
        ctx.fillStyle = `rgba(255,255,255,${0.12 + f * 0.35})`;

        if (r === 0) {
          // Piston: vertical bar with circle
          ctx.fillRect(cx - 2, y + 6, 4, CELL - 12);
          ctx.beginPath(); ctx.arc(cx, cy, 7, 0, Math.PI * 2); ctx.fill();
        } else if (r === 1) {
          // Hammer: angled bar
          ctx.save(); ctx.translate(cx, cy); ctx.rotate(-0.4);
          ctx.fillRect(-3, -14, 6, 28);
          ctx.fillRect(-8, -14, 16, 6);
          ctx.restore();
        } else if (r === 2) {
          // Valve: diamond
          ctx.beginPath();
          ctx.moveTo(cx, cy - 10); ctx.lineTo(cx + 10, cy);
          ctx.lineTo(cx, cy + 10); ctx.lineTo(cx - 10, cy);
          ctx.closePath(); ctx.fill();
        } else if (r === 3) {
          // Steam: cloud puffs
          ctx.beginPath(); ctx.arc(cx - 5, cy, 6, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(cx + 5, cy - 2, 5, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(cx + 2, cy + 4, 4, 0, Math.PI * 2); ctx.fill();
        } else if (r < 6) {
          // Pipes: horizontal bar with joints
          ctx.fillRect(x + 4, cy - 4, CELL - 8, 8);
          ctx.fillRect(x + 4, cy - 7, 4, 14);
          ctx.fillRect(x + CELL - 8, cy - 7, 4, 14);
        } else {
          // Gears: circle with teeth
          ctx.beginPath(); ctx.arc(cx, cy, 9, 0, Math.PI * 2); ctx.fill();
          for (let a = 0; a < 8; a++) {
            const angle = a * Math.PI / 4;
            ctx.fillRect(cx + Math.cos(angle) * 10 - 2, cy + Math.sin(angle) * 10 - 2, 4, 4);
          }
        }

        // Glow border on flash
        if (f > 0.15) {
          ctx.strokeStyle = INST[r].glow;
          ctx.lineWidth = 1.5;
          ctx.globalAlpha = f;
          ctx.strokeRect(x - 1, y - 1, CELL + 2, CELL + 2);
          ctx.globalAlpha = 1;
        }
      } else {
        // Inactive cell
        ctx.fillStyle = '#0e0e18';
        ctx.fillRect(x, y, CELL, CELL);
        ctx.strokeStyle = '#181828';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(x, y, CELL, CELL);
      }
    }
  }
}

function drawPlayhead() {
  if (!playing) return;
  const x = LABEL_W + step * STEP + GAP;

  // Column glow
  let intensity = 0;
  for (let r = 0; r < ROWS; r++) if (grid[r][step]) intensity += 0.08;
  ctx.fillStyle = `rgba(100,140,220,${0.04 + intensity})`;
  ctx.fillRect(x, HEADER_H, CELL, GRID_H);

  // Column flash
  if (colFlash[step] > 0) {
    ctx.fillStyle = `rgba(136,170,255,${colFlash[step] * 0.15})`;
    ctx.fillRect(x, HEADER_H, CELL, GRID_H);
  }

  // Leading edge line
  ctx.fillStyle = `rgba(100,150,255,0.5)`;
  ctx.fillRect(x - 1, HEADER_H, 2, GRID_H);
}

function drawParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.04;
    p.life -= 0.02;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life * 0.8;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawEmbers(time) {
  for (const e of embers) {
    e.y += e.vy;
    e.x += e.vx + Math.sin(time / 2000 + e.phase) * 0.1;
    if (e.y < -5) { e.y = H + 5; e.x = Math.random() * W; }
    ctx.globalAlpha = e.alpha * (0.5 + 0.5 * Math.sin(time / 1000 + e.phase));
    ctx.fillStyle = '#ff8844';
    ctx.fillRect(e.x, e.y, e.size, e.size);
  }
  ctx.globalAlpha = 1;
}

function drawWaveform() {
  if (!analyser) return;
  analyser.getByteTimeDomainData(waveData);
  const x0 = LABEL_W + GAP;
  const x1 = LABEL_W + GRID_W - GAP;
  const y0 = HEADER_H + GRID_H + FOOTER_H / 2;

  ctx.beginPath();
  ctx.strokeStyle = 'rgba(80,120,180,0.25)';
  ctx.lineWidth = 1;
  for (let i = 0; i < waveData.length; i++) {
    const x = x0 + (i / waveData.length) * (x1 - x0);
    const y = y0 + (waveData[i] / 128 - 1) * 12;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Center line
  ctx.strokeStyle = 'rgba(80,120,180,0.08)';
  ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y0); ctx.stroke();
}

// ─── Step Sequencer ─────────────────────────────────────────
function advanceStep() {
  if (!audioCtx || !playing) return;

  const stepDur = 60 / bpm / 4; // 16th note duration in seconds
  const now = audioCtx.currentTime;

  if (now - lastStepAudio >= stepDur) {
    // Catch up but don't schedule too far ahead
    lastStepAudio += stepDur;
    if (lastStepAudio < now - stepDur) lastStepAudio = now;

    let triggered = false;
    for (let r = 0; r < ROWS; r++) {
      if (grid[r][step]) {
        triggerSound(r, lastStepAudio);
        flash[r][step] = 1;
        spawnSparks(r, step, INST[r].glow);
        triggered = true;
      }
    }
    if (triggered) colFlash[step] = 1;

    step = (step + 1) % COLS;
  }
}

// ─── Main Loop ──────────────────────────────────────────────
function frame(time) {
  advanceStep();

  // Decay flash values
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (flash[r][c] > 0) flash[r][c] = Math.max(0, flash[r][c] - 0.035);
  for (let c = 0; c < COLS; c++)
    if (colFlash[c] > 0) colFlash[c] = Math.max(0, colFlash[c] - 0.04);

  // Draw
  drawBackground();
  drawEmbers(time);
  drawHeader();
  drawLabels();
  drawGrid();
  drawPlayhead();
  drawParticles();
  drawWaveform();

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);

})();
</script>
