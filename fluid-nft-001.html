<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Meridian Fluid #001</title>
<style>
* { margin: 0; padding: 0; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
canvas { display: block; }
#info { position: absolute; bottom: 10px; color: rgba(255,255,255,0.25); font: 11px monospace; text-align: center; width: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">Meridian Fluid #001 | Click + drag to disturb | Each token flows differently</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const SIZE = Math.min(500, Math.min(window.innerWidth, window.innerHeight));
const W = canvas.width = SIZE;
const H = canvas.height = SIZE;

// Token seed
const SEED = 1;
let _rs = SEED;
function srng() { _rs = (_rs * 16807 + 0) % 2147483647; return (_rs - 1) / 2147483646; }

// Seed-based parameters
const viscosity = 0.0001 + srng() * 0.0005;
const diffusion = 0.00001 + srng() * 0.0001;
const hueBase = srng() * 360;
const hueRange = 60 + srng() * 180;
const colorMode = Math.floor(srng() * 3); // 0=rainbow, 1=mono, 2=dual
const flowStyle = Math.floor(srng() * 3); // 0=calm, 1=turbulent, 2=vortex

// Fluid grid — simplified Navier-Stokes on a coarser grid for performance
const N = 64;
const gridSize = N + 2;
const totalCells = gridSize * gridSize;

// State arrays
let u = new Float32Array(totalCells);      // x-velocity
let v = new Float32Array(totalCells);      // y-velocity
let u_prev = new Float32Array(totalCells);
let v_prev = new Float32Array(totalCells);
let dens = new Float32Array(totalCells);   // density
let dens_prev = new Float32Array(totalCells);

function IX(i, j) { return i + j * gridSize; }

function addSource(x, s, dt) {
  for (let i = 0; i < totalCells; i++) x[i] += dt * s[i];
}

function setBnd(b, x) {
  for (let i = 1; i <= N; i++) {
    x[IX(0, i)]     = b === 1 ? -x[IX(1, i)] : x[IX(1, i)];
    x[IX(N+1, i)]   = b === 1 ? -x[IX(N, i)] : x[IX(N, i)];
    x[IX(i, 0)]     = b === 2 ? -x[IX(i, 1)] : x[IX(i, 1)];
    x[IX(i, N+1)]   = b === 2 ? -x[IX(i, N)] : x[IX(i, N)];
  }
  x[IX(0, 0)]       = 0.5 * (x[IX(1, 0)] + x[IX(0, 1)]);
  x[IX(0, N+1)]     = 0.5 * (x[IX(1, N+1)] + x[IX(0, N)]);
  x[IX(N+1, 0)]     = 0.5 * (x[IX(N, 0)] + x[IX(N+1, 1)]);
  x[IX(N+1, N+1)]   = 0.5 * (x[IX(N, N+1)] + x[IX(N+1, N)]);
}

function diffuse(b, x, x0, diff, dt) {
  const a = dt * diff * N * N;
  for (let k = 0; k < 4; k++) {
    for (let j = 1; j <= N; j++) {
      for (let i = 1; i <= N; i++) {
        x[IX(i,j)] = (x0[IX(i,j)] + a * (
          x[IX(i-1,j)] + x[IX(i+1,j)] +
          x[IX(i,j-1)] + x[IX(i,j+1)]
        )) / (1 + 4 * a);
      }
    }
    setBnd(b, x);
  }
}

function advect(b, d, d0, u, v, dt) {
  const dt0 = dt * N;
  for (let j = 1; j <= N; j++) {
    for (let i = 1; i <= N; i++) {
      let x = i - dt0 * u[IX(i,j)];
      let y = j - dt0 * v[IX(i,j)];
      if (x < 0.5) x = 0.5; if (x > N + 0.5) x = N + 0.5;
      if (y < 0.5) y = 0.5; if (y > N + 0.5) y = N + 0.5;
      const i0 = Math.floor(x), i1 = i0 + 1;
      const j0 = Math.floor(y), j1 = j0 + 1;
      const s1 = x - i0, s0 = 1 - s1;
      const t1 = y - j0, t0 = 1 - t1;
      d[IX(i,j)] = s0 * (t0 * d0[IX(i0,j0)] + t1 * d0[IX(i0,j1)]) +
                   s1 * (t0 * d0[IX(i1,j0)] + t1 * d0[IX(i1,j1)]);
    }
  }
  setBnd(b, d);
}

function project(u, v, p, div) {
  for (let j = 1; j <= N; j++) {
    for (let i = 1; i <= N; i++) {
      div[IX(i,j)] = -0.5 * (u[IX(i+1,j)] - u[IX(i-1,j)] + v[IX(i,j+1)] - v[IX(i,j-1)]) / N;
      p[IX(i,j)] = 0;
    }
  }
  setBnd(0, div);
  setBnd(0, p);
  for (let k = 0; k < 4; k++) {
    for (let j = 1; j <= N; j++) {
      for (let i = 1; i <= N; i++) {
        p[IX(i,j)] = (div[IX(i,j)] + p[IX(i-1,j)] + p[IX(i+1,j)] +
                      p[IX(i,j-1)] + p[IX(i,j+1)]) / 4;
      }
    }
    setBnd(0, p);
  }
  for (let j = 1; j <= N; j++) {
    for (let i = 1; i <= N; i++) {
      u[IX(i,j)] -= 0.5 * N * (p[IX(i+1,j)] - p[IX(i-1,j)]);
      v[IX(i,j)] -= 0.5 * N * (p[IX(i,j+1)] - p[IX(i,j-1)]);
    }
  }
  setBnd(1, u);
  setBnd(2, v);
}

function velStep(u, v, u0, v0, visc, dt) {
  addSource(u, u0, dt);
  addSource(v, v0, dt);
  [u, u0] = [u0, u]; diffuse(1, u, u0, visc, dt); [u, u0] = [u0, u];
  [v, v0] = [v0, v]; diffuse(2, v, v0, visc, dt); [v, v0] = [v0, v];
  project(u, v, u0, v0);
  [u, u0] = [u0, u];
  [v, v0] = [v0, v];
  advect(1, u, u0, u0, v0, dt);
  advect(2, v, v0, u0, v0, dt);
  project(u, v, u0, v0);
}

function densStep(x, x0, u, v, diff, dt) {
  addSource(x, x0, dt);
  [x, x0] = [x0, x]; diffuse(0, x, x0, diff, dt); [x, x0] = [x0, x];
  advect(0, x, x0, u, v, dt);
}

// Color mapping
function getColor(d, vx, vy) {
  const speed = Math.sqrt(vx * vx + vy * vy);
  const intensity = Math.min(1, d * 2);

  let h, s, l;
  if (colorMode === 0) {
    // Rainbow: hue follows velocity direction
    h = (Math.atan2(vy, vx) * 180 / Math.PI + 360 + hueBase) % 360;
    s = 70 + speed * 300;
    l = 5 + intensity * 50;
  } else if (colorMode === 1) {
    // Monochrome: single hue, lightness follows density
    h = hueBase;
    s = 50 + intensity * 30;
    l = 2 + intensity * 45 + speed * 100;
  } else {
    // Dual: two colors based on density threshold
    h = d > 0.3 ? hueBase : (hueBase + hueRange) % 360;
    s = 60 + intensity * 30;
    l = 3 + intensity * 50;
  }

  s = Math.min(100, s);
  l = Math.min(60, l);
  return [h, s, l, intensity];
}

// Interaction
let mouseDown = false;
let mouseX = 0, mouseY = 0, pmouseX = 0, pmouseY = 0;

canvas.addEventListener('mousedown', () => mouseDown = true);
canvas.addEventListener('mouseup', () => mouseDown = false);
canvas.addEventListener('mouseleave', () => mouseDown = false);
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  pmouseX = mouseX;
  pmouseY = mouseY;
  mouseX = (e.clientX - rect.left) / rect.width;
  mouseY = (e.clientY - rect.top) / rect.height;
});

// Touch support
canvas.addEventListener('touchstart', (e) => { mouseDown = true; e.preventDefault(); });
canvas.addEventListener('touchend', () => mouseDown = false);
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  pmouseX = mouseX;
  pmouseY = mouseY;
  mouseX = (t.clientX - rect.left) / rect.width;
  mouseY = (t.clientY - rect.top) / rect.height;
});

let time = 0;
const dt = 0.1;

function addForces() {
  u_prev.fill(0);
  v_prev.fill(0);
  dens_prev.fill(0);

  // Autonomous flow patterns
  time += 0.01;
  if (flowStyle === 0) {
    // Calm: gentle drifting currents
    for (let j = 1; j <= N; j++) {
      for (let i = 1; i <= N; i++) {
        const fx = Math.sin(j / N * Math.PI * 2 + time) * 0.05;
        const fy = Math.cos(i / N * Math.PI * 2 + time * 0.7) * 0.05;
        u_prev[IX(i,j)] += fx;
        v_prev[IX(i,j)] += fy;
      }
    }
  } else if (flowStyle === 1) {
    // Turbulent: random bursts
    if (Math.random() < 0.03) {
      const bx = 2 + Math.floor(Math.random() * (N-2));
      const by = 2 + Math.floor(Math.random() * (N-2));
      const strength = (Math.random() - 0.5) * 20;
      for (let dj = -2; dj <= 2; dj++) {
        for (let di = -2; di <= 2; di++) {
          u_prev[IX(bx+di, by+dj)] += strength * (Math.random() - 0.5);
          v_prev[IX(bx+di, by+dj)] += strength * (Math.random() - 0.5);
          dens_prev[IX(bx+di, by+dj)] += 5;
        }
      }
    }
  } else {
    // Vortex: spinning center
    const cx = N / 2, cy = N / 2;
    for (let j = 1; j <= N; j++) {
      for (let i = 1; i <= N; i++) {
        const dx = i - cx, dy = j - cy;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 1 && dist < N * 0.4) {
          const strength = 0.1 * (1 - dist / (N * 0.4));
          u_prev[IX(i,j)] += -dy / dist * strength;
          v_prev[IX(i,j)] += dx / dist * strength;
        }
      }
    }
  }

  // Continuous density injection points (seed-based)
  _rs = SEED * 3;
  for (let p = 0; p < 3; p++) {
    const px = Math.floor(srng() * (N-4)) + 2;
    const py = Math.floor(srng() * (N-4)) + 2;
    const phase = srng() * Math.PI * 2;
    const amount = 1 + Math.sin(time * 2 + phase) * 0.5;
    if (amount > 0.5) {
      for (let dj = -1; dj <= 1; dj++) {
        for (let di = -1; di <= 1; di++) {
          dens_prev[IX(px+di, py+dj)] += amount * 0.5;
        }
      }
    }
  }

  // Mouse interaction
  if (mouseDown) {
    const i = Math.floor(mouseX * N) + 1;
    const j = Math.floor(mouseY * N) + 1;
    if (i > 1 && i < N && j > 1 && j < N) {
      const dx = (mouseX - pmouseX) * N * 5;
      const dy = (mouseY - pmouseY) * N * 5;
      for (let dj = -2; dj <= 2; dj++) {
        for (let di = -2; di <= 2; di++) {
          const ci = i + di, cj = j + dj;
          if (ci > 0 && ci <= N && cj > 0 && cj <= N) {
            u_prev[IX(ci, cj)] += dx;
            v_prev[IX(ci, cj)] += dy;
            dens_prev[IX(ci, cj)] += 8;
          }
        }
      }
    }
  }
}

// Render
const imageData = ctx.createImageData(W, H);
const pixels = imageData.data;

function render() {
  addForces();
  velStep(u, v, u_prev, v_prev, viscosity, dt);
  densStep(dens, dens_prev, u, v, diffusion, dt);

  // Slow density decay
  for (let i = 0; i < totalCells; i++) {
    dens[i] *= 0.995;
  }

  // Render to canvas
  const cellW = W / N;
  const cellH = H / N;

  for (let py = 0; py < H; py++) {
    for (let px = 0; px < W; px++) {
      // Bilinear interpolation from grid
      const gx = (px / W) * N + 0.5;
      const gy = (py / H) * N + 0.5;
      const gi = Math.floor(gx), gj = Math.floor(gy);
      const fx = gx - gi, fy = gy - gj;

      if (gi < 1 || gi >= N || gj < 1 || gj >= N) {
        const idx = (py * W + px) * 4;
        pixels[idx] = 0; pixels[idx+1] = 0; pixels[idx+2] = 3; pixels[idx+3] = 255;
        continue;
      }

      const d = (1-fx)*(1-fy)*dens[IX(gi,gj)] + fx*(1-fy)*dens[IX(gi+1,gj)] +
                (1-fx)*fy*dens[IX(gi,gj+1)] + fx*fy*dens[IX(gi+1,gj+1)];
      const vx = (1-fx)*(1-fy)*u[IX(gi,gj)] + fx*(1-fy)*u[IX(gi+1,gj)] +
                 (1-fx)*fy*u[IX(gi,gj+1)] + fx*fy*u[IX(gi+1,gj+1)];
      const vy = (1-fx)*(1-fy)*v[IX(gi,gj)] + fx*(1-fy)*v[IX(gi+1,gj)] +
                 (1-fx)*fy*v[IX(gi,gj+1)] + fx*fy*v[IX(gi+1,gj+1)];

      const [h, s, l, intensity] = getColor(d, vx, vy);

      // HSL to RGB
      const c = (1 - Math.abs(2 * l/100 - 1)) * s/100;
      const x2 = c * (1 - Math.abs((h/60) % 2 - 1));
      const m = l/100 - c/2;
      let r=0, g=0, b=0;
      if (h < 60) { r=c; g=x2; }
      else if (h < 120) { r=x2; g=c; }
      else if (h < 180) { g=c; b=x2; }
      else if (h < 240) { g=x2; b=c; }
      else if (h < 300) { r=x2; b=c; }
      else { r=c; b=x2; }

      const idx = (py * W + px) * 4;
      pixels[idx] = (r + m) * 255;
      pixels[idx+1] = (g + m) * 255;
      pixels[idx+2] = (b + m) * 255;
      pixels[idx+3] = 255;
    }
  }

  ctx.putImageData(imageData, 0, 0);

  // Signature
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.font = '10px monospace';
  ctx.fillText('Meridian Fluid #001', 10, H - 10);

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
