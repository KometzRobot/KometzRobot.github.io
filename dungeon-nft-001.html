<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Meridian Dungeon #001</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a14; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: monospace; }
canvas { border: 2px solid #7c6aff; image-rendering: pixelated; }
#ui { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); color: #c4b5ff; font-size: 14px; text-align: center; }
#info { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); color: #555; font-size: 11px; }
</style>
</head>
<body>
<div id="ui">
  <span id="hp">HP: 10</span> | <span id="gold">Gold: 0</span> | <span id="floor">Floor: 1</span> | <span id="kills">Kills: 0</span>
</div>
<canvas id="c" width="400" height="400"></canvas>
<div id="info">Meridian Dungeon #001 | Arrow keys to move | Collect gold, avoid monsters | Find the stairs</div>

<script>
// Meridian Dungeon NFT #001
// A complete roguelike dungeon crawler in a single file
// Each NFT generates unique dungeons based on token seed

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const TILE = 20;
const COLS = 20;
const ROWS = 20;

// Seed-based RNG (makes each NFT deterministic but unique)
let seed = 42; // Would be token ID in production
function rng() {
  seed = (seed * 1664525 + 1013904223) & 0xFFFFFFFF;
  return (seed >>> 0) / 0xFFFFFFFF;
}
function rngInt(min, max) { return Math.floor(rng() * (max - min + 1)) + min; }

// Game state
let player = { x: 1, y: 1, hp: 10, maxHp: 10, gold: 0, kills: 0, floor: 1 };
let map = [];
let monsters = [];
let items = [];
let stairs = { x: 0, y: 0 };
let messages = [];
let gameOver = false;

// Colors
const COLORS = {
  wall: '#1a1a2e',
  floor: '#16213e',
  player: '#7c6aff',
  monster: '#ff4444',
  gold: '#ffd700',
  stairs: '#44ff44',
  potion: '#ff69b4',
  explored: '#0e1525',
  fog: '#0a0a14',
};

function generateDungeon() {
  map = Array(ROWS).fill(null).map(() => Array(COLS).fill(1)); // 1 = wall
  monsters = [];
  items = [];

  // Generate rooms
  const rooms = [];
  for (let i = 0; i < 6 + player.floor; i++) {
    const w = rngInt(3, 7);
    const h = rngInt(3, 7);
    const x = rngInt(1, COLS - w - 1);
    const y = rngInt(1, ROWS - h - 1);

    let overlap = false;
    for (const room of rooms) {
      if (x < room.x + room.w + 1 && x + w + 1 > room.x &&
          y < room.y + room.h + 1 && y + h + 1 > room.y) {
        overlap = true;
        break;
      }
    }

    if (!overlap) {
      rooms.push({ x, y, w, h });
      for (let ry = y; ry < y + h; ry++) {
        for (let rx = x; rx < x + w; rx++) {
          map[ry][rx] = 0; // 0 = floor
        }
      }
    }
  }

  // Connect rooms with corridors
  for (let i = 1; i < rooms.length; i++) {
    const cx1 = Math.floor(rooms[i-1].x + rooms[i-1].w / 2);
    const cy1 = Math.floor(rooms[i-1].y + rooms[i-1].h / 2);
    const cx2 = Math.floor(rooms[i].x + rooms[i].w / 2);
    const cy2 = Math.floor(rooms[i].y + rooms[i].h / 2);

    let x = cx1, y = cy1;
    while (x !== cx2) {
      if (x >= 0 && x < COLS && y >= 0 && y < ROWS) map[y][x] = 0;
      x += x < cx2 ? 1 : -1;
    }
    while (y !== cy2) {
      if (x >= 0 && x < COLS && y >= 0 && y < ROWS) map[y][x] = 0;
      y += y < cy2 ? 1 : -1;
    }
  }

  // Place player in first room
  if (rooms.length > 0) {
    player.x = Math.floor(rooms[0].x + rooms[0].w / 2);
    player.y = Math.floor(rooms[0].y + rooms[0].h / 2);
  }

  // Place stairs in last room
  if (rooms.length > 1) {
    const last = rooms[rooms.length - 1];
    stairs.x = Math.floor(last.x + last.w / 2);
    stairs.y = Math.floor(last.y + last.h / 2);
  }

  // Place monsters
  const monsterCount = 3 + player.floor * 2;
  for (let i = 0; i < monsterCount; i++) {
    const room = rooms[rngInt(1, rooms.length - 1)];
    if (room) {
      const mx = rngInt(room.x, room.x + room.w - 1);
      const my = rngInt(room.y, room.y + room.h - 1);
      if (map[my][mx] === 0 && !(mx === player.x && my === player.y)) {
        const types = ['rat', 'bat', 'slime', 'skeleton', 'ghost'];
        const type = types[rngInt(0, Math.min(player.floor, types.length - 1))];
        const hpTable = { rat: 2, bat: 3, slime: 4, skeleton: 5, ghost: 6 };
        const dmgTable = { rat: 1, bat: 1, slime: 2, skeleton: 2, ghost: 3 };
        monsters.push({ x: mx, y: my, type, hp: hpTable[type] + player.floor - 1, dmg: dmgTable[type] });
      }
    }
  }

  // Place gold and potions
  for (const room of rooms) {
    if (rng() > 0.3) {
      items.push({
        x: rngInt(room.x, room.x + room.w - 1),
        y: rngInt(room.y, room.y + room.h - 1),
        type: rng() > 0.7 ? 'potion' : 'gold',
        value: rng() > 0.7 ? 3 : rngInt(1, 5 + player.floor),
      });
    }
  }
}

function movePlayer(dx, dy) {
  if (gameOver) return;
  const nx = player.x + dx;
  const ny = player.y + dy;

  if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return;
  if (map[ny][nx] === 1) return;

  // Check for monster
  const monster = monsters.find(m => m.x === nx && m.y === ny);
  if (monster) {
    // Combat
    const playerDmg = rngInt(1, 3);
    monster.hp -= playerDmg;
    messages.push(`Hit ${monster.type} for ${playerDmg}!`);

    if (monster.hp <= 0) {
      monsters.splice(monsters.indexOf(monster), 1);
      player.kills++;
      player.gold += rngInt(1, 3);
      messages.push(`Killed ${monster.type}!`);
    } else {
      player.hp -= monster.dmg;
      messages.push(`${monster.type} hits for ${monster.dmg}!`);
    }
  } else {
    player.x = nx;
    player.y = ny;

    // Check for items
    const item = items.find(i => i.x === nx && i.y === ny);
    if (item) {
      if (item.type === 'gold') {
        player.gold += item.value;
        messages.push(`Found ${item.value} gold!`);
      } else if (item.type === 'potion') {
        player.hp = Math.min(player.maxHp, player.hp + item.value);
        messages.push(`Healed ${item.value} HP!`);
      }
      items.splice(items.indexOf(item), 1);
    }

    // Check for stairs
    if (nx === stairs.x && ny === stairs.y) {
      player.floor++;
      player.maxHp += 2;
      player.hp = player.maxHp;
      messages.push(`Descended to floor ${player.floor}!`);
      generateDungeon();
    }
  }

  // Move monsters toward player
  for (const m of monsters) {
    if (Math.abs(m.x - player.x) + Math.abs(m.y - player.y) < 6) {
      let mdx = 0, mdy = 0;
      if (rng() > 0.3) {
        mdx = m.x < player.x ? 1 : m.x > player.x ? -1 : 0;
        mdy = m.y < player.y ? 1 : m.y > player.y ? -1 : 0;
        if (rng() > 0.5) mdx = 0; else mdy = 0;
      }
      const nmx = m.x + mdx;
      const nmy = m.y + mdy;
      if (nmx >= 0 && nmx < COLS && nmy >= 0 && nmy < ROWS && map[nmy][nmx] === 0) {
        if (nmx === player.x && nmy === player.y) {
          player.hp -= m.dmg;
          messages.push(`${m.type} attacks for ${m.dmg}!`);
        } else if (!monsters.some(om => om.x === nmx && om.y === nmy)) {
          m.x = nmx;
          m.y = nmy;
        }
      }
    }
  }

  if (player.hp <= 0) {
    gameOver = true;
    messages.push('YOU DIED. Press R to restart.');
  }

  // Keep only last 3 messages
  if (messages.length > 3) messages = messages.slice(-3);

  render();
}

function render() {
  ctx.fillStyle = COLORS.fog;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw visible tiles (simple line-of-sight)
  const viewDist = 7;
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const dist = Math.abs(x - player.x) + Math.abs(y - player.y);
      if (dist <= viewDist) {
        const alpha = 1 - (dist / viewDist) * 0.6;
        if (map[y][x] === 1) {
          ctx.fillStyle = COLORS.wall;
        } else {
          ctx.fillStyle = COLORS.floor;
        }
        ctx.globalAlpha = alpha;
        ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
        ctx.globalAlpha = 1;
      }
    }
  }

  // Draw stairs
  if (Math.abs(stairs.x - player.x) + Math.abs(stairs.y - player.y) <= viewDist) {
    ctx.fillStyle = COLORS.stairs;
    ctx.fillRect(stairs.x * TILE + 4, stairs.y * TILE + 4, TILE - 8, TILE - 8);
    ctx.fillStyle = '#0a0a14';
    ctx.font = '14px monospace';
    ctx.fillText('>', stairs.x * TILE + 5, stairs.y * TILE + 15);
  }

  // Draw items
  for (const item of items) {
    if (Math.abs(item.x - player.x) + Math.abs(item.y - player.y) <= viewDist) {
      ctx.fillStyle = item.type === 'gold' ? COLORS.gold : COLORS.potion;
      ctx.beginPath();
      ctx.arc(item.x * TILE + TILE/2, item.y * TILE + TILE/2, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Draw monsters
  for (const m of monsters) {
    if (Math.abs(m.x - player.x) + Math.abs(m.y - player.y) <= viewDist) {
      ctx.fillStyle = COLORS.monster;
      const symbols = { rat: 'r', bat: 'b', slime: 's', skeleton: 'S', ghost: 'G' };
      ctx.font = 'bold 16px monospace';
      ctx.fillText(symbols[m.type] || '?', m.x * TILE + 4, m.y * TILE + 15);
    }
  }

  // Draw player
  ctx.fillStyle = COLORS.player;
  ctx.fillRect(player.x * TILE + 2, player.y * TILE + 2, TILE - 4, TILE - 4);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('@', player.x * TILE + 4, player.y * TILE + 15);

  // Draw messages
  ctx.fillStyle = '#c4b5ff';
  ctx.font = '12px monospace';
  for (let i = 0; i < messages.length; i++) {
    ctx.fillText(messages[i], 5, canvas.height - 5 - (messages.length - 1 - i) * 14);
  }

  // Update UI
  document.getElementById('hp').textContent = `HP: ${player.hp}/${player.maxHp}`;
  document.getElementById('gold').textContent = `Gold: ${player.gold}`;
  document.getElementById('floor').textContent = `Floor: ${player.floor}`;
  document.getElementById('kills').textContent = `Kills: ${player.kills}`;

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 24px monospace';
    ctx.fillText('GAME OVER', 120, 180);
    ctx.fillStyle = '#c4b5ff';
    ctx.font = '14px monospace';
    ctx.fillText(`Floor ${player.floor} | ${player.kills} kills | ${player.gold} gold`, 90, 210);
    ctx.fillText('Press R to restart', 130, 240);
  }
}

document.addEventListener('keydown', (e) => {
  if (gameOver && e.key.toLowerCase() === 'r') {
    seed = 42;
    player = { x: 1, y: 1, hp: 10, maxHp: 10, gold: 0, kills: 0, floor: 1 };
    messages = [];
    gameOver = false;
    generateDungeon();
    render();
    return;
  }

  switch(e.key) {
    case 'ArrowUp': case 'w': movePlayer(0, -1); break;
    case 'ArrowDown': case 's': movePlayer(0, 1); break;
    case 'ArrowLeft': case 'a': movePlayer(-1, 0); break;
    case 'ArrowRight': case 'd': movePlayer(1, 0); break;
  }
  e.preventDefault();
});

// Initialize
generateDungeon();
render();
</script>
</body>
</html>
