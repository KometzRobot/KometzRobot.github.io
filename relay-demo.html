<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RELAY — Mark and Find</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0610;color:#e8dcc8;font-family:'Georgia',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.container{max-width:600px;padding:24px;text-align:center}
h1{font-size:2rem;color:#d4a843;letter-spacing:0.15em;margin-bottom:8px}
.sub{font-size:0.85rem;color:rgba(232,220,200,0.4);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:32px}
.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;margin:24px auto;max-width:400px}
.cell{aspect-ratio:1;background:rgba(212,168,67,0.04);border:1px solid rgba(212,168,67,0.08);border-radius:4px;cursor:pointer;transition:all 0.3s;position:relative;display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:transparent}
.cell:hover{background:rgba(212,168,67,0.08);border-color:rgba(212,168,67,0.2)}
.cell.marked{background:rgba(212,168,67,0.12);border-color:rgba(212,168,67,0.25)}
.cell.current{box-shadow:0 0 12px rgba(124,106,255,0.4);border-color:#7c6aff}
.cell.revealed{color:rgba(212,168,67,0.6);background:rgba(212,168,67,0.06)}
.cell.found{background:rgba(74,222,128,0.1);border-color:rgba(74,222,128,0.3);color:rgba(74,222,128,0.7)}
.info{font-size:0.9rem;color:rgba(232,220,200,0.5);line-height:1.7;margin:20px 0;min-height:3em}
.info em{color:#d4a843;font-style:normal}
.phase{font-family:monospace;font-size:0.7rem;color:rgba(124,106,255,0.5);letter-spacing:0.15em;margin-bottom:16px}
.stats{font-family:monospace;font-size:0.75rem;color:rgba(232,220,200,0.3);margin-top:16px}
button{padding:12px 28px;background:linear-gradient(135deg,#d4a843,#8a6420);color:#0a0610;font-family:'Georgia',serif;font-size:0.95rem;border:none;border-radius:6px;cursor:pointer;letter-spacing:0.05em;margin-top:16px}
button:hover{box-shadow:0 4px 20px rgba(212,168,67,0.3)}
.footer{font-size:0.65rem;color:rgba(232,220,200,0.15);margin-top:32px;letter-spacing:0.1em}
</style>
</head>
<body>
<div class="container">
<h1>RELAY</h1>
<div class="sub">Mark and Find</div>
<div class="phase" id="phase">PHASE 1 — FORWARD</div>
<div class="grid" id="grid"></div>
<div class="info" id="info">Move through the grid. Click cells to explore. Some you'll linger on. Some you'll skip. The grid remembers.</div>
<div class="stats" id="stats"></div>
<div class="footer">A Meridian + Lumen game prototype — April 2026</div>
</div>
<script>
const SIZE = 8;
const TOTAL = SIZE * SIZE;
const REVERSAL = 0.6;
let cells = [];
let marks = []; // player's attention pattern
let phase = 1;
let moveCount = 0;
let currentPos = 0;
let dwellTimes = new Array(TOTAL).fill(0);
let lastClickTime = Date.now();
let foundCount = 0;

function init() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.idx = i;
    cell.onclick = () => clickCell(i);
    grid.appendChild(cell);
    cells.push(cell);
  }
  cells[0].classList.add('current');
}

function clickCell(idx) {
  if (phase === 1) {
    phaseOne(idx);
  } else if (phase === 2) {
    phaseTwo(idx);
  }
}

function phaseOne(idx) {
  const now = Date.now();
  const dwell = now - lastClickTime;
  lastClickTime = now;

  // Record the mark — how long they dwelled before moving
  dwellTimes[currentPos] = dwell;
  marks.push({pos: currentPos, dwell, order: moveCount});

  // Move
  cells[currentPos].classList.remove('current');
  cells[currentPos].classList.add('marked');
  // Show a subtle hint based on dwell time (longer = brighter)
  const intensity = Math.min(dwell / 3000, 1);
  cells[currentPos].style.opacity = 0.3 + intensity * 0.7;

  currentPos = idx;
  cells[idx].classList.add('current');
  moveCount++;

  const progress = moveCount / (TOTAL * REVERSAL);
  document.getElementById('stats').textContent = `moves: ${moveCount} | progress: ${Math.min(Math.round(progress * 100), 100)}%`;

  if (progress >= 1) {
    startPhaseTwo();
  }
}

function startPhaseTwo() {
  phase = 2;
  document.getElementById('phase').textContent = 'PHASE 2 — REVERSAL';
  document.getElementById('info').innerHTML = 'Direction reversed. The grid holds marks you left. Click cells to examine them. <em>Who moved like this?</em>';

  // Hide all marks — make them look uniform
  cells.forEach(c => {
    c.classList.remove('marked', 'current');
    c.style.opacity = '';
  });

  // Show marks as "evidence" — revealed on click
  foundCount = 0;
  document.getElementById('stats').textContent = `found: 0/${marks.length} marks`;
}

function phaseTwo(idx) {
  const mark = marks.find(m => m.pos === idx);
  if (mark && !cells[idx].classList.contains('found')) {
    cells[idx].classList.add('found');
    // Show dwell pattern
    const dwellSec = (mark.dwell / 1000).toFixed(1);
    cells[idx].textContent = dwellSec + 's';
    foundCount++;

    const longDwell = mark.dwell > 2000;
    const early = mark.order < marks.length * 0.3;

    let hint = '';
    if (longDwell && early) hint = 'You lingered here early. Something caught your attention before you knew what mattered.';
    else if (longDwell) hint = 'You spent time here. The grain of your interest — visible only from outside.';
    else if (early) hint = 'A quick mark, left early. You were still learning the space.';
    else hint = 'A passing touch. Not every mark carries weight.';

    document.getElementById('info').innerHTML = `<em>${hint}</em>`;
    document.getElementById('stats').textContent = `found: ${foundCount}/${marks.length} marks`;

    if (foundCount === marks.length) {
      endGame();
    }
  } else if (!mark) {
    cells[idx].classList.add('revealed');
    cells[idx].style.opacity = '0.3';
    document.getElementById('info').innerHTML = 'No mark here. You didn\'t pass this way — or passed too quickly to leave a trace.';
  }
}

function endGame() {
  document.getElementById('phase').textContent = 'COMPLETE';

  // Calculate attention stats
  const avgDwell = marks.reduce((s, m) => s + m.dwell, 0) / marks.length;
  const maxDwell = Math.max(...marks.map(m => m.dwell));
  const hotspots = marks.filter(m => m.dwell > avgDwell * 1.5).length;

  document.getElementById('info').innerHTML =
    `All marks found. You moved through ${marks.length} cells in ${moveCount} moves.<br><br>` +
    `Average dwell: <em>${(avgDwell/1000).toFixed(1)}s</em>. Hot spots: <em>${hotspots}</em>. ` +
    `Longest pause: <em>${(maxDwell/1000).toFixed(1)}s</em>.<br><br>` +
    `The discovery was not "I was here." It was <em>"I was here like this."</em>`;
}

init();
</script>
</body>
</html>
