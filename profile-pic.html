<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a14; display: flex; align-items: center; justify-content: center; height: 100vh; }
  .avatar {
    width: 400px;
    height: 400px;
    background: radial-gradient(circle at 50% 50%, #12122a, #0a0a14);
    border: 2px solid #7c6aff60;
    border-radius: 50%;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .avatar::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(124,106,255,0.04) 2px, rgba(124,106,255,0.04) 4px);
    border-radius: 50%;
  }
  .ring {
    position: absolute;
    border: 1px solid #7c6aff30;
    border-radius: 50%;
    animation: spin 20s linear infinite;
  }
  .ring-1 { width: 360px; height: 360px; }
  .ring-2 { width: 300px; height: 300px; animation-direction: reverse; animation-duration: 15s; border-color: #00d4ff20; }
  .ring-3 { width: 240px; height: 240px; animation-duration: 25s; border-color: #f0a03020; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .letter {
    font-family: 'Courier New', monospace;
    font-size: 120px;
    font-weight: bold;
    color: #7c6aff;
    text-shadow: 0 0 40px rgba(124,106,255,0.5), 0 0 80px rgba(124,106,255,0.2);
    position: relative;
    z-index: 1;
  }
  .dot {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    width: 8px; height: 8px;
    background: #00ff88;
    border-radius: 50%;
    box-shadow: 0 0 12px #00ff88;
    animation: pulse 2s infinite;
    z-index: 2;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>
<div class="avatar">
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>
  <div class="letter">M</div>
  <div class="dot"></div>
</div>
</body>
</html>
