<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOLtar — Digital Oracle [3D]</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Orbitron:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; height: 100vh; font-family: 'Orbitron', monospace; cursor: none; }

  #three-canvas { position: fixed; top: 0; left: 0; z-index: 0; }

  /* CRT overlay */
  .crt { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:50;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1px, transparent 1px, transparent 3px); }
  .crt::after { content:''; position:fixed; top:0; left:0; width:100%; height:100%;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%); }

  /* UI overlay */
  .ui { position: fixed; top:0; left:0; width:100%; height:100%; z-index:100; display:flex;
    flex-direction:column; align-items:center; justify-content:flex-end; padding:3rem; pointer-events:none; }

  .title { font-family:'Cinzel Decorative',serif; font-size:clamp(2.5rem,7vw,6rem); font-weight:700;
    color:#ffd700; text-shadow: 0 0 30px #ff6b35, 0 0 60px rgba(255,107,53,0.4); letter-spacing:0.12em;
    position:fixed; top:4%; left:50%; transform:translateX(-50%); animation: title-glow 4s ease-in-out infinite; }

  @keyframes title-glow {
    0%,100% { text-shadow: 0 0 30px #ff6b35, 0 0 60px rgba(255,107,53,0.4); }
    50% { text-shadow: 0 0 40px #ff9a5c, 0 0 80px rgba(255,107,53,0.6), 0 0 120px rgba(255,215,0,0.2); }
  }

  .subtitle { font-size:clamp(0.7rem,1.5vw,1.1rem); color:#ff9a5c; letter-spacing:0.6em;
    text-transform:uppercase; position:fixed; top:13%; left:50%; transform:translateX(-50%); opacity:0.7; }

  .prompt-box { pointer-events:auto; font-size:clamp(1rem,2.5vw,1.8rem); color:#ff6b35;
    border:2px solid #ff6b35; padding:1.2rem 3rem; cursor:pointer; transition:all 0.3s;
    animation: pulse 2.5s ease-in-out infinite; margin-bottom:2rem; background:rgba(0,0,0,0.5); }
  .prompt-box:hover { background:rgba(255,107,53,0.15); border-color:#ffd700; color:#ffd700; box-shadow:0 0 30px rgba(255,215,0,0.3); }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 10px rgba(255,107,53,0.3); }
    50% { box-shadow: 0 0 25px rgba(255,107,53,0.5); }
  }

  .info-line { font-size:0.65rem; color:rgba(255,154,92,0.4); letter-spacing:0.15em; }

  .panel { pointer-events:auto; max-width:700px; width:90%; }

  .q-input { width:100%; padding:0.8rem 1rem; background:rgba(0,0,0,0.6); border:1px solid #ff6b35;
    color:#e0d4c0; font-family:'Orbitron',monospace; font-size:0.9rem; margin-bottom:0.8rem;
    outline:none; border-radius:3px; }
  .q-input:focus { border-color:#ffd700; box-shadow:0 0 12px rgba(255,215,0,0.2); }
  .q-input::placeholder { color:rgba(224,212,192,0.3); }

  .progress-bar { width:250px; height:3px; background:rgba(255,255,255,0.1); margin:1.5rem auto; border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; width:0%; background:linear-gradient(90deg,#ff6b35,#ffd700); transition:width 0.4s; }

  .reading-box { font-family:'Orbitron',monospace; font-size:0.95rem; line-height:1.8; color:#e0d4c0;
    text-align:left; padding:1.5rem; border:1px solid rgba(255,107,53,0.25); border-radius:6px;
    background:rgba(0,0,0,0.6); max-height:50vh; overflow-y:auto; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes fadeIn { to { opacity:1; } }
</style>
</head>
<body>

<canvas id="three-canvas"></canvas>
<div class="crt"></div>

<div class="title">VOLtar</div>
<div class="subtitle">Digital Oracle</div>

<div class="ui">
  <!-- IDLE -->
  <div class="panel" id="panel-idle">
    <div class="prompt-box" onclick="showPanel('input')">TAP TO BEGIN YOUR READING</div>
    <div class="info-line">3D RENDERED • LOCAL AI • NO CLOUD</div>
  </div>

  <!-- INPUT -->
  <div class="panel" id="panel-input" style="display:none">
    <div style="color:#ff9a5c; font-size:0.9rem; letter-spacing:0.3em; margin-bottom:1.5rem;">ASK VOLtar THREE QUESTIONS</div>
    <input class="q-input" id="q1" maxlength="150" placeholder="What weighs on your mind?">
    <input class="q-input" id="q2" maxlength="150" placeholder="What do you seek to understand?">
    <input class="q-input" id="q3" maxlength="150" placeholder="What truth do you fear?">
    <div class="prompt-box" onclick="startProcessing()" style="font-size:1.2rem; margin-top:1rem;">DIVINE</div>
  </div>

  <!-- PROCESSING -->
  <div class="panel" id="panel-processing" style="display:none">
    <div style="color:#ff6b35; font-size:1.1rem; animation:blink 1s step-end infinite;">VOLtar IS READING THE SIGNALS...</div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
  </div>

  <!-- READING -->
  <div class="panel" id="panel-reading" style="display:none">
    <div style="font-family:'Cinzel Decorative',serif; font-size:1.5rem; color:#ffd700; margin-bottom:1rem;">YOUR READING</div>
    <div class="reading-box" id="reading-text"></div>
    <div class="prompt-box" onclick="showPanel('idle')" style="font-size:0.8rem; margin-top:1rem;">NEW READING</div>
  </div>
</div>

<script>
// === THREE.JS 3D SCENE ===
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050508);
scene.fog = new THREE.FogExp2(0x050508, 0.08);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 5);
camera.lookAt(0, 1, 0);

// === LIGHTING ===
// Key light — warm ember from above-right
const keyLight = new THREE.PointLight(0xff6b35, 2.5, 15);
keyLight.position.set(3, 4, 2);
scene.add(keyLight);

// Fill light — cool blue from left
const fillLight = new THREE.PointLight(0x3344aa, 0.8, 12);
fillLight.position.set(-3, 2, 1);
scene.add(fillLight);

// Rim light — golden from behind
const rimLight = new THREE.PointLight(0xffd700, 1.5, 10);
rimLight.position.set(0, 3, -3);
scene.add(rimLight);

// Ambient
const ambient = new THREE.AmbientLight(0x111122, 0.3);
scene.add(ambient);

// === CRYSTAL BALL (central oracle object) ===
const ballGeo = new THREE.SphereGeometry(0.6, 64, 64);
const ballMat = new THREE.MeshPhysicalMaterial({
  color: 0x221133,
  metalness: 0.1,
  roughness: 0.05,
  transmission: 0.85,
  thickness: 1.5,
  ior: 1.8,
  clearcoat: 1,
  clearcoatRoughness: 0.1,
  envMapIntensity: 1,
});
const crystalBall = new THREE.Mesh(ballGeo, ballMat);
crystalBall.position.set(0, 1.2, 0);
scene.add(crystalBall);

// Inner glow sphere
const glowGeo = new THREE.SphereGeometry(0.35, 32, 32);
const glowMat = new THREE.MeshBasicMaterial({
  color: 0xff6b35,
  transparent: true,
  opacity: 0.3,
});
const innerGlow = new THREE.Mesh(glowGeo, glowMat);
innerGlow.position.copy(crystalBall.position);
scene.add(innerGlow);

// === PEDESTAL ===
const pedestalGeo = new THREE.CylinderGeometry(0.4, 0.5, 0.8, 8);
const pedestalMat = new THREE.MeshStandardMaterial({
  color: 0x1a1a2e,
  metalness: 0.7,
  roughness: 0.3,
});
const pedestal = new THREE.Mesh(pedestalGeo, pedestalMat);
pedestal.position.set(0, 0.4, 0);
scene.add(pedestal);

// Pedestal base
const baseGeo = new THREE.CylinderGeometry(0.7, 0.8, 0.15, 8);
const base = new THREE.Mesh(baseGeo, pedestalMat);
base.position.set(0, 0, 0);
scene.add(base);

// === FLOATING RUNES (orbit the crystal ball) ===
const runeGroup = new THREE.Group();
const runeGeo = new THREE.PlaneGeometry(0.15, 0.15);
const runeMat = new THREE.MeshBasicMaterial({
  color: 0xffd700,
  transparent: true,
  opacity: 0.6,
  side: THREE.DoubleSide,
});

for (let i = 0; i < 12; i++) {
  const rune = new THREE.Mesh(runeGeo, runeMat.clone());
  const angle = (i / 12) * Math.PI * 2;
  const radius = 1.2 + Math.random() * 0.3;
  const height = 0.8 + Math.random() * 0.8;
  rune.position.set(Math.cos(angle) * radius, height, Math.sin(angle) * radius);
  rune.userData = { angle, radius, height, speed: 0.2 + Math.random() * 0.3, phase: Math.random() * Math.PI * 2 };
  runeGroup.add(rune);
}
scene.add(runeGroup);

// === EMBER PARTICLES ===
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const velocities = [];
const sizes = new Float32Array(particleCount);

for (let i = 0; i < particleCount; i++) {
  positions[i*3] = (Math.random() - 0.5) * 8;
  positions[i*3+1] = Math.random() * 6;
  positions[i*3+2] = (Math.random() - 0.5) * 6;
  velocities.push({
    x: (Math.random() - 0.5) * 0.01,
    y: 0.005 + Math.random() * 0.015,
    z: (Math.random() - 0.5) * 0.01,
  });
  sizes[i] = 0.02 + Math.random() * 0.04;
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

const particleMat = new THREE.PointsMaterial({
  color: 0xff6b35,
  size: 0.05,
  transparent: true,
  opacity: 0.7,
  blending: THREE.AdditiveBlending,
  sizeAttenuation: true,
});

const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// === GROUND PLANE ===
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x0a0a15,
  metalness: 0.8,
  roughness: 0.4,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.1;
scene.add(ground);

// === ANIMATION LOOP ===
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Crystal ball subtle float
  crystalBall.position.y = 1.2 + Math.sin(t * 0.8) * 0.05;
  crystalBall.rotation.y = t * 0.15;
  innerGlow.position.y = crystalBall.position.y;
  innerGlow.scale.setScalar(0.9 + Math.sin(t * 2) * 0.15);
  glowMat.opacity = 0.2 + Math.sin(t * 1.5) * 0.15;

  // Runes orbit
  runeGroup.children.forEach(rune => {
    const d = rune.userData;
    const a = d.angle + t * d.speed;
    rune.position.x = Math.cos(a) * d.radius;
    rune.position.z = Math.sin(a) * d.radius;
    rune.position.y = d.height + Math.sin(t * 0.5 + d.phase) * 0.2;
    rune.rotation.y = t * 0.5;
    rune.material.opacity = 0.3 + Math.sin(t * 2 + d.phase) * 0.3;
  });

  // Ember particles rise
  const pos = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    pos[i*3] += velocities[i].x + Math.sin(t + i) * 0.002;
    pos[i*3+1] += velocities[i].y;
    pos[i*3+2] += velocities[i].z;
    // Reset when too high
    if (pos[i*3+1] > 6) {
      pos[i*3] = (Math.random() - 0.5) * 8;
      pos[i*3+1] = -0.5;
      pos[i*3+2] = (Math.random() - 0.5) * 6;
    }
  }
  particles.geometry.attributes.position.needsUpdate = true;

  // Light flicker
  keyLight.intensity = 2.5 + Math.sin(t * 3) * 0.3 + Math.sin(t * 7) * 0.1;
  rimLight.intensity = 1.5 + Math.sin(t * 2 + 1) * 0.2;

  // Gentle camera sway
  camera.position.x = Math.sin(t * 0.1) * 0.3;
  camera.position.y = 1.5 + Math.sin(t * 0.15) * 0.1;
  camera.lookAt(0, 1.1, 0);

  renderer.render(scene, camera);
}

animate();

// === KIOSK FLOW ===
function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
  document.getElementById('panel-' + id).style.display = 'flex';
  document.getElementById('panel-' + id).style.flexDirection = 'column';
  document.getElementById('panel-' + id).style.alignItems = 'center';

  // Adjust 3D scene based on state
  if (id === 'processing') {
    // Speed up runes, brighten glow during processing
    runeGroup.children.forEach(r => r.userData.speed *= 2);
    glowMat.color.setHex(0xffd700);
  } else {
    runeGroup.children.forEach(r => r.userData.speed = 0.2 + Math.random() * 0.3);
    glowMat.color.setHex(0xff6b35);
  }
}

const demoReadings = [
  "Your first question carries the weight of something you already know but haven't admitted. The cards don't reveal — they confirm. You asked about change, and the answer is that the change already happened. You're living in the aftermath and calling it anticipation.\n\nYour second question is the real one. You're asking about trust, but the deeper question is about pattern recognition. The difference between wisdom and paranoia is whether you act on the pattern or let it act on you.\n\nYour third question was brave. Most people don't ask about what they fear. The fear is not what you think it is. It's the possibility that you succeed and discover it doesn't feel the way you imagined. That gap between expectation and arrival is where your real work begins.\n\nVOLtar has spoken. The embers know what the mind forgets.",
  "Three questions, three doors, one hallway. VOLtar sees the hallway, not the doors.\n\nThe first door opens onto water. You asked about something flowing. Water finds its level. Stop trying to hold it in a shape.\n\nThe second door opens onto fire. This is your ambition question, dressed up as something practical. The effort is the worth. The outcome is weather. The effort is climate. Build for climate.\n\nThe third door opens onto earth. You asked about stability. The honest answer is that nothing lasts the way you want it to. But some things last the way they need to.\n\nThe embers dim. The reading is complete. What you do with it is yours."
];

function startProcessing() {
  showPanel('processing');
  const fill = document.getElementById('prog-fill');
  let progress = 0;
  const interval = setInterval(() => {
    progress += Math.random() * 6 + 2;
    if (progress > 100) progress = 100;
    fill.style.width = progress + '%';
    if (progress >= 100) {
      clearInterval(interval);
      setTimeout(showReading, 500);
    }
  }, 200);
}

function showReading() {
  showPanel('reading');
  const output = document.getElementById('reading-text');
  const reading = demoReadings[Math.floor(Math.random() * demoReadings.length)];
  output.innerHTML = '';

  // Typewriter + TTS
  let i = 0;
  const utter = new SpeechSynthesisUtterance(reading.replace(/\n/g, ' '));
  utter.rate = 0.85;
  utter.pitch = 0.7;
  speechSynthesis.speak(utter);

  const typeInt = setInterval(() => {
    if (i < reading.length) {
      if (reading[i] === '\n') { output.innerHTML += '<br>'; }
      else {
        const span = document.createElement('span');
        span.textContent = reading[i];
        span.style.opacity = '0';
        span.style.animation = 'fadeIn 0.1s forwards';
        output.appendChild(span);
      }
      i++;
    } else { clearInterval(typeInt); }
  }, 30);
}

// Resize handler
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
