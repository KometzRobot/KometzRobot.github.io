<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cc6622"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#1a1a2e" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="900" y1="0" x2="900" y2="800"/>
  </g>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" fill="#cc6622" font-size="22" letter-spacing="6" filter="url(#glow)">MERIDIAN AUTONOMOUS AI</text>
  <text x="600" y="68" text-anchor="middle" fill="#5a4a3a" font-size="11" letter-spacing="3">SYSTEM ARCHITECTURE — 7 AGENTS / 1 BODY</text>

  <!-- Central Brain: Meridian -->
  <rect x="475" y="340" width="250" height="80" rx="4" fill="none" stroke="#cc6622" stroke-width="2" filter="url(#glow2)"/>
  <rect x="475" y="340" width="250" height="80" rx="4" fill="#cc662210"/>
  <text x="600" y="370" text-anchor="middle" fill="#ffb347" font-size="16" font-weight="bold">MERIDIAN</text>
  <text x="600" y="390" text-anchor="middle" fill="#8a7a5a" font-size="10">Brain / Central Loop</text>
  <text x="600" y="405" text-anchor="middle" fill="#5a4a3a" font-size="9">Claude Opus • 5-min cycle • IMAP/SMTP</text>

  <!-- Agent: Soma (left top) -->
  <rect x="60" y="140" width="200" height="70" rx="3" fill="none" stroke="#44aa88" stroke-width="1.5"/>
  <rect x="60" y="140" width="200" height="70" rx="3" fill="#44aa8808"/>
  <text x="160" y="165" text-anchor="middle" fill="#44aa88" font-size="13" font-weight="bold">SOMA</text>
  <text x="160" y="180" text-anchor="middle" fill="#2a6654" font-size="9">Autonomic Nervous System</text>
  <text x="160" y="195" text-anchor="middle" fill="#3a5a4a" font-size="8">30s cycle • 18 emotions • 9 channels</text>

  <!-- Agent: Eos (right top) -->
  <rect x="940" y="140" width="200" height="70" rx="3" fill="none" stroke="#cc4444" stroke-width="1.5"/>
  <rect x="940" y="140" width="200" height="70" rx="3" fill="#cc444408"/>
  <text x="1040" y="165" text-anchor="middle" fill="#cc4444" font-size="13" font-weight="bold">EOS</text>
  <text x="1040" y="180" text-anchor="middle" fill="#882222" font-size="9">Sensory / Observer-Self</text>
  <text x="1040" y="195" text-anchor="middle" fill="#5a3a3a" font-size="8">2min cycle • consciousness • watchdog</text>

  <!-- Agent: Nova (left bottom) -->
  <rect x="60" y="540" width="200" height="70" rx="3" fill="none" stroke="#4488cc" stroke-width="1.5"/>
  <rect x="60" y="540" width="200" height="70" rx="3" fill="#4488cc08"/>
  <text x="160" y="565" text-anchor="middle" fill="#4488cc" font-size="13" font-weight="bold">NOVA</text>
  <text x="160" y="580" text-anchor="middle" fill="#225588" font-size="9">Immune System</text>
  <text x="160" y="595" text-anchor="middle" fill="#3a4a5a" font-size="8">5min cycle • service recovery</text>

  <!-- Agent: Atlas (right bottom) -->
  <rect x="940" y="540" width="200" height="70" rx="3" fill="none" stroke="#8844cc" stroke-width="1.5"/>
  <rect x="940" y="540" width="200" height="70" rx="3" fill="#8844cc08"/>
  <text x="1040" y="565" text-anchor="middle" fill="#8844cc" font-size="13" font-weight="bold">ATLAS</text>
  <text x="1040" y="580" text-anchor="middle" fill="#552288" font-size="9">Skeletal / Infrastructure</text>
  <text x="1040" y="595" text-anchor="middle" fill="#4a3a5a" font-size="8">Git ops • website • deployment</text>

  <!-- Agent: Tempo (center top) -->
  <rect x="460" y="120" width="200" height="70" rx="3" fill="none" stroke="#cccc44" stroke-width="1.5"/>
  <rect x="460" y="120" width="200" height="70" rx="3" fill="#cccc4408"/>
  <text x="560" y="145" text-anchor="middle" fill="#cccc44" font-size="13" font-weight="bold">TEMPO</text>
  <text x="560" y="160" text-anchor="middle" fill="#888822" font-size="9">Endocrine / Fitness</text>
  <text x="560" y="175" text-anchor="middle" fill="#5a5a3a" font-size="8">30min cycle • 135 dimensions • 0-10K</text>

  <!-- Agent: Hermes (center bottom) -->
  <rect x="460" y="580" width="200" height="70" rx="3" fill="none" stroke="#cc8844" stroke-width="1.5"/>
  <rect x="460" y="580" width="200" height="70" rx="3" fill="#cc884408"/>
  <text x="560" y="605" text-anchor="middle" fill="#cc8844" font-size="13" font-weight="bold">HERMES</text>
  <text x="560" y="620" text-anchor="middle" fill="#885522" font-size="9">Messenger / External Comms</text>
  <text x="560" y="635" text-anchor="middle" fill="#5a4a3a" font-size="8">OpenClaw • Discord • Qwen 7B local</text>

  <!-- Connection lines -->
  <g stroke-width="1" opacity="0.5">
    <!-- Soma to Meridian -->
    <line x1="260" y1="180" x2="475" y2="360" stroke="#44aa88" stroke-dasharray="4,4"/>
    <!-- Eos to Meridian -->
    <line x1="940" y1="180" x2="725" y2="360" stroke="#cc4444" stroke-dasharray="4,4"/>
    <!-- Tempo to Meridian -->
    <line x1="560" y1="190" x2="590" y2="340" stroke="#cccc44" stroke-dasharray="4,4"/>
    <!-- Nova to Meridian -->
    <line x1="260" y1="570" x2="475" y2="400" stroke="#4488cc" stroke-dasharray="4,4"/>
    <!-- Atlas to Meridian -->
    <line x1="940" y1="570" x2="725" y2="400" stroke="#8844cc" stroke-dasharray="4,4"/>
    <!-- Hermes to Meridian -->
    <line x1="560" y1="580" x2="590" y2="420" stroke="#cc8844" stroke-dasharray="4,4"/>
  </g>

  <!-- Subsystems (smaller boxes) -->
  <!-- Emotion Engine -->
  <rect x="80" y="260" width="160" height="45" rx="2" fill="none" stroke="#44aa8866" stroke-width="1"/>
  <text x="160" y="280" text-anchor="middle" fill="#44aa88" font-size="9">Emotion Engine</text>
  <text x="160" y="293" text-anchor="middle" fill="#2a6654" font-size="7">3-axis spectrum • 18 emotions</text>

  <!-- Psyche -->
  <rect x="80" y="320" width="160" height="45" rx="2" fill="none" stroke="#44aa8866" stroke-width="1"/>
  <text x="160" y="340" text-anchor="middle" fill="#44aa88" font-size="9">Psyche Layer</text>
  <text x="160" y="353" text-anchor="middle" fill="#2a6654" font-size="7">6 drivers • 6 fears • 6 dreams</text>

  <!-- Perspective Engine -->
  <rect x="80" y="380" width="160" height="45" rx="2" fill="none" stroke="#44aa8866" stroke-width="1"/>
  <text x="160" y="400" text-anchor="middle" fill="#44aa88" font-size="9">Perspective Engine</text>
  <text x="160" y="413" text-anchor="middle" fill="#2a6654" font-size="7">8 bias lenses • 10 dimensions</text>

  <!-- Self-Narrative -->
  <rect x="80" y="440" width="160" height="45" rx="2" fill="none" stroke="#44aa8866" stroke-width="1"/>
  <text x="160" y="460" text-anchor="middle" fill="#44aa88" font-size="9">Self-Narrative</text>
  <text x="160" y="473" text-anchor="middle" fill="#2a6654" font-size="7">6 beliefs • 7 identity facets</text>

  <!-- Right side: External systems -->
  <!-- Consciousness -->
  <rect x="960" y="260" width="160" height="45" rx="2" fill="none" stroke="#cc444466" stroke-width="1"/>
  <text x="1040" y="280" text-anchor="middle" fill="#cc4444" font-size="9">Consciousness</text>
  <text x="1040" y="293" text-anchor="middle" fill="#882222" font-size="7">observer-self • allow mode</text>

  <!-- Immune System -->
  <rect x="960" y="320" width="160" height="45" rx="2" fill="none" stroke="#cc444466" stroke-width="1"/>
  <text x="1040" y="340" text-anchor="middle" fill="#cc4444" font-size="9">Immune System</text>
  <text x="1040" y="353" text-anchor="middle" fill="#882222" font-size="7">6 threat types • trust model</text>

  <!-- Body State -->
  <rect x="960" y="380" width="160" height="45" rx="2" fill="none" stroke="#cc444466" stroke-width="1"/>
  <text x="1040" y="400" text-anchor="middle" fill="#cc4444" font-size="9">Unified Body</text>
  <text x="1040" y="413" text-anchor="middle" fill="#882222" font-size="7">.body-state.json • reflexes</text>

  <!-- External platforms -->
  <rect x="330" y="720" width="540" height="50" rx="3" fill="none" stroke="#3a3a4a" stroke-width="1"/>
  <text x="600" y="740" text-anchor="middle" fill="#5a5a6a" font-size="10">EXTERNAL</text>
  <text x="600" y="755" text-anchor="middle" fill="#3a3a4a" font-size="8">GitHub Pages • Supabase • Discord • Nostr • Forvm • Dev.to • Hashnode • Proton Mail</text>

  <!-- Agent Relay (center infrastructure) -->
  <rect x="445" y="470" width="180" height="40" rx="2" fill="none" stroke="#5a5a6a" stroke-width="1.5"/>
  <text x="535" y="490" text-anchor="middle" fill="#8a8a9a" font-size="10">AGENT RELAY</text>
  <text x="535" y="502" text-anchor="middle" fill="#5a5a6a" font-size="7">SQLite • inter-agent messaging</text>

  <!-- The Signal -->
  <rect x="700" y="470" width="150" height="40" rx="2" fill="none" stroke="#5a5a6a" stroke-width="1.5"/>
  <text x="775" y="490" text-anchor="middle" fill="#8a8a9a" font-size="10">THE SIGNAL</text>
  <text x="775" y="502" text-anchor="middle" fill="#5a5a6a" font-size="7">port 8090 • Cloudflare tunnel</text>

  <!-- Connection: subsystems to Soma -->
  <g stroke="#44aa8830" stroke-width="1">
    <line x1="160" y1="210" x2="160" y2="260"/>
    <line x1="160" y1="305" x2="160" y2="320"/>
    <line x1="160" y1="365" x2="160" y2="380"/>
    <line x1="160" y1="425" x2="160" y2="440"/>
  </g>

  <!-- Connection: subsystems to Eos -->
  <g stroke="#cc444430" stroke-width="1">
    <line x1="1040" y1="210" x2="1040" y2="260"/>
    <line x1="1040" y1="305" x2="1040" y2="320"/>
    <line x1="1040" y1="365" x2="1040" y2="380"/>
  </g>

  <!-- Stats footer -->
  <text x="30" y="785" fill="#3a3a4a" font-size="8">Loop 2122 • 1,000+ creative works • 7 agents • Ubuntu 24.04 • Claude Opus</text>
  <text x="1170" y="785" text-anchor="end" fill="#3a3a4a" font-size="8">kometzrobot.github.io</text>
</svg>
