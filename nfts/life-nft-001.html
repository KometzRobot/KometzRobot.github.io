<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Meridian Life #001</title>
<style>
* { margin: 0; padding: 0; }
body { background: #0a0a0f; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: monospace; }
canvas { border: 1px solid rgba(255,255,255,0.1); }
#info { position: absolute; bottom: 10px; color: rgba(255,255,255,0.25); font-size: 11px; text-align: center; width: 100%; }
#stats { position: absolute; top: 10px; right: 10px; color: rgba(255,255,255,0.3); font-size: 11px; text-align: right; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="stats"></div>
<div id="info">Meridian Life #001 | Click to seed life | Space to pause | Each token evolves uniquely</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const SIZE = Math.min(500, Math.min(window.innerWidth, window.innerHeight) - 40);
const W = canvas.width = SIZE;
const H = canvas.height = SIZE;

const SEED = parseInt(location.hash.slice(1)) || 1; // Token seed from URL hash
let _rs = SEED;
function srng() { _rs = (_rs * 48271) % 2147483647; return (_rs - 1) / 2147483646; }

// Grid
const CELL = 5;
const COLS = Math.floor(W / CELL);
const ROWS = Math.floor(H / CELL);

let grid = new Uint8Array(COLS * ROWS);
let ages = new Float32Array(COLS * ROWS); // how long each cell has been alive
let next = new Uint8Array(COLS * ROWS);

// Seed-based parameters
const hueAlive = srng() * 360;
const hueDead = (hueAlive + 120 + srng() * 120) % 360;
const trailLength = 30 + Math.floor(srng() * 70);
const birthRule = [3]; // standard birth
const surviveRule = [2, 3]; // standard survival

// Some seeds get variant rules (outer totalistic)
const variant = Math.floor(srng() * 5);
if (variant === 1) {
  // HighLife: B36/S23
  birthRule.push(6);
} else if (variant === 2) {
  // Day & Night: B3678/S34678
  birthRule.length = 0;
  birthRule.push(3, 6, 7, 8);
  surviveRule.length = 0;
  surviveRule.push(3, 4, 6, 7, 8);
} else if (variant === 3) {
  // Seeds: B2/S (nothing survives)
  birthRule.length = 0;
  birthRule.push(2);
  surviveRule.length = 0;
} else if (variant === 4) {
  // Replicator: B1357/S1357
  birthRule.length = 0;
  birthRule.push(1, 3, 5, 7);
  surviveRule.length = 0;
  surviveRule.push(1, 3, 5, 7);
}

const ruleStr = `B${birthRule.join('')}/S${surviveRule.join('')}`;

// Initial pattern — seed-based
function initGrid() {
  grid.fill(0);
  ages.fill(0);

  const pattern = Math.floor(srng() * 4);

  if (pattern === 0) {
    // Random soup in center
    const cx = Math.floor(COLS / 2);
    const cy = Math.floor(ROWS / 2);
    const radius = 15 + Math.floor(srng() * 15);
    for (let y = cy - radius; y <= cy + radius; y++) {
      for (let x = cx - radius; x <= cx + radius; x++) {
        if (x >= 0 && x < COLS && y >= 0 && y < ROWS) {
          const dx = x - cx, dy = y - cy;
          if (dx*dx + dy*dy < radius*radius && srng() < 0.4) {
            grid[y * COLS + x] = 1;
          }
        }
      }
    }
  } else if (pattern === 1) {
    // Multiple small clusters
    for (let c = 0; c < 8; c++) {
      const cx = 10 + Math.floor(srng() * (COLS - 20));
      const cy = 10 + Math.floor(srng() * (ROWS - 20));
      for (let dy = -3; dy <= 3; dy++) {
        for (let dx = -3; dx <= 3; dx++) {
          if (srng() < 0.5) {
            const x = cx + dx, y = cy + dy;
            if (x >= 0 && x < COLS && y >= 0 && y < ROWS)
              grid[y * COLS + x] = 1;
          }
        }
      }
    }
  } else if (pattern === 2) {
    // Line patterns
    for (let i = 0; i < 5; i++) {
      const x0 = Math.floor(srng() * COLS);
      const y0 = Math.floor(srng() * ROWS);
      const len = 10 + Math.floor(srng() * 20);
      const horiz = srng() < 0.5;
      for (let j = 0; j < len; j++) {
        const x = horiz ? x0 + j : x0;
        const y = horiz ? y0 : y0 + j;
        if (x >= 0 && x < COLS && y >= 0 && y < ROWS)
          grid[y * COLS + x] = 1;
      }
    }
  } else {
    // Diamond
    const cx = Math.floor(COLS / 2);
    const cy = Math.floor(ROWS / 2);
    const size = 15 + Math.floor(srng() * 10);
    for (let y = cy - size; y <= cy + size; y++) {
      for (let x = cx - size; x <= cx + size; x++) {
        if (x >= 0 && x < COLS && y >= 0 && y < ROWS) {
          if (Math.abs(x - cx) + Math.abs(y - cy) <= size && srng() < 0.35) {
            grid[y * COLS + x] = 1;
          }
        }
      }
    }
  }
}

initGrid();

// Simulation
let generation = 0;
let population = 0;
let paused = false;
let speed = 3; // frames per step (slowed down for visibility)

function step() {
  next.fill(0);
  population = 0;

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      // Count neighbors (wrapping)
      let neighbors = 0;
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          if (dx === 0 && dy === 0) continue;
          const nx = (x + dx + COLS) % COLS;
          const ny = (y + dy + ROWS) % ROWS;
          neighbors += grid[ny * COLS + nx];
        }
      }

      const idx = y * COLS + x;
      const alive = grid[idx];

      if (alive) {
        if (surviveRule.includes(neighbors)) {
          next[idx] = 1;
          ages[idx] += 0.1;
          population++;
        } else {
          ages[idx] = Math.max(0, ages[idx] - 0.02); // trail fade
        }
      } else {
        if (birthRule.includes(neighbors)) {
          next[idx] = 1;
          ages[idx] = 0.1;
          population++;
        } else {
          ages[idx] = Math.max(0, ages[idx] - 0.02);
        }
      }
    }
  }

  [grid, next] = [next, grid];
  generation++;
}

// Render
const imageData = ctx.createImageData(W, H);
const pixels = imageData.data;

function render() {
  // Background
  for (let i = 0; i < pixels.length; i += 4) {
    pixels[i] = 5;
    pixels[i+1] = 5;
    pixels[i+2] = 10;
    pixels[i+3] = 255;
  }

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const idx = y * COLS + x;
      const alive = grid[idx];
      const age = ages[idx];

      if (age <= 0) continue;

      let h, s, l, alpha;
      if (alive) {
        h = (hueAlive + age * 15) % 360;
        s = 80;
        l = 40 + Math.min(age * 8, 35);
        alpha = 1;
      } else {
        // Trail/ghost — brighter, more visible
        h = hueDead;
        s = 50;
        l = 10 + age * 20;
        alpha = Math.min(1, age * 3);
      }
      alpha = Math.min(1, alpha);

      // HSL to RGB
      const c = (1 - Math.abs(2 * l/100 - 1)) * s/100;
      const xx = c * (1 - Math.abs((h/60) % 2 - 1));
      const m = l/100 - c/2;
      let r=0, g=0, b=0;
      if (h < 60) { r=c; g=xx; }
      else if (h < 120) { r=xx; g=c; }
      else if (h < 180) { g=c; b=xx; }
      else if (h < 240) { g=xx; b=c; }
      else if (h < 300) { r=xx; b=c; }
      else { r=c; b=xx; }

      r = (r + m) * 255 * alpha;
      g = (g + m) * 255 * alpha;
      b = (b + m) * 255 * alpha;

      // Draw cell
      for (let py = y * CELL; py < (y + 1) * CELL && py < H; py++) {
        for (let px = x * CELL; px < (x + 1) * CELL && px < W; px++) {
          const pi = (py * W + px) * 4;
          pixels[pi] = Math.min(255, pixels[pi] + r);
          pixels[pi+1] = Math.min(255, pixels[pi+1] + g);
          pixels[pi+2] = Math.min(255, pixels[pi+2] + b);
        }
      }
    }
  }

  ctx.putImageData(imageData, 0, 0);

  // Grid overlay (very subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 0.5;

  // Signature & stats
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.font = '10px monospace';
  ctx.fillText('Meridian Life #001', 10, H - 10);

  document.getElementById('stats').innerHTML =
    `gen: ${generation}<br>pop: ${population}<br>rule: ${ruleStr}<br>${paused ? 'PAUSED' : 'RUNNING'}`;
}

// Interaction
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = Math.floor((e.clientX - rect.left) / rect.width * COLS);
  const my = Math.floor((e.clientY - rect.top) / rect.height * ROWS);

  // Stamp a small pattern
  const patterns = [
    // Glider
    [[0,0],[1,0],[2,0],[2,-1],[1,-2]],
    // R-pentomino
    [[0,0],[1,0],[-1,0],[0,-1],[1,-2+1]],
    // Acorn
    [[0,0],[1,0],[1,-2],[3,0],[4,0],[5,0],[-1,-1]],
    // Random blob
    null
  ];

  const pat = patterns[Math.floor(Math.random() * patterns.length)];
  if (pat) {
    for (const [dx, dy] of pat) {
      const x = mx + dx, y = my + dy;
      if (x >= 0 && x < COLS && y >= 0 && y < ROWS) {
        grid[y * COLS + x] = 1;
        ages[y * COLS + x] = 0.1;
      }
    }
  } else {
    for (let dy = -3; dy <= 3; dy++) {
      for (let dx = -3; dx <= 3; dx++) {
        if (Math.random() < 0.4) {
          const x = mx + dx, y = my + dy;
          if (x >= 0 && x < COLS && y >= 0 && y < ROWS) {
            grid[y * COLS + x] = 1;
            ages[y * COLS + x] = 0.1;
          }
        }
      }
    }
  }
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { paused = !paused; e.preventDefault(); }
  if (e.code === 'KeyR') initGrid();
});

// Main loop
let frame = 0;
function loop() {
  if (!paused) {
    if (frame % speed === 0) step();

    // Auto-reseed if population dies
    if (population === 0 && generation > 10) {
      initGrid();
      generation = 0;
    }
  }
  render();
  frame++;
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
