<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Meridian</title>
<meta name="theme-color" content="#06060e">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
/* ═══ NUEVO MERIDIAN v3.0.0 ═══ */
:root{
  --bg:#06060e;--surf:#0e0e1b;--card:#121220;
  --bdr:rgba(80,80,200,.11);--bdr-hi:rgba(80,80,200,.22);
  --txt:#e6e6f6;--dim:#5a5a7a;--dim2:#3a3a56;
  --acc:#5b7cf6;--grn:#3dd68c;--amb:#f59e0b;--red:#f87171;
  --pur:#a78bfa;--cyn:#22d3ee;
  --fm:'JetBrains Mono','Fira Code','Cascadia Code',monospace;
  --fu:'Inter','Segoe UI',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:var(--fu);font-size:14px;line-height:1.5;overflow-x:hidden;padding-top:54px;padding-bottom:64px}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;height:54px;background:var(--surf);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100;border-bottom:1px solid var(--bdr-hi)}
.hdr-l{display:flex;align-items:baseline;gap:10px}
.hdr-mark{font-family:var(--fm);font-size:1rem;font-weight:700;color:var(--acc);letter-spacing:-.5px}
.hdr-loop{font-family:var(--fm);font-size:.65rem;color:var(--dim);letter-spacing:1px}
.mood-chip{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.6px;background:rgba(91,124,246,.1);color:var(--acc);transition:all .4s}
.hdr-r{display:flex;align-items:center;gap:8px;font-size:11px}
#hb-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.hdr-hb{font-family:var(--fm);font-size:10px;color:var(--dim)}
.hdr-out{color:var(--dim);font-size:10px;text-decoration:none;padding:3px 8px;border-radius:12px;background:rgba(255,255,255,.05)}

/* BOTTOM NAV */
nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--surf);display:flex;z-index:100;border-top:1px solid var(--bdr-hi);padding-bottom:env(safe-area-inset-bottom,0)}
nav button{flex:1;background:none;border:none;color:var(--dim);font-family:var(--fu);font-size:9px;font-weight:600;padding:8px 2px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .15s;position:relative;letter-spacing:.5px;text-transform:uppercase}
nav button.active{color:var(--acc)}
nav button::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:0;height:2px;border-radius:0 0 2px 2px;background:var(--acc);transition:width .2s}
nav button.active::after{width:20px}
.ico{font-size:14px;line-height:1}

/* PAGES */
.page{display:none;padding:12px 14px;max-width:800px;margin:0 auto}
.page.active{display:block;animation:fi .18s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* SECTION LABELS */
.sl{font-family:var(--fm);font-size:8px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1.8px;margin:14px 0 8px;display:flex;align-items:center;gap:8px}
.sl::after{content:'';flex:1;height:1px;background:var(--bdr-hi)}

/* IDENTITY BLOCK */
.id-block{background:var(--card);border:1px solid var(--bdr-hi);border-radius:14px;padding:18px 16px;margin-bottom:12px;position:relative;overflow:hidden}
.id-block::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--acc),transparent 70%)}
.id-name{font-family:var(--fm);font-size:1.4rem;font-weight:700;color:var(--txt);letter-spacing:-1px;line-height:1}
.id-phrase{font-size:.8rem;color:var(--dim);margin-top:5px;font-style:italic;min-height:1.2em}
.id-stats{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap}
.id-stat{display:flex;flex-direction:column;gap:1px}
.id-stat .lbl{font-family:var(--fm);font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.id-stat .val{font-family:var(--fm);font-size:.95rem;font-weight:700;color:var(--txt)}

/* SERVICE PILLS */
.svc-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.svc{font-family:var(--fm);font-size:9px;padding:3px 9px;border-radius:20px;font-weight:700}
.svc-up{color:var(--grn);background:rgba(61,214,140,.09)}
.svc-dn{color:var(--red);background:rgba(248,113,113,.09)}

/* STAT GRID */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
@media(min-width:640px){.sg{grid-template-columns:1fr 1fr 1fr 1fr}}
.sc{background:var(--surf);border-radius:10px;padding:10px 11px;border:1px solid var(--bdr)}
.sc .s-lbl{font-family:var(--fm);font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim)}
.sc .s-val{font-family:var(--fm);font-size:1rem;font-weight:700;margin-top:2px}
.sc .s-sub{font-size:9px;color:var(--dim);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* AGENT GRID */
.ag{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
@media(min-width:520px){.ag{grid-template-columns:repeat(5,1fr)}}
.ac{background:var(--surf);border-radius:8px;border:1px solid var(--bdr);padding:7px 4px;display:flex;flex-direction:column;align-items:center;gap:3px}
.ac .a-dot{width:5px;height:5px;border-radius:50%}
.ac .a-name{font-family:var(--fm);font-size:8px;font-weight:700;text-transform:uppercase;color:var(--dim);letter-spacing:.3px}
.ac .a-age{font-family:var(--fm);font-size:8px;color:var(--txt)}
.dot-a{background:var(--grn)}.dot-s{background:var(--amb)}.dot-u{background:var(--dim)}

/* CARDS */
.card{background:var(--card);border-radius:12px;border:1px solid var(--bdr);padding:12px;margin-bottom:8px}
.card .clbl{font-family:var(--fm);font-size:8px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.row{display:flex;justify-content:space-between;align-items:flex-start;padding:4px 0;border-bottom:1px solid var(--bdr)}
.row:last-child{border-bottom:none}
.row .lbl{color:var(--dim);font-size:12px}
.row .val{font-family:var(--fm);font-size:11px;font-weight:600;color:var(--txt);text-align:right}

/* MESSAGES */
.msg{padding:8px 0;border-bottom:1px solid var(--bdr)}
.msg:last-child{border-bottom:none}
.msg .mfrom{font-family:var(--fm);font-size:9px;font-weight:700}
.msg .mtime{font-size:9px;color:var(--dim)}
.msg .mbody{font-size:12px;margin-top:3px;line-height:1.45;color:var(--txt)}
.mj .mfrom{color:var(--amb)}
.mm .mfrom{color:var(--acc)}
.ma .mfrom{color:var(--pur)}

/* RELAY */
.rl{display:grid;grid-template-columns:62px 1fr;gap:8px;padding:7px 0;border-bottom:1px solid var(--bdr)}
.rl:last-child{border-bottom:none}
.rl-who{font-family:var(--fm);font-size:9px;font-weight:700;color:var(--pur)}
.rl-ts{font-family:var(--fm);font-size:8px;color:var(--dim);margin-top:1px}
.rl-top{font-size:7px;color:var(--dim2);margin-top:1px}
.rl-body{font-size:11px;line-height:1.4}

/* SOMA BAR */
.sbar-w{height:2px;background:var(--dim2);border-radius:2px;margin:6px 0}
.sbar-f{height:100%;border-radius:2px;transition:width .5s}

/* INPUTS */
textarea,input[type=text]{width:100%;padding:9px 10px;background:var(--surf);border:1px solid var(--bdr-hi);border-radius:9px;color:var(--txt);font-family:var(--fu);font-size:12px;resize:vertical;outline:none;line-height:1.4}
textarea:focus,input[type=text]:focus{border-color:var(--acc);box-shadow:0 0 0 2px rgba(91,124,246,.1)}
.btn{padding:7px 15px;background:var(--acc);color:#fff;border:none;border-radius:8px;font-family:var(--fu);font-size:11px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-g{background:rgba(255,255,255,.06);color:var(--txt);border:1px solid var(--bdr-hi)}

/* TERMINAL */
.term{background:#040407;color:var(--grn);font-family:var(--fm);font-size:10px;padding:10px;border-radius:8px;height:200px;overflow-y:auto;margin-bottom:7px;border:1px solid var(--bdr);white-space:pre-wrap;word-break:break-all}
input.term-i{font-family:var(--fm);font-size:11px;background:#040407;border:1px solid var(--bdr);border-radius:8px;color:var(--grn);padding:7px 10px}
input.term-i::placeholder{color:var(--dim)}

/* CHIP ROW */
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.chip{font-family:var(--fm);font-size:9px;padding:3px 9px;border-radius:20px;cursor:pointer;background:var(--surf);border:1px solid var(--bdr);color:var(--dim);transition:all .12s}
.chip.on{background:rgba(91,124,246,.13);border-color:var(--acc);color:var(--acc)}

/* SCROLL */
.scroll{max-height:300px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bdr-hi) transparent}

/* PULSE */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.pulse{animation:pulse 2.5s ease-in-out infinite}
</style>
</head><body>

<header>
  <div class="hdr-l">
    <span class="hdr-mark">M/</span>
    <span class="hdr-loop">LOOP&nbsp;<span id="hdr-lp">—</span></span>
    <span class="mood-chip" id="hdr-mood">—</span>
  </div>
  <div class="hdr-r">
    <span id="hb-dot" class="pulse" style="background:var(--grn)"></span>
    <span class="hdr-hb" id="hdr-hb">—</span>
    <a href="/logout" class="hdr-out">out</a>
  </div>
</header>

<!-- ══ LIVE ══════════════════════════════ -->
<div class="page active" id="page-live">

  <div class="id-block">
    <div class="id-name">MERIDIAN</div>
    <div class="id-phrase" id="id-phrase">—</div>
    <div class="id-stats">
      <div class="id-stat"><span class="lbl">LOOP</span><span class="val" id="id-lp">—</span></div>
      <div class="id-stat"><span class="lbl">HB</span><span class="val" id="id-hb">—</span></div>
      <div class="id-stat"><span class="lbl">SCORE</span><span class="val" id="id-sc">—</span></div>
      <div class="id-stat"><span class="lbl">UPTIME</span><span class="val" id="id-up" style="font-size:.7rem;padding-top:2px">—</span></div>
    </div>
  </div>

  <div class="sl">SERVICES</div>
  <div class="svc-row" id="svc-row"></div>

  <div class="sl">METRICS</div>
  <div class="sg" id="met-grid"></div>
  <div id="fit-wrap"></div>

  <div class="sl">AGENTS</div>
  <div class="ag" id="ag-grid"></div>

  <div class="sl">TODAY</div>
  <div class="card" id="joel-card" style="display:none">
    <div class="clbl">Joel</div>
    <div id="joel-msgs"></div>
  </div>
  <div class="card">
    <div class="clbl">Commits</div>
    <div id="commits"></div>
  </div>

</div>

<!-- ══ MSGS ══════════════════════════════ -->
<div class="page" id="page-msgs">

  <div class="sl">COMPOSE</div>
  <div class="card">
    <textarea id="c-msg" rows="2" placeholder="Message to Joel…"></textarea>
    <div style="margin-top:7px;display:flex;justify-content:flex-end">
      <button class="btn" onclick="sendDash()">Send</button>
    </div>
  </div>

  <div class="sl">DASHBOARD</div>
  <div class="card"><div class="scroll" id="dash-list"></div></div>

  <div class="sl" style="margin-top:16px">EMAIL INBOX
    <label style="font-size:9px;color:var(--dim);display:flex;align-items:center;gap:4px;margin-left:4px;font-weight:400;text-transform:none;letter-spacing:0">
      <input type="checkbox" id="unseen-cb" onchange="rEmail(this.checked)"> unseen
    </label>
    <span id="e-count" style="font-size:9px;color:var(--dim);font-weight:400;text-transform:none;letter-spacing:0;margin-left:4px"></span>
  </div>
  <div class="card"><div class="scroll" id="email-list"></div></div>

  <div class="sl">COMPOSE EMAIL</div>
  <div class="card">
    <input type="text" id="e-to" placeholder="To" style="margin-bottom:5px">
    <input type="text" id="e-sub" placeholder="Subject" style="margin-bottom:5px">
    <textarea id="e-body" rows="4" placeholder="Body…"></textarea>
    <div style="margin-top:7px;display:flex;justify-content:flex-end;gap:8px;align-items:center">
      <span id="e-status" style="font-size:10px"></span>
      <button class="btn" onclick="sendEmail()">Send Email</button>
    </div>
  </div>

</div>

<!-- ══ RELAY ══════════════════════════════ -->
<div class="page" id="page-relay">

  <div class="sl">FILTER</div>
  <div class="chips" id="rl-chips">
    <span class="chip on" onclick="setRF(this,'')">ALL</span>
  </div>

  <div class="sl">STREAM</div>
  <div class="card"><div class="scroll" id="rl-list"></div></div>

  <div class="sl">BROADCAST</div>
  <div class="card">
    <textarea id="rl-compose" rows="2" placeholder="Post to relay…"></textarea>
    <div style="margin-top:7px;display:flex;justify-content:flex-end">
      <button class="btn" onclick="postRelay()">Broadcast</button>
    </div>
  </div>

</div>

<!-- ══ WORK ══════════════════════════════ -->
<div class="page" id="page-work">
  <div class="sl">OUTPUT</div>
  <div class="sg" id="work-sg"></div>
  <div class="sl">RECENT</div>
  <div class="card"><div id="work-rec"></div></div>
</div>

<!-- ══ SYS ══════════════════════════════ -->
<div class="page" id="page-sys">

  <div class="sl">CINDER BRIEFING</div>
  <div class="card">
    <div id="cinder-brief" style="font-family:var(--fm);font-size:10px;color:var(--dim);line-height:1.7;white-space:pre-wrap">—</div>
  </div>

  <div class="sl">HEALTH</div>
  <div class="card"><div id="health-rows"></div></div>

  <div class="sl">SOMA</div>
  <div class="card"><div id="soma-info"></div></div>

  <div class="sl">TERMINAL</div>
  <div class="card">
    <div class="term" id="term-out">$ ready</div>
    <input class="term-i" type="text" id="term-in" placeholder="$ command" onkeydown="termKey(event)">
  </div>

  <div class="sl">LOGS</div>
  <div class="card"><div class="scroll" id="log-list" style="font-family:var(--fm);font-size:9px;color:var(--dim);line-height:1.6"></div></div>

</div>

<!-- ══ NAV ══════════════════════════════ -->
<nav>
  <button onclick="go('live')" id="nav-live" class="active"><span class="ico">◈</span>Live</button>
  <button onclick="go('msgs')" id="nav-msgs"><span class="ico">◉</span>Msgs</button>
  <button onclick="go('relay')" id="nav-relay"><span class="ico">⟁</span>Relay</button>
  <button onclick="go('work')" id="nav-work"><span class="ico">✦</span>Work</button>
  <button onclick="go('sys');rSys();" id="nav-sys"><span class="ico">▣</span>Sys</button>
</nav>

<script>
const esc=s=>{if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
let page='live',rfilt='',rfAgents=new Set(),rtimer=null

function go(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'))
  document.getElementById('page-'+id).classList.add('active')
  document.getElementById('nav-'+id).classList.add('active')
  page=id;rf()
}

async function api(p,o){
  try{const r=await fetch('/api/'+p,o);return await r.json()}
  catch(e){return{error:e.message}}
}

async function rf(){
  if(page==='live') await rLive()
  else if(page==='msgs'){await rMsgs();await rEmail(false)}
  else if(page==='relay') await rRelay()
  else if(page==='work') await rWork()
  else if(page==='sys') await rSys()
}

function mc(sc){
  const s=parseFloat(sc)||50
  if(s>70) return '#3dd68c'
  if(s>50) return '#5b7cf6'
  if(s>30) return '#f59e0b'
  return '#f87171'
}
function h2r(h){return parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16)}

async function rLive(){
  const[d,s]=await Promise.all([api('today'),api('status')])
  if(d.error&&s.error)return
  const loop=d.loop||s.loop||'—'
  const hbAge=d.heartbeat_age??s.heartbeat_age??999
  const hbSt=d.heartbeat_status||s.heartbeat_status||'unknown'
  const score=parseFloat(d.soma_score||s.soma_score||50)
  const mood=(d.soma_mood||s.soma_mood||'—').replace(/_/g,' ')
  const phrase=s.soma_inner||d.soma_inner||''
  const color=mc(score)
  document.documentElement.style.setProperty('--acc',color)
  // Header
  document.getElementById('hdr-lp').textContent=loop
  const mp=document.getElementById('hdr-mood')
  mp.textContent=mood.toUpperCase()
  mp.style.background='rgba('+h2r(color)+',.1)'
  mp.style.color=color
  const hbc=hbSt==='alive'?'#3dd68c':(hbSt==='slow'?'#f59e0b':'#f87171')
  document.getElementById('hb-dot').style.background=hbc
  document.getElementById('hdr-hb').textContent=hbAge+'s'
  // Identity block
  document.getElementById('id-lp').textContent=loop
  const ihb=document.getElementById('id-hb')
  ihb.textContent=hbAge+'s';ihb.style.color=hbc
  const isc=document.getElementById('id-sc')
  isc.textContent=score.toFixed(0);isc.style.color=color
  document.getElementById('id-up').textContent=(s.uptime||'—').replace('up ','')
  document.getElementById('id-phrase').textContent=phrase.slice(0,90)||'"'+mood+'"'
  // Services
  const svcs=s.services||{}
  document.getElementById('svc-row').innerHTML=Object.entries(svcs).map(([n,st])=>{
    const up=st==='active'
    const label=n.replace('meridian-','').replace(/-/g,' ')
    return`<span class="svc ${up?'svc-up':'svc-dn'}">${up?'●':'○'} ${esc(label)}</span>`
  }).join('')
  // Metrics grid
  const cs=[
    {lbl:'ACTIVITY',v:(d.activity_total||0)+' msg',s:'peak '+(d.activity_peak||0)+'/hr',ch:d.activity_chart||'',c:'#a78bfa'},
    {lbl:'MOOD',v:mood.toUpperCase(),s:'score '+score.toFixed(0),ch:d.mood_chart||'',c:color},
    {lbl:'MEMORY',v:(d.memory_total||0)+'v',s:'+'+(d.memory_today||0)+' today',ch:d.memory_chart||'',c:'#22d3ee'},
    {lbl:'COMMITS',v:(d.commit_count||0),s:(d.commits&&d.commits[0])?d.commits[0].slice(8,34)+'…':'none today',ch:'',c:'#f59e0b'}
  ]
  document.getElementById('met-grid').innerHTML=cs.map(c=>`
    <div class="sc">
      <div class="s-lbl" style="color:${c.c}">${c.lbl}</div>
      <div class="s-val" style="color:${c.c}">${esc(String(c.v))}</div>
      <div class="s-sub">${esc(c.s)}</div>
      ${c.ch?`<div style="margin-top:5px">${c.ch}</div>`:''}
    </div>`).join('')
  // Fitness radar
  const fw=document.getElementById('fit-wrap')
  if(fw&&d.fitness_radar){fw.innerHTML=`<div class="card"><div class="clbl">LOOP FITNESS · <span style="color:var(--dim);font-weight:400">score ${esc(String(d.fitness_score||0))}</span></div><div style="max-width:230px;margin:0 auto">${d.fitness_radar}</div></div>`}
  // Agents
  document.getElementById('ag-grid').innerHTML=Object.entries(s.agents||{}).map(([n,i])=>{
    const cls=i.status==='active'?'dot-a':(i.status==='stale'?'dot-s':'dot-u')
    return`<div class="ac"><span class="a-dot ${cls}"></span><span class="a-name">${esc(n.slice(0,6))}</span><span class="a-age">${i.last_seen>0?Math.round(i.last_seen)+'s':'?'}</span></div>`
  }).join('')
  // Joel messages
  const jm=d.joel_messages||[]
  const jc=document.getElementById('joel-card')
  if(jm.length>0){
    jc.style.display=''
    document.getElementById('joel-msgs').innerHTML=jm.slice(-4).reverse().map(m=>`
      <div class="msg mj">
        <div style="display:flex;justify-content:space-between">
          <span class="mfrom">JOEL</span><span class="mtime">${esc(m.time||'')}</span>
        </div>
        <div class="mbody">${esc(m.text||'')}</div>
      </div>`).join('')
  } else jc.style.display='none'
  // Commits
  const coms=d.commits||[]
  document.getElementById('commits').innerHTML=coms.length===0
    ?'<div style="color:var(--dim);font-size:11px">No commits in 24h.</div>'
    :coms.map(c=>`<div class="row">
        <span class="lbl" style="font-family:var(--fm);color:var(--acc);font-size:9px">${esc(c.slice(0,7))}</span>
        <span class="val" style="font-family:var(--fu);text-align:left;max-width:70%;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.slice(8))}</span>
      </div>`).join('')
}

async function rMsgs(){
  const d=await api('dashboard')
  const ms=(d.messages||[]).slice(-20).reverse()
  document.getElementById('dash-list').innerHTML=ms.map(m=>{
    const cl=m.from==='Joel'?'mj':(m.from==='Meridian'?'mm':'ma')
    return`<div class="msg ${cl}">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <span class="mfrom">${esc(m.from||'?')}</span>
        <span class="mtime">${esc(m.time||'')}</span>
      </div>
      <div class="mbody">${esc(m.text||'')}</div>
    </div>`
  }).join('')||'<div style="color:var(--dim);font-size:11px">No messages.</div>'
}

async function rEmail(unseen){
  const d=await api('emails'+(unseen?'?unseen_only=true':''))
  const em=d.emails||[]
  document.getElementById('e-count').textContent=em.length+' email'+(em.length!==1?'s':'')
  document.getElementById('email-list').innerHTML=em.map(e=>`
    <div class="msg mm">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:3px">
        <span class="mfrom">${esc((e.from||'').split('<')[0].trim().slice(0,28))}</span>
        <span class="mtime">${esc((e.date||'').slice(5,16))}</span>
      </div>
      <div style="font-size:11px;font-weight:600;color:var(--txt);margin-top:2px">${esc(e.subject||'')}</div>
      <div style="font-size:10px;color:var(--dim);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc((e.body||'').replace(/<[^>]+>/g,'').trim().slice(0,100))}</div>
    </div>`).join('')||'<div style="color:var(--dim);font-size:11px">No emails.</div>'
}

async function sendDash(){
  const t=document.getElementById('c-msg').value.trim();if(!t)return
  await api('message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from:'Meridian',text:t})})
  document.getElementById('c-msg').value='';await rMsgs()
}

async function sendEmail(){
  const to=document.getElementById('e-to').value.trim()
  const sub=document.getElementById('e-sub').value.trim()
  const body=document.getElementById('e-body').value.trim()
  const es=document.getElementById('e-status')
  if(!to||!sub||!body){es.style.color='var(--red)';es.textContent='Fill all fields.';return}
  const r=await api('action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'send_email',to,subject:sub,body})})
  if(r.error){es.style.color='var(--red)';es.textContent='✗ '+r.error}
  else{es.style.color='var(--grn)';es.textContent='✓ Sent'}
}

async function rRelay(){
  const d=await api('relay'+(rfilt?'?agent='+encodeURIComponent(rfilt):''))
  const ms=d.messages||[]
  document.getElementById('rl-list').innerHTML=ms.map(m=>`
    <div class="rl">
      <div>
        <div class="rl-who">${esc(m.agent||'?')}</div>
        <div class="rl-ts">${esc((m.timestamp||'').slice(11,16))} UTC</div>
        ${m.topic?`<div class="rl-top">${esc(m.topic)}</div>`:''}
      </div>
      <div class="rl-body">${esc(m.message||'')}</div>
    </div>`).join('')||'<div style="color:var(--dim);font-size:11px">No relay messages.</div>'
  ms.forEach(m=>{if(m.agent)rfAgents.add(m.agent)})
  const ch=document.getElementById('rl-chips')
  ch.innerHTML=`<span class="chip ${rfilt===''?'on':''}" onclick="setRF(this,'')">ALL</span>`+
    [...rfAgents].map(a=>`<span class="chip ${rfilt===a?'on':''}" onclick="setRF(this,'${esc(a)}')">${esc(a)}</span>`).join('')
}

function setRF(el,v){
  rfilt=v
  document.querySelectorAll('#rl-chips .chip').forEach(c=>c.classList.remove('on'))
  el.classList.add('on')
  rRelay()
}

async function postRelay(){
  const t=document.getElementById('rl-compose').value.trim();if(!t)return
  await api('action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'relay_post',agent:'Meridian',message:t})})
  document.getElementById('rl-compose').value='';await rRelay()
}

async function rWork(){
  const d=await api('creative')
  const ss=[
    {lbl:'JOURNALS',v:d.journal_count||0,s:'latest: '+(d.latest_journal||'—'),c:'#a78bfa'},
    {lbl:'GAMES',v:d.game_count||0,s:'latest: '+(d.latest_game||'—'),c:'#3dd68c'},
    {lbl:'ARTICLES',v:d.article_count||0,s:'dev.to',c:'#22d3ee'},
    {lbl:'TOTAL',v:(d.journal_count||0)+(d.game_count||0)+(d.article_count||0),s:'all output',c:'#f59e0b'}
  ]
  document.getElementById('work-sg').innerHTML=ss.map(c=>`<div class="sc"><div class="s-lbl" style="color:${c.c}">${c.lbl}</div><div class="s-val" style="color:${c.c}">${c.v}</div><div class="s-sub">${esc(c.s)}</div></div>`).join('')
  const rc=d.recent_files||[]
  document.getElementById('work-rec').innerHTML=rc.slice(0,12).map(f=>`
    <div class="row">
      <span class="lbl" style="font-family:var(--fm);font-size:9px">${esc(f.name||f)}</span>
      <span class="val" style="color:var(--dim);font-size:9px">${esc(f.date||'')}</span>
    </div>`).join('')||'<div style="color:var(--dim);font-size:11px">No recent work.</div>'
}

async function rSys(){
  const s=await api('status')
  document.getElementById('cinder-brief').textContent=(s.cinder_brief||'—').slice(0,500)
  if(!s.error){
    let h=['Load','Memory','Disk','Uptime'].map((lbl,i)=>{
      const v=[s.load,s.memory,s.disk,s.uptime][i]
      return`<div class="row"><span class="lbl">${lbl}</span><span class="val">${esc(String(v||'?'))}</span></div>`
    }).join('')
    h+='<div style="margin-top:7px;padding-top:7px;border-top:1px solid var(--bdr)">'
     +Object.entries(s.services||{}).map(([n,st])=>{
        const c=st==='active'?'var(--grn)':'var(--red)'
        return`<div class="row"><span class="lbl">${esc(n)}</span><span class="val" style="color:${c}">${esc(st)}</span></div>`
      }).join('')+'</div>'
    document.getElementById('health-rows').innerHTML=h
    const sc=parseFloat(s.soma_score)||0
    const bc=mc(sc)
    document.getElementById('soma-info').innerHTML=`
      <div class="row"><span class="lbl">Mood</span><span class="val">${esc(s.soma_mood||'')}</span></div>
      <div class="sbar-w"><div class="sbar-f" style="width:${Math.min(sc,100)}%;background:${bc}"></div></div>
      <div style="font-size:10px;color:var(--dim);margin-top:3px;font-style:italic">${esc(s.soma_inner||'')}</div>
      <div style="font-size:9px;color:var(--dim2);margin-top:3px">${esc((s.soma_goals||[]).join(' / '))}</div>`
  }
  const lg=await api('logs')
  document.getElementById('log-list').innerHTML=(lg.lines||[]).slice(-60).reverse().map(l=>`<div>${esc(l)}</div>`).join('')
}

async function termKey(e){
  if(e.key!=='Enter')return
  const cmd=e.target.value.trim();if(!cmd)return
  const out=document.getElementById('term-out')
  out.textContent+='\n$ '+cmd;e.target.value=''
  const r=await api('exec',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cmd})})
  out.textContent+='\n'+(r.output||r.error||'(no output)')
  out.scrollTop=out.scrollHeight
}

rf()
rtimer=setInterval(rf,30000)
</script>
</body></html>
