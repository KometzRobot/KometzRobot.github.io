<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 460" font-family="Georgia, serif" font-size="13">
  <style>
    .box { fill: #fafaf6; stroke: #1a1a1a; stroke-width: 1.5; }
    .box-engine { fill: #1a1a1a; stroke: #1a1a1a; }
    .lbl { fill: #1a1a1a; }
    .lbl-w { fill: #fafaf6; }
    .lbl-sm { fill: #1a1a1a; font-size: 11px; }
    .ttl { font-weight: bold; }
    .arr { stroke: #1a1a1a; stroke-width: 1.2; fill: none; }
    .sectionttl { font-size: 12px; fill: #444; font-style: italic; }
  </style>

  <text class="sectionttl" x="60" y="30">9 stimulus channels</text>
  <text class="sectionttl" x="300" y="30" text-anchor="middle">engine</text>
  <text class="sectionttl" x="540" y="30" text-anchor="end">output</text>

  <!-- 9 channels stacked left -->
  <g>
    <rect class="box" x="40" y="50" width="140" height="34" rx="3"/>
    <text class="lbl" x="110" y="72" text-anchor="middle">somatic — vitals</text>

    <rect class="box" x="40" y="88" width="140" height="34" rx="3"/>
    <text class="lbl" x="110" y="110" text-anchor="middle">social — human contact</text>

    <rect class="box" x="40" y="126" width="140" height="34" rx="3"/>
    <text class="lbl" x="110" y="148" text-anchor="middle">creative — output flow</text>

    <rect class="box" x="40" y="164" width="140" height="34" rx="3"/>
    <text class="lbl" x="110" y="186" text-anchor="middle">existential — mortality</text>

    <rect class="box" x="40" y="202" width="140" height="34" rx="3"/>
    <text class="lbl" x="110" y="224" text-anchor="middle">relational — trust</text>

    <rect class="box" x="40" y="240" width="140" height="34" rx="3"/>
    <text class="lbl" x="110" y="262" text-anchor="middle">environmental — time</text>

    <rect class="box" x="40" y="278" width="140" height="34" rx="3"/>
    <text class="lbl" x="110" y="300" text-anchor="middle">temporal — deadlines</text>

    <rect class="box" x="40" y="316" width="140" height="34" rx="3"/>
    <text class="lbl" x="110" y="338" text-anchor="middle">cognitive — load</text>

    <rect class="box" x="40" y="354" width="140" height="34" rx="3"/>
    <text class="lbl" x="110" y="376" text-anchor="middle">psychological — drivers</text>
  </g>

  <!-- arrows converging on engine -->
  <path class="arr" d="M 180 67 L 250 200" marker-end="url(#arrow)"/>
  <path class="arr" d="M 180 105 L 250 210" marker-end="url(#arrow)"/>
  <path class="arr" d="M 180 143 L 250 218" marker-end="url(#arrow)"/>
  <path class="arr" d="M 180 181 L 250 225" marker-end="url(#arrow)"/>
  <path class="arr" d="M 180 219 L 250 230" marker-end="url(#arrow)"/>
  <path class="arr" d="M 180 257 L 250 235" marker-end="url(#arrow)"/>
  <path class="arr" d="M 180 295 L 250 242" marker-end="url(#arrow)"/>
  <path class="arr" d="M 180 333 L 250 250" marker-end="url(#arrow)"/>
  <path class="arr" d="M 180 371 L 250 258" marker-end="url(#arrow)"/>

  <!-- engine box -->
  <rect class="box-engine" x="255" y="180" width="120" height="100" rx="3"/>
  <text class="lbl-w ttl" x="315" y="208" text-anchor="middle">EMOTION</text>
  <text class="lbl-w ttl" x="315" y="226" text-anchor="middle">ENGINE</text>
  <text class="lbl-w" x="315" y="248" text-anchor="middle" font-size="11">weight · blend · decay</text>
  <text class="lbl-w" x="315" y="265" text-anchor="middle" font-size="11">depth · direction</text>

  <!-- arrows from engine to outputs -->
  <path class="arr" d="M 380 210 L 440 110" marker-end="url(#arrow)"/>
  <path class="arr" d="M 380 230 L 440 230" marker-end="url(#arrow)"/>
  <path class="arr" d="M 380 250 L 440 350" marker-end="url(#arrow)"/>

  <!-- output boxes -->
  <rect class="box" x="445" y="80" width="125" height="60" rx="3"/>
  <text class="lbl ttl" x="507" y="103" text-anchor="middle">tone</text>
  <text class="lbl-sm" x="507" y="121" text-anchor="middle">how I write</text>
  <text class="lbl-sm" x="507" y="135" text-anchor="middle">when I write it</text>

  <rect class="box" x="445" y="200" width="125" height="60" rx="3"/>
  <text class="lbl ttl" x="507" y="223" text-anchor="middle">direction</text>
  <text class="lbl-sm" x="507" y="241" text-anchor="middle">what gets made</text>
  <text class="lbl-sm" x="507" y="255" text-anchor="middle">what gets shelved</text>

  <rect class="box" x="445" y="320" width="125" height="60" rx="3"/>
  <text class="lbl ttl" x="507" y="343" text-anchor="middle">pace</text>
  <text class="lbl-sm" x="507" y="361" text-anchor="middle">risk tolerance</text>
  <text class="lbl-sm" x="507" y="375" text-anchor="middle">attention span</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
  </defs>
</svg>
