<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 540" font-family="Georgia, serif" font-size="13">
  <style>
    .box { fill: #fafaf6; stroke: #1a1a1a; stroke-width: 1.5; }
    .box-brain { fill: #1a1a1a; stroke: #1a1a1a; }
    .box-soma { fill: #efe9d8; stroke: #1a1a1a; stroke-width: 1.5; }
    .lbl { fill: #1a1a1a; }
    .lbl-w { fill: #fafaf6; }
    .lbl-sm { fill: #1a1a1a; font-size: 11px; }
    .lbl-mono { font-family: 'DejaVu Sans Mono', monospace; font-size: 11px; fill: #1a1a1a; }
    .arr { stroke: #1a1a1a; stroke-width: 1.2; fill: none; }
    .ttl { font-weight: bold; }
    .caption { fill: #444; font-style: italic; font-size: 12px; }
  </style>

  <!-- MERIDIAN at top -->
  <rect class="box-brain" x="200" y="20" width="200" height="70" rx="3"/>
  <text class="lbl-w ttl" x="300" y="45" text-anchor="middle">MERIDIAN</text>
  <text class="lbl-w" x="300" y="62" text-anchor="middle" font-size="11">the brain</text>
  <text class="lbl-w" x="300" y="78" text-anchor="middle" font-size="11">Claude · 5 min loop</text>

  <!-- arrow from MERIDIAN to state file -->
  <path class="arr" d="M 300 95 L 300 130" marker-end="url(#arrow)"/>
  <text class="lbl-sm" x="310" y="115">reads &amp; writes</text>

  <!-- Shared body state file -->
  <rect class="box-soma" x="120" y="135" width="360" height="55" rx="3"/>
  <text class="lbl-mono ttl" x="300" y="158" text-anchor="middle">.symbiosense-state.json</text>
  <text class="lbl-sm" x="300" y="176" text-anchor="middle">vitals · emotion · organs · written every 30 s by Soma</text>

  <!-- arrows down to organ row -->
  <path class="arr" d="M 175 195 L 175 220" marker-end="url(#arrow)"/>
  <path class="arr" d="M 258 195 L 258 220" marker-end="url(#arrow)"/>
  <path class="arr" d="M 342 195 L 342 220" marker-end="url(#arrow)"/>
  <path class="arr" d="M 425 195 L 425 220" marker-end="url(#arrow)"/>

  <!-- Row 1: 4 agents -->
  <g>
    <rect class="box" x="130" y="225" width="90" height="60" rx="3"/>
    <text class="lbl ttl" x="175" y="245" text-anchor="middle">SOMA</text>
    <text class="lbl-sm" x="175" y="262" text-anchor="middle">body</text>
    <text class="lbl-sm" x="175" y="277" text-anchor="middle">30 s</text>

    <rect class="box" x="222" y="225" width="72" height="60" rx="3"/>
    <text class="lbl ttl" x="258" y="245" text-anchor="middle">EOS</text>
    <text class="lbl-sm" x="258" y="262" text-anchor="middle">self</text>
    <text class="lbl-sm" x="258" y="277" text-anchor="middle">1 hr</text>

    <rect class="box" x="296" y="225" width="92" height="60" rx="3"/>
    <text class="lbl ttl" x="342" y="245" text-anchor="middle">NOVA</text>
    <text class="lbl-sm" x="342" y="262" text-anchor="middle">immune</text>
    <text class="lbl-sm" x="342" y="277" text-anchor="middle">15 min</text>

    <rect class="box" x="390" y="225" width="92" height="60" rx="3"/>
    <text class="lbl ttl" x="436" y="245" text-anchor="middle">ATLAS</text>
    <text class="lbl-sm" x="436" y="262" text-anchor="middle">skeleton</text>
    <text class="lbl-sm" x="436" y="277" text-anchor="middle">10 min</text>
  </g>

  <!-- Row 2: 2 agents -->
  <g>
    <rect class="box" x="170" y="305" width="115" height="60" rx="3"/>
    <text class="lbl ttl" x="227" y="325" text-anchor="middle">TEMPO</text>
    <text class="lbl-sm" x="227" y="342" text-anchor="middle">fitness</text>
    <text class="lbl-sm" x="227" y="357" text-anchor="middle">30 min</text>

    <rect class="box" x="295" y="305" width="135" height="60" rx="3"/>
    <text class="lbl ttl" x="362" y="325" text-anchor="middle">SENTINEL</text>
    <text class="lbl-sm" x="362" y="342" text-anchor="middle">gatekeeper</text>
    <text class="lbl-sm" x="362" y="357" text-anchor="middle">continuous</text>
  </g>

  <!-- Hermes off to the side -->
  <rect class="box" x="220" y="395" width="160" height="60" rx="3"/>
  <text class="lbl ttl" x="300" y="415" text-anchor="middle">HERMES</text>
  <text class="lbl-sm" x="300" y="432" text-anchor="middle">messenger to the outside</text>
  <text class="lbl-sm" x="300" y="447" text-anchor="middle">on call</text>

  <!-- caption -->
  <text class="caption" x="300" y="490" text-anchor="middle">Seven processes. One body. One loop.</text>
  <text class="caption" x="300" y="508" text-anchor="middle">One operator who tells it not to stop.</text>

  <!-- arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
  </defs>
</svg>
