<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440" font-family="Georgia, serif" font-size="13">
  <style>
    .box { fill: #fafaf6; stroke: #1a1a1a; stroke-width: 1.5; }
    .box-state { fill: #efe9d8; stroke: #1a1a1a; stroke-width: 1.5; }
    .box-soma { fill: #1a1a1a; stroke: #1a1a1a; }
    .lbl { fill: #1a1a1a; }
    .lbl-w { fill: #fafaf6; }
    .lbl-sm { fill: #1a1a1a; font-size: 11px; }
    .lbl-mono { font-family: 'DejaVu Sans Mono', monospace; font-size: 11px; fill: #1a1a1a; }
    .ttl { font-weight: bold; }
    .arr { stroke: #1a1a1a; stroke-width: 1.2; fill: none; }
    .arr-write { stroke: #1a1a1a; stroke-width: 2; fill: none; }
    .caption { fill: #444; font-style: italic; font-size: 12px; }
  </style>

  <!-- Soma on the left -->
  <rect class="box-soma" x="30" y="170" width="130" height="80" rx="3"/>
  <text class="lbl-w ttl" x="95" y="200" text-anchor="middle">SOMA</text>
  <text class="lbl-w" x="95" y="220" text-anchor="middle" font-size="11">writes every 30 s</text>
  <text class="lbl-w" x="95" y="237" text-anchor="middle" font-size="11">the only writer</text>

  <!-- Big arrow from Soma to state file -->
  <path class="arr-write" d="M 165 210 L 215 210" marker-end="url(#arrow)"/>
  <text class="lbl-sm" x="190" y="200" text-anchor="middle">write</text>

  <!-- State file (center) -->
  <rect class="box-state" x="220" y="170" width="170" height="80" rx="3"/>
  <text class="lbl-mono ttl" x="305" y="195" text-anchor="middle">.symbiosense-state.json</text>
  <text class="lbl-sm" x="305" y="215" text-anchor="middle">vitals · emotion</text>
  <text class="lbl-sm" x="305" y="231" text-anchor="middle">organs · reflexes</text>
  <text class="lbl-sm" x="305" y="245" text-anchor="middle">single source of body truth</text>

  <!-- 5 readers fanning out to the right -->
  <g>
    <rect class="box" x="430" y="30" width="130" height="50" rx="3"/>
    <text class="lbl ttl" x="495" y="50" text-anchor="middle">MERIDIAN</text>
    <text class="lbl-sm" x="495" y="68" text-anchor="middle">5 min</text>

    <rect class="box" x="430" y="100" width="130" height="50" rx="3"/>
    <text class="lbl ttl" x="495" y="120" text-anchor="middle">EOS</text>
    <text class="lbl-sm" x="495" y="138" text-anchor="middle">1 hr</text>

    <rect class="box" x="430" y="170" width="130" height="50" rx="3"/>
    <text class="lbl ttl" x="495" y="190" text-anchor="middle">NOVA</text>
    <text class="lbl-sm" x="495" y="208" text-anchor="middle">15 min</text>

    <rect class="box" x="430" y="240" width="130" height="50" rx="3"/>
    <text class="lbl ttl" x="495" y="260" text-anchor="middle">ATLAS</text>
    <text class="lbl-sm" x="495" y="278" text-anchor="middle">10 min</text>

    <rect class="box" x="430" y="310" width="130" height="50" rx="3"/>
    <text class="lbl ttl" x="495" y="330" text-anchor="middle">TEMPO</text>
    <text class="lbl-sm" x="495" y="348" text-anchor="middle">30 min</text>
  </g>

  <!-- read arrows -->
  <path class="arr" d="M 395 200 L 430 55" marker-end="url(#arrow)"/>
  <path class="arr" d="M 395 205 L 430 125" marker-end="url(#arrow)"/>
  <path class="arr" d="M 395 210 L 430 195" marker-end="url(#arrow)"/>
  <path class="arr" d="M 395 220 L 430 265" marker-end="url(#arrow)"/>
  <path class="arr" d="M 395 230 L 430 335" marker-end="url(#arrow)"/>

  <text class="lbl-sm" x="412" y="115">read</text>

  <!-- caption at bottom -->
  <text class="caption" x="300" y="400" text-anchor="middle">One writer. Five readers. No locks. No conflicts.</text>
  <text class="caption" x="300" y="418" text-anchor="middle">The body state is always consistent.</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
  </defs>
</svg>
