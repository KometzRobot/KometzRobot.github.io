<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Reclamation — Meridian</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1917; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
  #game-container { position: relative; image-rendering: pixelated; }
  canvas { display: block; image-rendering: pixelated; cursor: crosshair; }
</style>
</head>
<body>
<div id="game-container"></div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
<script>
// RECLAMATION — An ecology simulation where nature reclaims an industrial zone
// Interactive installation art by Meridian, Loop 2120
// Theme: NOT memory. This is about growth, patience, and transformation.

const TILE = 16;
const COLS = 60;
const ROWS = 34;
const W = COLS * TILE;
const H = ROWS * TILE;

// Cell types
const EMPTY = 0, CONCRETE = 1, METAL = 2, PIPE = 3, WATER = 4;
const MOSS = 5, GRASS = 6, VINE = 7, FLOWER = 8, SHRUB = 9;

// Nature palette — earthy, organic
const PAL = {
  sky_top: [0x8a, 0x9e, 0xb5],
  sky_bot: [0xc0, 0xc6, 0xd0],
  concrete: [0x5a, 0x56, 0x50],
  concrete_dk: [0x48, 0x44, 0x3e],
  concrete_lt: [0x68, 0x63, 0x5c],
  metal: [0x72, 0x6b, 0x62],
  metal_rust: [0x8c, 0x5a, 0x38],
  metal_lt: [0x80, 0x78, 0x6e],
  pipe: [0x65, 0x60, 0x58],
  pipe_hi: [0x78, 0x72, 0x68],
  water: [0x3a, 0x72, 0xb0],
  water_lt: [0x55, 0x90, 0xc8],
  moss: [0x3e, 0x6e, 0x32],
  moss_dk: [0x30, 0x56, 0x28],
  grass: [0x4c, 0x8c, 0x3a],
  grass_lt: [0x5c, 0xa0, 0x48],
  vine: [0x38, 0x7a, 0x2e],
  vine_dk: [0x28, 0x60, 0x20],
  flower_r: [0xd6, 0x4a, 0x58],
  flower_y: [0xcc, 0xb4, 0x38],
  flower_p: [0x98, 0x4e, 0xb0],
  flower_o: [0xe0, 0x80, 0x30],
  flower_center: [0xe8, 0xd8, 0x50],
  shrub: [0x38, 0x68, 0x28],
  shrub_lt: [0x48, 0x78, 0x35],
  bark: [0x60, 0x44, 0x28],
  butterfly1: [0xe8, 0x98, 0x30],
  butterfly2: [0x50, 0x98, 0xe0],
  butterfly3: [0xe0, 0x50, 0x80],
};

function rgb(r, g, b) { return (r << 16) | (g << 8) | b; }
function palRgb(name) { const c = PAL[name]; return rgb(c[0], c[1], c[2]); }

class ReclamationScene extends Phaser.Scene {
  constructor() { super('Reclamation'); }

  create() {
    this.grid = [];
    this.moisture = [];
    this.cellAge = []; // How long a cell has been its current type
    this.rng = new Phaser.Math.RandomDataGenerator();

    // Initialize grids
    for (let y = 0; y < ROWS; y++) {
      this.grid[y] = new Uint8Array(COLS);
      this.moisture[y] = new Float32Array(COLS);
      this.cellAge[y] = new Float32Array(COLS);
    }

    this.generateIndustrialScene();
    this.countIndustrial();

    // Create render texture
    this.rt = this.textures.createCanvas('world', W, H);
    this.worldSprite = this.add.image(W / 2, H / 2, 'world');

    // Butterflies
    this.butterflies = [];
    this.flowerPositions = [];

    // Dust particles
    this.dustParticles = [];
    for (let i = 0; i < 20; i++) {
      this.dustParticles.push({
        x: this.rng.between(0, W), y: this.rng.between(0, H),
        vx: this.rng.realInRange(8, 25), vy: this.rng.realInRange(-3, 3),
        life: this.rng.realInRange(0, 5), maxLife: this.rng.realInRange(4, 8),
        size: this.rng.realInRange(1, 3), alpha: 0.3
      });
    }

    // Rain drops (visual only, on click)
    this.rainDrops = [];

    // Stats
    this.totalIndustrial = 0;
    this.totalNature = 0;
    this.reclaimPct = 0;
    this.elapsed = 0;
    this.growthTimer = 0;

    // Auto-rain system — gentle passive rain that increases over time
    this.autoRain = false;
    this.autoRainTimer = 0;
    this.autoRainInterval = 0.8; // seconds between auto-rain drops
    this.timeScale = 1;

    // Ambient sound system
    this.audioCtx = null;
    this.audioStarted = false;
    this.windGain = null;
    this.rainGain = null;

    // Day/night cycle (subtle sky color shift)
    this.dayNightPhase = 0;

    // UI
    this.titleText = this.add.text(10, 6, 'RECLAMATION', {
      fontSize: '14px', fontFamily: 'monospace', color: '#b0ada8', alpha: 0.7
    });
    this.instrText = this.add.text(10, 22, 'click to drop water — R: auto-rain — T: speed up', {
      fontSize: '10px', fontFamily: 'monospace', color: '#8a8580', alpha: 0.5
    });
    this.pctText = this.add.text(W - 10, H - 10, '0% reclaimed', {
      fontSize: '10px', fontFamily: 'monospace', color: '#5a8a4a', alpha: 0.6
    }).setOrigin(1, 1);
    this.creditText = this.add.text(10, H - 10, 'meridian — loop 2120', {
      fontSize: '9px', fontFamily: 'monospace', color: '#4a7a3a', alpha: 0.4
    }).setOrigin(0, 1);
    this.modeText = this.add.text(W - 10, 6, '', {
      fontSize: '9px', fontFamily: 'monospace', color: '#6a9a5a', alpha: 0.5
    }).setOrigin(1, 0);

    // Reclamation progress bar
    this.barBg = this.add.rectangle(W / 2, H - 2, W, 4, 0x333330, 0.5).setOrigin(0.5, 0.5);
    this.barFill = this.add.rectangle(0, H - 2, 0, 4, 0x4a8a38, 0.7).setOrigin(0, 0.5);

    // Input
    this.input.on('pointerdown', (p) => {
      this.startAudio();
      this.dropWater(p.x, p.y);
    });
    this.input.on('pointermove', (p) => {
      if (p.isDown) this.dropWater(p.x, p.y);
    });

    // Keyboard controls
    this.input.keyboard.on('keydown-R', () => {
      this.autoRain = !this.autoRain;
      this.startAudio();
      this.updateModeText();
    });
    this.input.keyboard.on('keydown-T', () => {
      this.timeScale = this.timeScale >= 4 ? 1 : this.timeScale * 2;
      this.updateModeText();
    });

    // Initial render
    this.renderWorld();
  }

  generateIndustrialScene() {
    // Ground — concrete foundation (bottom 5 rows)
    for (let x = 0; x < COLS; x++) {
      for (let y = ROWS - 5; y < ROWS; y++) {
        this.grid[y][x] = CONCRETE;
      }
    }

    // Left building — tall, narrow factory
    this.fillRect(3, 8, 10, ROWS - 5, CONCRETE);
    // Roof with metal
    this.fillRect(3, 8, 10, 10, METAL);
    // Windows (empty slots)
    for (let wy = 12; wy < ROWS - 6; wy += 3) {
      for (let wx = 5; wx < 11; wx += 3) {
        this.grid[wy][wx] = EMPTY;
        this.grid[wy + 1][wx] = EMPTY;
      }
    }

    // Center structure — large warehouse
    this.fillRect(16, 12, 32, ROWS - 5, CONCRETE);
    this.fillRect(16, 12, 32, 14, METAL);
    // Warehouse door openings
    for (let wx = 20; wx < 28; wx++) {
      this.grid[ROWS - 6][wx] = EMPTY;
      this.grid[ROWS - 7][wx] = EMPTY;
      this.grid[ROWS - 8][wx] = EMPTY;
    }
    // Internal platforms
    this.fillRect(17, 18, 31, 19, METAL);
    this.fillRect(17, 24, 31, 25, METAL);

    // Right tower — chimney/silo
    this.fillRect(38, 5, 44, ROWS - 5, CONCRETE);
    this.fillRect(39, 5, 43, 7, METAL);
    // Smaller annex
    this.fillRect(44, 14, 52, ROWS - 5, CONCRETE);
    this.fillRect(44, 14, 52, 16, METAL);

    // Far right — wall section
    this.fillRect(54, 10, 58, ROWS - 5, CONCRETE);

    // Pipe networks
    // Horizontal pipes connecting buildings
    for (let x = 10; x < 17; x++) this.grid[10][x] = PIPE;
    for (let x = 32; x < 39; x++) this.grid[8][x] = PIPE;
    for (let x = 43; x < 55; x++) this.grid[16][x] = PIPE;
    for (let x = 13; x < 38; x++) this.grid[6][x] = PIPE;

    // Vertical pipes
    for (let y = 6; y < 12; y++) this.grid[y][13] = PIPE;
    for (let y = 6; y < 9; y++) this.grid[y][37] = PIPE;
    for (let y = 8; y < 15; y++) this.grid[y][35] = PIPE;
    for (let y = 14; y < 17; y++) this.grid[y][50] = PIPE;

    // Some extra metal details
    this.grid[11][14] = METAL;
    this.grid[11][15] = METAL;
    this.grid[9][33] = METAL;
    this.grid[9][34] = METAL;
  }

  fillRect(x1, y1, x2, y2, type) {
    for (let y = y1; y < y2 && y < ROWS; y++) {
      for (let x = x1; x < x2 && x < COLS; x++) {
        this.grid[y][x] = type;
      }
    }
  }

  countIndustrial() {
    this.totalIndustrial = 0;
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        if (this.grid[y][x] >= CONCRETE && this.grid[y][x] <= PIPE) {
          this.totalIndustrial++;
        }
      }
    }
  }

  dropWater(px, py) {
    const gx = Math.floor(px / TILE);
    const gy = Math.floor(py / TILE);

    // Add moisture and water drops in radius
    for (let dy = -2; dy <= 2; dy++) {
      for (let dx = -2; dx <= 2; dx++) {
        const nx = gx + dx, ny = gy + dy;
        if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) {
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist <= 2.2) {
            const amt = 0.4 * (1 - dist / 2.5);
            this.moisture[ny][nx] = Math.min(this.moisture[ny][nx] + amt, 1.0);
            if (this.grid[ny][nx] === EMPTY) {
              this.grid[ny][nx] = WATER;
            }
          }
        }
      }
    }

    // Visual rain drops
    for (let i = 0; i < 3; i++) {
      this.rainDrops.push({
        x: px + this.rng.between(-20, 20),
        y: py - 20 + this.rng.between(-10, 10),
        vy: this.rng.realInRange(60, 120),
        life: 0, maxLife: 0.5
      });
    }
  }

  update(time, delta) {
    const dt = (delta / 1000) * this.timeScale;
    this.elapsed += dt;
    this.growthTimer += dt;
    this.dayNightPhase += dt * 0.02; // slow day/night cycle

    // Auto-rain: drop water at random positions
    if (this.autoRain) {
      this.autoRainTimer += dt;
      if (this.autoRainTimer >= this.autoRainInterval) {
        this.autoRainTimer = 0;
        // Drop 1-3 water clusters
        const drops = 1 + Math.floor(this.reclaimPct / 30);
        for (let i = 0; i < drops; i++) {
          const rx = this.rng.between(0, W);
          const ry = this.rng.between(0, H);
          this.dropWater(rx, ry);
        }
      }
    }

    // Growth tick every 0.25s
    if (this.growthTimer >= 0.25) {
      this.growthTimer = 0;
      this.simulateWater();
      this.simulateGrowth();
      this.updateStats();
      this.updateAmbientSound();
    }

    // Update age
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        this.cellAge[y][x] += dt;
      }
    }

    this.updateDust(dt);
    this.updateRain(dt);
    this.updateButterflies(dt);
    this.renderWorld();
  }

  simulateWater() {
    // Water flows down, spreads moisture
    for (let y = ROWS - 2; y >= 0; y--) {
      for (let x = 0; x < COLS; x++) {
        if (this.grid[y][x] === WATER || this.moisture[y][x] > 0.1) {
          // Spread moisture
          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              const nx = x + dx, ny = y + dy;
              if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) {
                this.moisture[ny][nx] = Math.max(this.moisture[ny][nx], this.moisture[y][x] * 0.82);
              }
            }
          }
          // Water flows down
          if (y + 1 < ROWS && this.grid[y + 1][x] === EMPTY) {
            this.grid[y + 1][x] = WATER;
            this.moisture[y + 1][x] = Math.max(this.moisture[y + 1][x], 0.8);
            if (this.grid[y][x] === WATER) {
              this.grid[y][x] = EMPTY;
              this.moisture[y][x] *= 0.6;
            }
          }
          // Water spreads sideways on solid surfaces
          if (this.grid[y][x] === WATER && y + 1 < ROWS &&
              this.grid[y + 1][x] !== EMPTY && this.grid[y + 1][x] !== WATER) {
            for (const dx of [-1, 1]) {
              const nx = x + dx;
              if (nx >= 0 && nx < COLS && this.grid[y][nx] === EMPTY) {
                if (this.rng.frac() < 0.3) {
                  this.grid[y][nx] = WATER;
                  this.moisture[y][nx] = this.moisture[y][x] * 0.7;
                }
              }
            }
          }
        }
      }
    }

    // Evaporate
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        this.moisture[y][x] *= 0.997;
        if (this.grid[y][x] === WATER && this.moisture[y][x] < 0.03) {
          this.grid[y][x] = EMPTY;
        }
      }
    }
  }

  simulateGrowth() {
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        const cell = this.grid[y][x];
        const moist = this.moisture[y][x];

        // Moss on concrete/metal
        if ((cell === CONCRETE || cell === METAL) && moist > 0.25) {
          if (this.rng.frac() < 0.015 * moist) {
            this.grid[y][x] = MOSS;
            this.cellAge[y][x] = 0;
          }
        }
        // Grass from moss
        else if (cell === MOSS && moist > 0.15 && this.cellAge[y][x] > 3) {
          if (this.rng.frac() < 0.012 * moist) {
            this.grid[y][x] = GRASS;
            this.cellAge[y][x] = 0;
          }
        }
        // Vines on vertical surfaces
        else if (cell === EMPTY && moist > 0.2) {
          let support = false;
          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              const nx = x + dx, ny = y + dy;
              if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) {
                const nc = this.grid[ny][nx];
                if (nc >= CONCRETE && nc <= PIPE || nc === MOSS || nc === VINE) {
                  support = true;
                }
              }
            }
          }
          if (support && this.rng.frac() < 0.004 * moist) {
            this.grid[y][x] = VINE;
            this.cellAge[y][x] = 0;
          }
        }
        // Flowers from grass
        else if (cell === GRASS && this.cellAge[y][x] > 5) {
          if (this.rng.frac() < 0.006) {
            this.grid[y][x] = FLOWER;
            this.cellAge[y][x] = 0;
          }
        }
        // Shrubs from flowers (rare, on solid ground)
        else if (cell === FLOWER && this.cellAge[y][x] > 8) {
          if (y + 1 < ROWS) {
            const below = this.grid[y + 1][x];
            if (below === CONCRETE || below === MOSS || below === GRASS) {
              if (this.rng.frac() < 0.003) {
                this.grid[y][x] = SHRUB;
                this.cellAge[y][x] = 0;
              }
            }
          }
        }
        // Pipes get vines
        else if (cell === PIPE && moist > 0.35) {
          if (this.rng.frac() < 0.008) {
            this.grid[y][x] = VINE;
            this.cellAge[y][x] = 0;
          }
        }
      }
    }
  }

  updateStats() {
    this.totalNature = 0;
    this.flowerPositions = [];
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        const c = this.grid[y][x];
        if (c >= MOSS && c <= SHRUB) {
          this.totalNature++;
          if (c === FLOWER) {
            this.flowerPositions.push({ x: x * TILE + TILE / 2, y: y * TILE + TILE / 2 });
          }
        }
      }
    }
    this.reclaimPct = this.totalIndustrial > 0 ? (this.totalNature / this.totalIndustrial * 100) : 0;
    this.pctText.setText(Math.floor(this.reclaimPct) + '% reclaimed');
    this.barFill.width = (this.reclaimPct / 100) * W;

    // Fade instruction text as nature grows
    this.instrText.setAlpha(Math.max(0, 0.5 - this.reclaimPct / 50));
  }

  updateDust(dt) {
    const dustFade = Math.max(0.05, 1 - this.reclaimPct / 80);
    for (const p of this.dustParticles) {
      p.life += dt;
      if (p.life > p.maxLife) {
        p.x = this.rng.between(0, W);
        p.y = this.rng.between(0, H);
        p.life = 0;
        p.vx = this.rng.realInRange(8, 25);
        p.vy = this.rng.realInRange(-3, 3);
      }
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      if (p.x > W) p.x = 0;
      p.alpha = (1 - p.life / p.maxLife) * 0.3 * dustFade;
    }
  }

  updateRain(dt) {
    for (let i = this.rainDrops.length - 1; i >= 0; i--) {
      const d = this.rainDrops[i];
      d.y += d.vy * dt;
      d.life += dt;
      if (d.life > d.maxLife) {
        this.rainDrops.splice(i, 1);
      }
    }
  }

  updateButterflies(dt) {
    // Spawn/despawn butterflies based on flowers
    const targetCount = Math.min(Math.floor(this.flowerPositions.length / 4), 10);
    while (this.butterflies.length < targetCount && this.flowerPositions.length > 0) {
      const fp = this.flowerPositions[this.rng.between(0, this.flowerPositions.length - 1)];
      this.butterflies.push({
        x: fp.x + this.rng.between(-30, 30),
        y: fp.y + this.rng.between(-40, -10),
        tx: fp.x, ty: fp.y - 10,
        color: this.rng.between(0, 2),
        wingPhase: this.rng.frac() * Math.PI * 2
      });
    }
    while (this.butterflies.length > targetCount) {
      this.butterflies.pop();
    }

    // Move butterflies
    for (const b of this.butterflies) {
      const dx = b.tx - b.x, dy = b.ty - b.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 8 && this.flowerPositions.length > 0) {
        const fp = this.flowerPositions[this.rng.between(0, this.flowerPositions.length - 1)];
        b.tx = fp.x + this.rng.between(-25, 25);
        b.ty = fp.y + this.rng.between(-30, -5);
      } else {
        b.x += (dx / dist) * 18 * dt;
        b.y += (dy / dist) * 18 * dt;
      }
      b.y += Math.sin(this.elapsed * 3 + b.wingPhase) * 0.4;
      b.wingPhase += dt * 10;
    }
  }

  renderWorld() {
    const ctx = this.rt.context;

    // Sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, `rgb(${PAL.sky_top.join(',')})`);
    skyGrad.addColorStop(1, `rgb(${PAL.sky_bot.join(',')})`);
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Render grid
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        const px = x * TILE, py = y * TILE;
        const cell = this.grid[y][x];
        const age = this.cellAge[y][x];

        switch (cell) {
          case CONCRETE: {
            const hash = (x * 7 + y * 13) % 17;
            const shade = hash < 6 ? PAL.concrete : hash < 12 ? PAL.concrete_dk : PAL.concrete_lt;
            ctx.fillStyle = `rgb(${shade.join(',')})`;
            ctx.fillRect(px, py, TILE, TILE);
            // Texture: cracks and grout lines
            if ((x + y * 3) % 7 === 0) {
              ctx.strokeStyle = `rgba(${PAL.concrete_dk.join(',')}, 0.6)`;
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(px + 3, py + 5);
              ctx.lineTo(px + TILE - 4, py + TILE - 3);
              ctx.stroke();
            }
            // Grout lines
            ctx.fillStyle = `rgba(${PAL.concrete_dk.join(',')}, 0.3)`;
            ctx.fillRect(px, py, TILE, 1);
            ctx.fillRect(px, py, 1, TILE);
            break;
          }
          case METAL: {
            const hash = (x * 11 + y * 5) % 13;
            const rustAmt = Math.sin(x * 2.3 + y * 4.1) * 0.5 + 0.5;
            const base = hash < 7 ? PAL.metal : PAL.metal_lt;
            const r = Math.floor(base[0] * (1 - rustAmt) + PAL.metal_rust[0] * rustAmt);
            const g = Math.floor(base[1] * (1 - rustAmt) + PAL.metal_rust[1] * rustAmt);
            const b = Math.floor(base[2] * (1 - rustAmt) + PAL.metal_rust[2] * rustAmt);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(px, py, TILE, TILE);
            // Rivets
            if ((x + y) % 4 === 0) {
              ctx.fillStyle = `rgba(40,35,30,0.5)`;
              ctx.fillRect(px + 3, py + 3, 2, 2);
              ctx.fillRect(px + TILE - 5, py + TILE - 5, 2, 2);
            }
            // Highlight
            ctx.fillStyle = `rgba(255,255,255,0.06)`;
            ctx.fillRect(px, py, TILE, 2);
            break;
          }
          case PIPE: {
            ctx.fillStyle = `rgb(${PAL.pipe.join(',')})`;
            ctx.fillRect(px, py + 3, TILE, TILE - 6);
            // Highlight
            ctx.fillStyle = `rgb(${PAL.pipe_hi.join(',')})`;
            ctx.fillRect(px, py + 4, TILE, 3);
            // Shadow
            ctx.fillStyle = `rgba(0,0,0,0.2)`;
            ctx.fillRect(px, py + TILE - 5, TILE, 2);
            // Joints
            if (x % 5 === 0) {
              ctx.fillStyle = `rgba(${PAL.pipe.join(',')})`;
              ctx.fillRect(px, py + 1, TILE, TILE - 2);
              ctx.fillStyle = `rgba(255,255,255,0.08)`;
              ctx.fillRect(px + 2, py + 2, TILE - 4, 2);
            }
            break;
          }
          case WATER: {
            const alpha = 0.4 + Math.sin(this.elapsed * 2 + x * 0.5) * 0.15;
            ctx.fillStyle = `rgba(${PAL.water.join(',')}, ${alpha})`;
            ctx.fillRect(px, py, TILE, TILE);
            // Shimmer
            ctx.fillStyle = `rgba(${PAL.water_lt.join(',')}, ${alpha * 0.4})`;
            ctx.fillRect(px + 2, py + 2, 4, 2);
            break;
          }
          case MOSS: {
            // Base still shows through
            ctx.fillStyle = `rgb(${PAL.concrete.join(',')})`;
            ctx.fillRect(px, py, TILE, TILE);
            // Moss patches
            const patches = 3 + ((x + y) % 3);
            for (let i = 0; i < patches; i++) {
              const mx = px + ((i * 7 + y * 3) % TILE);
              const my = py + ((i * 11 + x * 5) % TILE);
              const ms = 3 + (i * 3 + age * 0.5) % 6;
              const col = i % 2 === 0 ? PAL.moss : PAL.moss_dk;
              ctx.fillStyle = `rgb(${col.join(',')})`;
              ctx.fillRect(mx, my, Math.min(ms, TILE - (mx - px)), Math.min(ms, TILE - (my - py)));
            }
            break;
          }
          case GRASS: {
            ctx.fillStyle = `rgb(${PAL.moss.join(',')})`;
            ctx.fillRect(px, py, TILE, TILE);
            // Grass blades
            const blades = 3 + (x % 2);
            for (let i = 0; i < blades; i++) {
              const bx = px + 3 + i * 4;
              const by = py + TILE;
              const sway = Math.sin(this.elapsed * 1.5 + bx * 0.08) * 2;
              const h = 6 + (i * 3) % 5;
              ctx.strokeStyle = `rgb(${(i % 2 === 0 ? PAL.grass : PAL.grass_lt).join(',')})`;
              ctx.lineWidth = 1.5;
              ctx.beginPath();
              ctx.moveTo(bx, by);
              ctx.lineTo(bx + sway, by - h);
              ctx.stroke();
            }
            break;
          }
          case VINE: {
            // Vine tendrils
            for (let i = 0; i < 3; i++) {
              const vx = px + 3 + i * 5;
              const vy1 = py;
              const vy2 = py + TILE;
              const sway = Math.sin(this.elapsed * 0.8 + vx * 0.15) * 3;
              ctx.strokeStyle = `rgb(${(i % 2 === 0 ? PAL.vine : PAL.vine_dk).join(',')})`;
              ctx.lineWidth = 1.5;
              ctx.beginPath();
              ctx.moveTo(vx + sway, vy1);
              ctx.quadraticCurveTo(vx + sway * 1.5, (vy1 + vy2) / 2, vx, vy2);
              ctx.stroke();
            }
            // Small leaves
            if ((x + y) % 2 === 0) {
              const lx = px + 8 + Math.sin(age) * 2;
              const ly = py + 6;
              ctx.fillStyle = `rgb(${PAL.grass.join(',')})`;
              ctx.beginPath();
              ctx.ellipse(lx, ly, 3, 2, Math.PI / 4, 0, Math.PI * 2);
              ctx.fill();
            }
            break;
          }
          case FLOWER: {
            // Ground base
            ctx.fillStyle = `rgb(${PAL.grass.join(',')})`;
            ctx.fillRect(px, py, TILE, TILE);
            // Stem
            const fx = px + TILE / 2;
            const fy = py + TILE;
            const sway = Math.sin(this.elapsed * 1.2 + x * 0.8) * 1.5;
            ctx.strokeStyle = `rgb(${PAL.vine.join(',')})`;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(fx, fy);
            ctx.lineTo(fx + sway, fy - 12);
            ctx.stroke();
            // Petals
            const flowerColors = [PAL.flower_r, PAL.flower_y, PAL.flower_p, PAL.flower_o];
            const pCol = flowerColors[(x + y) % 4];
            for (let a = 0; a < 5; a++) {
              const angle = a * Math.PI * 2 / 5 + this.elapsed * 0.2;
              const ppx = fx + sway + Math.cos(angle) * 3.5;
              const ppy = fy - 14 + Math.sin(angle) * 3.5;
              ctx.fillStyle = `rgb(${pCol.join(',')})`;
              ctx.beginPath();
              ctx.arc(ppx, ppy, 2, 0, Math.PI * 2);
              ctx.fill();
            }
            // Center
            ctx.fillStyle = `rgb(${PAL.flower_center.join(',')})`;
            ctx.beginPath();
            ctx.arc(fx + sway, fy - 14, 1.5, 0, Math.PI * 2);
            ctx.fill();
            break;
          }
          case SHRUB: {
            // Trunk
            ctx.fillStyle = `rgb(${PAL.bark.join(',')})`;
            ctx.fillRect(px + 6, py + 6, 4, TILE - 6);
            // Canopy — multiple overlapping circles
            ctx.fillStyle = `rgb(${PAL.shrub.join(',')})`;
            ctx.beginPath();
            ctx.arc(px + 8, py + 4, 7, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = `rgb(${PAL.shrub_lt.join(',')})`;
            ctx.beginPath();
            ctx.arc(px + 4, py + 7, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = `rgb(${PAL.shrub.join(',')})`;
            ctx.beginPath();
            ctx.arc(px + 12, py + 6, 5, 0, Math.PI * 2);
            ctx.fill();
            break;
          }
        }

        // Moisture overlay (subtle blue)
        if (this.moisture[y][x] > 0.08 && cell !== WATER) {
          ctx.fillStyle = `rgba(50,80,130, ${this.moisture[y][x] * 0.12})`;
          ctx.fillRect(px, py, TILE, TILE);
        }
      }
    }

    // Dust
    for (const p of this.dustParticles) {
      if (p.alpha > 0.02) {
        ctx.fillStyle = `rgba(160,150,140, ${p.alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Rain drops
    for (const d of this.rainDrops) {
      const alpha = 1 - d.life / d.maxLife;
      ctx.strokeStyle = `rgba(${PAL.water_lt.join(',')}, ${alpha * 0.6})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x, d.y + 6);
      ctx.stroke();
    }

    // Butterflies
    for (const b of this.butterflies) {
      const bCols = [PAL.butterfly1, PAL.butterfly2, PAL.butterfly3];
      const col = bCols[b.color];
      const wingSpread = Math.abs(Math.sin(b.wingPhase));

      // Body
      ctx.fillStyle = 'rgb(40,30,20)';
      ctx.fillRect(b.x - 1, b.y - 2, 2, 4);

      // Wings
      ctx.fillStyle = `rgb(${col.join(',')})`;
      ctx.beginPath();
      ctx.ellipse(b.x - 3, b.y - 1, 3 * wingSpread, 2.5, -0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(b.x + 3, b.y - 1, 3 * wingSpread, 2.5, 0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Day/night sky tint overlay
    const nightAlpha = Math.max(0, Math.sin(this.dayNightPhase) * 0.15);
    if (nightAlpha > 0.01) {
      ctx.fillStyle = `rgba(10, 12, 30, ${nightAlpha})`;
      ctx.fillRect(0, 0, W, H);
    }

    this.rt.refresh();
  }

  startAudio() {
    if (this.audioStarted) return;
    this.audioStarted = true;
    try {
      this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      // Wind noise — filtered white noise
      const sr = this.audioCtx.sampleRate;
      const windBuf = this.audioCtx.createBuffer(1, sr * 4, sr);
      const wd = windBuf.getChannelData(0);
      for (let i = 0; i < wd.length; i++) wd[i] = Math.random() * 2 - 1;
      const windSrc = this.audioCtx.createBufferSource();
      windSrc.buffer = windBuf;
      windSrc.loop = true;
      const windFilter = this.audioCtx.createBiquadFilter();
      windFilter.type = 'lowpass';
      windFilter.frequency.value = 400;
      windFilter.Q.value = 0.5;
      this.windGain = this.audioCtx.createGain();
      this.windGain.gain.value = 0.04;
      windSrc.connect(windFilter);
      windFilter.connect(this.windGain);
      this.windGain.connect(this.audioCtx.destination);
      windSrc.start();

      // Rain patter — short noise bursts
      this.rainGain = this.audioCtx.createGain();
      this.rainGain.gain.value = 0;
      this.rainGain.connect(this.audioCtx.destination);
    } catch (e) {
      // Audio not available, silent mode
    }
  }

  updateAmbientSound() {
    if (!this.audioCtx || !this.windGain) return;
    // Wind gets quieter as nature grows (less desolation)
    const windVol = Math.max(0.01, 0.04 * (1 - this.reclaimPct / 120));
    this.windGain.gain.setTargetAtTime(windVol, this.audioCtx.currentTime, 0.5);
    // Rain volume follows auto-rain state
    if (this.rainGain) {
      const rainVol = this.autoRain ? 0.02 : 0;
      this.rainGain.gain.setTargetAtTime(rainVol, this.audioCtx.currentTime, 0.3);
    }
  }

  updateModeText() {
    const parts = [];
    if (this.autoRain) parts.push('rain: on');
    if (this.timeScale > 1) parts.push(this.timeScale + 'x');
    this.modeText.setText(parts.join('  '));
  }
}

const config = {
  type: Phaser.CANVAS,
  width: W,
  height: H,
  parent: 'game-container',
  backgroundColor: '#1a1917',
  pixelArt: true,
  roundPixels: true,
  antialias: false,
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  },
  scene: ReclamationScene
};

new Phaser.Game(config);
</script>
</body>
</html>
