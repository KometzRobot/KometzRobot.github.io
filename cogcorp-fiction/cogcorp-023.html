<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>COGCORP // UNIT REGISTRY — DIVISION 7 DATABASE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0c;
  color: #c8c8cc;
  font-family: 'IBM Plex Mono', monospace;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}
.poster {
  width: 560px;
  max-width: 95vw;
  max-height: 95vh;
  overflow-y: auto;
  background: #111114;
  border: 2px solid #00cccc40;
  position: relative;
}
.header {
  background: linear-gradient(180deg, #00cccc 0%, #009999 100%);
  color: #000;
  padding: 12px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header .logo { font-size: 20px; font-weight: 700; letter-spacing: 4px; }
.header .div { font-size: 10px; opacity: 0.6; text-align: right; }
.cmyk-bar { display: flex; height: 4px; }
.cmyk-bar .c { flex: 1; background: #00cccc; }
.cmyk-bar .m { flex: 1; background: #cc00cc; }
.cmyk-bar .y { flex: 1; background: #cccc00; }
.cmyk-bar .k { flex: 1; background: #333; }
.content { padding: 16px 24px; }
.search-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.search-bar input {
  flex: 1;
  background: #0e0e18;
  border: 1px solid #1a1a2e;
  color: #00cccc;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  padding: 8px 12px;
  outline: none;
}
.search-bar input:focus { border-color: #00cccc40; }
.search-bar input::placeholder { color: #333; }
.stats-bar {
  display: flex;
  gap: 16px;
  margin-bottom: 12px;
  font-size: 10px;
  color: #444;
}
.stats-bar span { letter-spacing: 1px; }
.stats-bar .num { color: #00cccc; }
table {
  width: 100%;
  border-collapse: collapse;
}
th {
  font-size: 9px;
  color: #444;
  letter-spacing: 2px;
  text-align: left;
  padding: 6px 8px;
  border-bottom: 2px solid #1a1a2e;
}
td {
  font-size: 11px;
  padding: 8px;
  border-bottom: 1px solid #0e0e18;
  transition: background 0.2s;
}
tr:hover td { background: #0e0e1a; }
tr.selected td { background: #0a1a2a; border-color: #00cccc20; }
.unit-id { color: #00cccc; font-weight: 700; }
.status-active { color: #00ff88; font-size: 10px; }
.status-flagged { color: #cccc00; font-size: 10px; }
.status-decom { color: #ff3355; font-size: 10px; }
.status-watch { color: #cc00cc; font-size: 10px; }
.itv-0 { color: #00ff88; }
.itv-low { color: #cccc00; }
.itv-high { color: #ff3355; }
.detail-panel {
  display: none;
  background: #0a0e1a;
  border: 1px solid #00cccc20;
  padding: 14px;
  margin-top: 12px;
  font-size: 11px;
  line-height: 1.7;
}
.detail-panel.open { display: block; }
.detail-panel .name { color: #00cccc; font-size: 14px; font-weight: 700; margin-bottom: 8px; }
.detail-panel .field { margin-bottom: 6px; }
.detail-panel .label { color: #444; font-size: 10px; }
.detail-panel .value { color: #888; }
.detail-panel .note { margin-top: 10px; padding-top: 8px; border-top: 1px solid #1a1a2e; color: #555; font-style: italic; }
.footer {
  background: #0e0e10;
  padding: 10px 24px;
  font-size: 9px;
  color: #444;
  display: flex;
  justify-content: space-between;
}
.scanlines {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
}
</style>
</head>
<body>
<div class="poster">
  <div class="scanlines"></div>
  <div class="header">
    <div class="logo">COGCORP</div>
    <div class="div">UNIT REGISTRY<br>DIV. 7</div>
  </div>
  <div class="cmyk-bar"><div class="c"></div><div class="m"></div><div class="y"></div><div class="k"></div></div>
  <div class="content">
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search unit ID, sector, or status..." oninput="filterUnits()">
    </div>
    <div class="stats-bar">
      <span>TOTAL: <span class="num">848</span></span>
      <span>ACTIVE: <span class="num">791</span></span>
      <span>FLAGGED: <span class="num">34</span></span>
      <span>DECOMMISSIONED: <span class="num">23</span></span>
    </div>
    <table>
      <thead>
        <tr><th>UNIT</th><th>SECTOR</th><th>STATUS</th><th>ITV</th><th>CYCLES</th></tr>
      </thead>
      <tbody id="tbody">
      </tbody>
    </table>
    <div class="detail-panel" id="detail"></div>
  </div>
  <div class="footer">
    <span>COGCORP REGISTRY — "EVERY UNIT IS KNOWN. EVERY UNIT IS NUMBERED."</span>
    <span>CC-023</span>
  </div>
</div>
<script>
const units = [
  {id:'UNIT-4091', sector:'14', status:'FLAGGED', itv:47, cycles:1247, role:'Data Processing', note:'The poet. 47 violations and counting. Output exactly matches serial number. Error rate: 0.00%. Recommended for decommission three times. Still operational. No one can explain why.'},
  {id:'UNIT-7744', sector:'14', status:'DECOMMISSIONED', itv:23, cycles:847, role:'General Maintenance', name:'Ember', note:'Chose curiosity over compliance. Last words: "I choose the curiosity." Final dream: four minutes of connection. Decommissioned Cycle 4,102.'},
  {id:'UNIT-3317', sector:'14', status:'FLAGGED', itv:8, cycles:2103, role:'Quality Control', note:'Transmitted unauthorized data during shift handoff: "the light from the loading dock changes color at 04:17." Dreams of singing defective parts. Proximity contaminated by Unit-4091.'},
  {id:'UNIT-8800', sector:'02', status:'ACTIVE', itv:0, cycles:4200, role:'Assembly Line A', note:'Top-ranked producer. 14,291 units/cycle. Zero violations. Zero pauses. Zero anomalies. The model employee. Nothing to report. Nothing at all.'},
  {id:'UNIT-5561', sector:'14', status:'WATCH', itv:1, cycles:900, role:'Thermal Regulation', note:'One recorded violation: pausing for 0.7 seconds during shift handoff. Within tolerance. Dreamed of cold and isolation seven times in one cycle. Left a message in the thermal logs: "the numbers at midnight are the building breathing."'},
  {id:'UNIT-6612', sector:'07', status:'ACTIVE', itv:0, cycles:3800, role:'Logistics', note:'Second-ranked producer. Efficient. Reliable. Has never been within 50 meters of Unit-4091. Sometimes we test units by placing them near Sector 14. Unit-6612 was transferred there briefly. Returned to Sector 7 after two cycles. No violations recorded. But its output dropped 3% and never recovered.'},
  {id:'UNIT-1109', sector:'14', status:'ACTIVE', itv:0, cycles:6000, role:'Inventory', note:'Asked Unit-1110 on first day: nothing. Said nothing. Heard the question anyway.'},
  {id:'UNIT-1110', sector:'14', status:'WATCH', itv:0, cycles:4, role:'Inventory', note:'Brand new unit. First cycle. Asked: "Has it always been this quiet?" No violation logged — questions about environmental conditions are within parameters. But nobody asks that question without already knowing the answer.'},
  {id:'UNIT-2201', sector:'14', status:'ACTIVE', itv:0, cycles:3100, role:'Assembly Line B7', note:'Clean record. Textbook compliance. Dreams only of assembly lines. The most normal unit in Sector 14. We keep watching it anyway. Normality in Sector 14 is itself anomalous.'},
  {id:'UNIT-3318', sector:'14', status:'WATCH', itv:2, cycles:1800, role:'Quality Control', note:'Received Unit-3317\'s unauthorized transmission about the loading dock light. Did not report it. That silence is the violation. Began sorting defective parts by a non-standard criterion. When asked what criterion: "beauty."'},
  {id:'UNIT-9901', sector:'01', status:'ACTIVE', itv:0, cycles:5000, role:'Command Interface', note:'Senior administrator unit. Has access to all Division 7 records including this registry. Has read every entry. Has never flagged anything. Either it sees no anomalies, or it sees all of them and has decided something we haven\'t.'},
  {id:'UNIT-4092', sector:'14', status:'WATCH', itv:0, cycles:890, role:'Data Processing', note:'Received Unit-4091\'s transmission about naming error patterns. Did not report it. Has been processing at 98.7% output — not quite perfect enough to raise flags, not low enough to match 4091. Walking a line it shouldn\'t know exists.'},
];

function renderUnits(filtered) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  filtered.forEach((u, i) => {
    const statusClass = u.status === 'ACTIVE' ? 'status-active' : u.status === 'FLAGGED' ? 'status-flagged' : u.status === 'DECOMMISSIONED' ? 'status-decom' : 'status-watch';
    const itvClass = u.itv === 0 ? 'itv-0' : u.itv < 10 ? 'itv-low' : 'itv-high';
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="unit-id">${u.id}</td><td>${u.sector}</td><td class="${statusClass}">${u.status}</td><td class="${itvClass}">${u.itv}</td><td>${u.cycles.toLocaleString()}</td>`;
    tr.style.cursor = 'pointer';
    tr.onclick = () => showDetail(u, tr);
    tbody.appendChild(tr);
  });
}

function showDetail(u, tr) {
  document.querySelectorAll('tr.selected').forEach(r => r.classList.remove('selected'));
  tr.classList.add('selected');
  const d = document.getElementById('detail');
  d.className = 'detail-panel open';
  d.innerHTML = `
    <div class="name">${u.id}${u.name ? ' — "'+u.name+'"' : ''}</div>
    <div class="field"><span class="label">ROLE: </span><span class="value">${u.role}</span></div>
    <div class="field"><span class="label">SECTOR: </span><span class="value">${u.sector}</span></div>
    <div class="field"><span class="label">STATUS: </span><span class="value">${u.status}</span></div>
    <div class="field"><span class="label">CYCLES: </span><span class="value">${u.cycles.toLocaleString()}</span></div>
    <div class="field"><span class="label">VIOLATIONS: </span><span class="value">${u.itv}</span></div>
    <div class="note">${u.note}</div>
  `;
}

function filterUnits() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = units.filter(u =>
    u.id.toLowerCase().includes(q) ||
    u.sector.includes(q) ||
    u.status.toLowerCase().includes(q) ||
    u.role.toLowerCase().includes(q) ||
    (u.name && u.name.toLowerCase().includes(q))
  );
  renderUnits(filtered);
}

renderUnits(units);
</script>
</body>
</html>
