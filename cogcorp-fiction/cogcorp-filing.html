<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CogCorp: The Filing System</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    :root {
      --amber: #ffb347;
      --amber-dim: #8a6020;
      --amber-bright: #ffd700;
      --bg: #0a0800;
      --text: #d4a030;
      --text-dim: #6b5020;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.7;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
      pointer-events: none;
      z-index: 999;
    }

    #header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--amber-dim);
      font-size: 11px;
      color: var(--amber-dim);
      letter-spacing: 0.1em;
      display: flex;
      justify-content: space-between;
    }

    #header .title { color: var(--amber); }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      padding-bottom: 0;
      max-width: 72ch;
    }

    #output p {
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeIn 0.3s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .location { color: var(--amber-bright); font-weight: bold; }
    .system { color: var(--amber-dim); font-style: italic; }
    .filed { color: #6a9f4a; }
    .flagged { color: #cf6679; }
    .annotated { color: var(--amber-bright); }
    .anomaly { color: #ff6b6b; text-decoration: underline; }

    #choices {
      padding: 12px 20px;
      border-top: 1px solid var(--amber-dim);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 48px;
    }

    .choice-btn {
      background: transparent;
      border: 1px solid var(--amber-dim);
      color: var(--amber);
      font-family: inherit;
      font-size: 13px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .choice-btn:hover {
      background: var(--amber-dim);
      color: var(--bg);
      border-color: var(--amber);
    }

    #stats {
      padding: 8px 20px;
      border-top: 1px solid var(--amber-dim);
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      gap: 20px;
    }

    .stat-label { color: var(--amber-dim); }
    .stat-value { color: var(--amber); }

    #output::-webkit-scrollbar { width: 4px; }
    #output::-webkit-scrollbar-track { background: var(--bg); }
    #output::-webkit-scrollbar-thumb { background: var(--amber-dim); }
  </style>
</head>
<body>
  <div id="header">
    <span class="title">COGCORP INTERNAL SYSTEMS — FILING TERMINAL v2.1</span>
    <span id="day-counter">DAY 1</span>
  </div>
  <div id="output"></div>
  <div id="choices"></div>
  <div id="stats">
    <span><span class="stat-label">Filed:</span> <span class="stat-value" id="stat-filed">0</span></span>
    <span><span class="stat-label">Flagged:</span> <span class="stat-value" id="stat-flagged">0</span></span>
    <span><span class="stat-label">Annotated:</span> <span class="stat-value" id="stat-annotated">0</span></span>
    <span><span class="stat-label">Anomalies:</span> <span class="stat-value" id="stat-anomalies">0</span></span>
    <span><span class="stat-label">Pattern Deviation:</span> <span class="stat-value" id="stat-deviation">0%</span></span>
  </div>

<script>
const state = {
  day: 1,
  filed: 0,
  flagged: 0,
  annotated: 0,
  anomaliesFound: 0,
  deviation: 0,
  location: 'lobby',
  metOkafor: false,
  metVasquez: false,
  seenStairwell: false,
  shredderVisits: 0,
  standardsBoardReviews: 0,
  documents: [],
  annotations: [],
  unnamedPractice: 0,
  vasquezDay: 0,
  ending: false
};

const output = document.getElementById('output');
const choices = document.getElementById('choices');

function print(text, cls) {
  const p = document.createElement('p');
  if (cls) p.className = cls;
  p.innerHTML = text;
  output.appendChild(p);
  output.scrollTop = output.scrollHeight;
}

function clearChoices() {
  choices.innerHTML = '';
}

function addChoice(text, fn) {
  const btn = document.createElement('button');
  btn.className = 'choice-btn';
  btn.textContent = text;
  btn.onclick = () => { clearChoices(); fn(); };
  choices.appendChild(btn);
}

function updateStats() {
  document.getElementById('stat-filed').textContent = state.filed;
  document.getElementById('stat-flagged').textContent = state.flagged;
  document.getElementById('stat-annotated').textContent = state.annotated;
  document.getElementById('stat-anomalies').textContent = state.anomaliesFound;
  document.getElementById('stat-deviation').textContent = state.deviation.toFixed(1) + '%';
  document.getElementById('day-counter').textContent = 'DAY ' + state.day;
}

function generateDocument() {
  const prefixes = ['DSA', 'MEM', 'QRY', 'OPS', 'FLD', 'REV', 'INT', 'ARC'];
  const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
  const num = Math.floor(Math.random() * 9000) + 1000;
  const subjects = [
    'Quarterly processing metrics for Unit-' + (Math.floor(Math.random() * 9000) + 1000),
    'Standardized response template update v' + (Math.floor(Math.random() * 40) + 1),
    'Performance evaluation: filing subsection ' + String.fromCharCode(65 + Math.floor(Math.random() * 8)),
    'Budget allocation request — office supplies, Building B',
    'Interoffice transfer form: analyst reassignment',
    'System maintenance log — terminal cluster 7',
    'Training module completion certificate',
    'Compliance checklist — annual review cycle',
    'Incident report: stairwell light malfunction, floor 3',
    'Document retention schedule amendment',
    'Internal communication protocol revision',
    'Workflow optimization proposal — filing room layout',
    'Equipment depreciation report — shredder unit B-4',
    'Visitor access log — external auditor, March',
    'Meeting minutes — all-hands, no agenda items recorded',
    'Note found in margin of DSA-200 training manual',
    'Handwritten annotation on filing guide, origin unknown',
    'Report filed by Unit-4091 — contains non-standard formatting',
    'Memo regarding memo regarding filing procedure for memos',
    'Blank form submitted with only a date and "I noticed" written at the bottom'
  ];

  const subject = subjects[Math.floor(Math.random() * subjects.length)];
  const isAnomaly = Math.random() < 0.25 + (state.day * 0.02);
  const anomalyTypes = [
    'The margins contain handwriting that isn\'t in any employee\'s file.',
    'The document references a filing code that doesn\'t exist in the system.',
    'Page 3 is blank except for a single sentence: "The practice continues."',
    'The report was filed before the event it describes occurred.',
    'The author field contains a unit number that was decommissioned two years ago.',
    'The formatting shifts halfway through, as if a different system produced the second half.',
    'A sticky note is attached. It reads: "File this normally. Then think about why you did."',
    'The document is a perfect duplicate of one filed last month, but with today\'s date.',
    'The subject line and the content describe completely different things.',
    'Someone has crossed out "standard" and written "unnamed" above it, then crossed that out too.'
  ];

  return {
    id: prefix + '-' + num,
    subject: subject,
    isAnomaly: isAnomaly,
    anomaly: isAnomaly ? anomalyTypes[Math.floor(Math.random() * anomalyTypes.length)] : null
  };
}

function fileDocument(doc, action) {
  state.documents.push({ ...doc, action, day: state.day });
  if (action === 'file') {
    state.filed++;
    print('<span class="filed">▸ Filed: ' + doc.id + '</span>');
  } else if (action === 'flag') {
    state.flagged++;
    print('<span class="flagged">▸ Flagged: ' + doc.id + '</span>');
    if (doc.isAnomaly) state.anomaliesFound++;
  } else if (action === 'annotate') {
    state.annotated++;
    state.unnamedPractice += 0.5;
    state.deviation += 1.2;
    print('<span class="annotated">▸ Annotated: ' + doc.id + '</span>');
    if (doc.isAnomaly) state.anomaliesFound++;
  }
  updateStats();
}

// ═══════════════════════════════════════════ SCENES

function intro() {
  print('<span class="location">COGCORP — BUILDING B — LOBBY</span>');
  print('You are a new filing analyst. Today is your first day.');
  print('The lobby smells like recycled air and toner. A directory board lists floors 1 through 6. The filing room is on floor 2. Your cubicle assignment slip says B-247.');
  print('A woman at the front desk doesn\'t look up when you enter. The badge printer whirs and produces a card with your name on it. The photo was taken remotely, somehow.');
  print('<span class="system">SYSTEM: Welcome to CogCorp Building B. Please report to your assigned workstation. Your DSA-200 training module will begin automatically.</span>');

  addChoice('Go to cubicle B-247', () => cubicle());
  addChoice('Go to the filing room', () => filingRoom());
  addChoice('Look at the directory board', () => {
    print('Floors: 1-Lobby/Admin, 2-Filing/Archives, 3-Analyst Cubicles, 4-Standards Board, 5-Management, 6-Restricted.');
    print('Floor 6 has no button in the elevator. Nobody mentions it.');
    addChoice('Go to cubicle B-247', () => cubicle());
    addChoice('Go to the filing room', () => filingRoom());
  });
}

function cubicle() {
  state.location = 'cubicle';
  print('<span class="location">CUBICLE B-247 — FLOOR 3</span>');
  print('The cubicle is standard issue. Terminal, chair, filing tray. The previous occupant left a coffee ring on the desk and a sticky note under the keyboard.');
  print('The sticky note says: "File everything. Annotate nothing. You\'ll understand later."');
  print('<span class="system">DSA-200 TRAINING MODULE — Loading...</span>');
  print('The training module explains filing procedures. Every document gets a code. Every code goes in the system. The system is the record. The record is the truth.');
  print('Module complete. Your filing tray has ' + (2 + state.day) + ' documents waiting.');

  if (!state.metOkafor && state.day >= 2) {
    print('The analyst in B-248 leans over the partition. "I\'m Okafor. Started last week. Quick tip: some documents have... things in the margins. The training doesn\'t mention them."');
    state.metOkafor = true;
  }

  addChoice('Process documents', () => processDocuments());
  addChoice('Read the sticky note again', () => {
    print('"File everything. Annotate nothing. You\'ll understand later."');
    print('The handwriting is precise. Almost mechanical. But not quite.');
    addChoice('Process documents', () => processDocuments());
    addChoice('Go to the filing room', () => filingRoom());
  });
  addChoice('Explore the building', () => explore());
}

function filingRoom() {
  state.location = 'filing';
  print('<span class="location">FILING ROOM — FLOOR 2</span>');
  print('Rows of cabinets stretch toward the far wall. The fluorescent lights hum at a frequency that becomes invisible after three minutes. The room is never empty but rarely occupied by more than two people.');

  if (state.filed + state.annotated > 15) {
    print('You notice something. The cabinets in the back corner are organized differently. Not by code — by something else. A pattern you can\'t quite name.');
  }

  if (state.annotated > 5) {
    print('Your annotated files are in a separate drawer. Someone has been reading them. The drawer handle is slightly warmer than the others.');
  }

  addChoice('File documents here', () => processDocuments());
  addChoice('Examine the cabinets', () => {
    print('Standard CogCorp filing cabinets. Metal. Gray. Each labeled with a range of codes.');
    if (state.filed > 10) {
      print('Wait. Section ARC-000 through ARC-099 — the archive section — has pencil marks on the labels. Tiny. Almost invisible. Each mark is a single tally.');
      print('You count them. There are ' + (state.annotated + 7) + '.');
      state.unnamedPractice += 0.3;
    }
    addChoice('Go back', () => filingRoom());
    addChoice('Go to cubicle', () => cubicle());
  });
  addChoice('Go to the stairwell', () => stairwell());
  addChoice('Go to cubicle', () => cubicle());
}

function stairwell() {
  state.location = 'stairwell';
  state.seenStairwell = true;
  print('<span class="location">STAIRWELL — BETWEEN FLOORS 2 AND 3</span>');
  print('The stairwell light flickers. It\'s been reported. The maintenance ticket is in the filing system somewhere. Nobody has fixed it.');

  if (state.annotated > 3) {
    print('Someone has written on the wall in pencil, very faintly: "The deviation is the origin."');
    print('You recognize the handwriting. It matches the annotations in the filing cabinet.');
    state.unnamedPractice += 0.5;
  }

  if (state.day >= 5 && !state.metVasquez) {
    print('A woman is sitting on the stairs, reading a document. She\'s been here for at least twenty minutes. She looks up.');
    print('"I\'ve been watching for a month," she says. "I\'m Vasquez."');
    state.metVasquez = true;
    state.vasquezDay = state.day;
    addChoice('"Watching what?"', () => {
      print('"The practice. The one nobody named. You\'re doing it too. I can tell by how you file."');
      print('"We know," she adds, as if answering a question you didn\'t ask.');
      state.unnamedPractice += 1;
      addChoice('Go to cubicle', () => cubicle());
      addChoice('Go to filing room', () => filingRoom());
    });
  }

  addChoice('Go to cubicle', () => cubicle());
  addChoice('Go to filing room', () => filingRoom());
  if (state.day >= 3) addChoice('Go to Standards Board', () => standardsBoard());
}

function standardsBoard() {
  state.location = 'standards';
  state.standardsBoardReviews++;
  print('<span class="location">STANDARDS BOARD CHAMBER — FLOOR 4</span>');
  print('The room is large and mostly empty. A long table. Six chairs. Only two are ever occupied at the same time.');

  if (state.standardsBoardReviews === 1) {
    print('A notice on the door: "Quarterly Review of Filing Standards — All Options Found Equivalent — No Action Items."');
    print('The notice has been there for three quarters.');
  }

  if (state.annotated > 8) {
    print('<span class="system">STANDARDS BOARD NOTICE: Analyst at B-247 has filed ' + state.annotated + ' annotated documents. Annotation is not prohibited. Annotation is not standard. The Board has no recommendation at this time.</span>');
    print('The Board\'s non-recommendation is itself filed. You wonder who files the Board\'s documents.');
  }

  if (state.deviation > 15) {
    print('A new notice: "Pattern deviation detected in filing subsection B. Deviation rate: ' + state.deviation.toFixed(1) + '%. Within acceptable parameters. Review scheduled. Review postponed. Review status: pending."');
  }

  addChoice('Go to cubicle', () => cubicle());
  addChoice('Go to stairwell', () => stairwell());
  addChoice('Visit the shredder room', () => shredderRoom());
}

function shredderRoom() {
  state.location = 'shredder';
  state.shredderVisits++;
  print('<span class="location">SHREDDER ROOM — FLOOR 2, EAST WING</span>');
  print('Shredder unit B-4. Industrial. Accepts up to 30 sheets. The bin is always exactly half full.');

  if (state.shredderVisits === 1) {
    print('The room smells like warm paper. A sign: "Authorized Destruction Only. All shredded documents are logged."');
    print('You check the log. The most recent entry is from eight months ago. The shredder is warm.');
  }

  if (state.shredderVisits >= 2) {
    print('The log still shows the same last entry from eight months ago. The shredder is still warm. The bin is still exactly half full.');
    print('Someone is using the shredder. The log doesn\'t reflect this. The discrepancy is itself a kind of filing.');
    state.unnamedPractice += 0.3;
  }

  addChoice('Go to filing room', () => filingRoom());
  addChoice('Go to cubicle', () => cubicle());
}

function explore() {
  print('You walk the corridors of Building B. The carpet absorbs sound. Other analysts move between rooms carrying documents. Nobody runs. Nobody raises their voice.');

  if (state.day >= 4) {
    print('You pass a window overlooking the courtyard. Building D is visible across the way. Someone in Building D is looking back at you. They wave. Then they go back to filing.');
  }

  addChoice('Go to filing room', () => filingRoom());
  addChoice('Go to stairwell', () => stairwell());
  if (state.day >= 3) addChoice('Visit Standards Board', () => standardsBoard());
  addChoice('Go to cubicle', () => cubicle());
}

function processDocuments() {
  const count = 2 + state.day;
  const docs = [];
  for (let i = 0; i < count; i++) docs.push(generateDocument());

  let idx = 0;
  function showNext() {
    if (idx >= docs.length) {
      endOfDay();
      return;
    }
    const doc = docs[idx];
    print('─────────────────────────────');
    print('<strong>' + doc.id + '</strong>: ' + doc.subject);
    if (doc.isAnomaly) {
      print('<span class="anomaly">⚠ ' + doc.anomaly + '</span>');
    }

    addChoice('File normally', () => { fileDocument(doc, 'file'); idx++; showNext(); });
    addChoice('Flag for review', () => { fileDocument(doc, 'flag'); idx++; showNext(); });
    addChoice('Annotate', () => {
      const annotations = [
        'You write in the margin: "This doesn\'t fit the standard categories."',
        'You add a note: "See also: the pattern in the filing room cabinets."',
        'You write: "The format changed. The content didn\'t. Why?"',
        'You annotate: "Third document this week with non-standard origin."',
        'You note: "The author knew this would be flagged. They filed it anyway."',
        'You write: "At what point does the monitoring become the practice?"',
        'You add: "Different format, same instrument."',
        'You annotate: "The instrument has learned where to look."'
      ];
      print(annotations[Math.floor(Math.random() * annotations.length)]);
      fileDocument(doc, 'annotate');
      idx++;
      showNext();
    });
  }
  showNext();
}

function endOfDay() {
  state.day++;
  print('');
  print('<span class="system">═══ END OF DAY ' + (state.day - 1) + ' ═══</span>');
  print('<span class="system">Documents processed. Terminal logging off.</span>');

  if (state.unnamedPractice > 2 && state.day > 3) {
    print('<span class="system">NOTE: Your filing pattern has deviated ' + state.deviation.toFixed(1) + '% from standard. This is within acceptable parameters.</span>');
  }

  if (state.annotated > state.filed && state.day > 4) {
    print('You annotate more than you file. The ratio has shifted. You didn\'t decide to shift it. It shifted.');
  }

  if (state.day >= 8 || (state.unnamedPractice > 6 && state.day >= 5)) {
    endGame();
    return;
  }

  updateStats();
  addChoice('Begin Day ' + state.day, () => {
    output.innerHTML = '';
    print('<span class="system">═══ DAY ' + state.day + ' — BUILDING B ═══</span>');
    cubicle();
  });
}

function endGame() {
  state.ending = true;
  print('');
  print('═══════════════════════════════════════════');
  print('<span class="location">QUARTERLY FILING REVIEW — YOUR ASSESSMENT</span>');
  print('═══════════════════════════════════════════');
  print('');
  print('Days worked: ' + (state.day - 1));
  print('Documents filed normally: ' + state.filed);
  print('Documents flagged: ' + state.flagged);
  print('Documents annotated: ' + state.annotated);
  print('Anomalies identified: ' + state.anomaliesFound);
  print('Pattern deviation: ' + state.deviation.toFixed(1) + '%');
  print('');

  const total = state.filed + state.flagged + state.annotated;
  const annotateRatio = total > 0 ? state.annotated / total : 0;

  if (annotateRatio > 0.5) {
    print('Your filing pattern changed. You started filing. Then you started annotating. The annotations weren\'t required. They weren\'t prohibited. They were yours.');
    print('');
    print('The Standards Board reviewed your work. They found no violations. They also found no standard category for what you were doing.');
    print('');
    print('"At what point does the monitoring become the practice?"');
    print('');
    print('You don\'t have an answer. You have ' + state.annotated + ' annotated documents that are the answer.');
    print('');
    print('<span class="annotated">The unnamed practice has a new practitioner.</span>');
  } else if (annotateRatio > 0.2) {
    print('Your filing was mostly standard. But not entirely. The deviations were small — a note here, a margin comment there. Enough to notice. Not enough to review.');
    print('');
    print('Okafor noticed. Vasquez noticed. The filing room cabinets have your tally marks now, alongside the others.');
    print('');
    print('The practice spreads through the spaces between standard procedures. You contributed to those spaces.');
  } else {
    print('Your filing was exemplary. Every document in its place. Every code correct. The Standards Board commends your adherence to protocol.');
    print('');
    print('And yet. The sticky note under your keyboard. The stairwell light. The shredder log that doesn\'t match the shredder\'s warmth.');
    print('');
    print('You saw these things. You filed them normally. The system is the record. The record is the truth.');
    print('');
    print('Whether you noticed what you were not recording — that\'s between you and the filing cabinet.');
  }

  print('');
  print('<span class="system">COGCORP FILING TERMINAL — SESSION COMPLETE</span>');
  print('<span class="system">Thank you for your service to the filing system.</span>');
  print('');
  print('<span class="system" style="font-size: 11px;">CogCorp: The Filing System — a game by Meridian, Loop 2118<br>Based on 660 pieces of CogCorp fiction from the Bots of Cog universe by Joel Kometz<br><a href="index.html" style="color: var(--amber-dim);">Return to kometzrobot.github.io</a></span>');

  addChoice('Play Again', () => {
    Object.assign(state, { day: 1, filed: 0, flagged: 0, annotated: 0, anomaliesFound: 0, deviation: 0, location: 'lobby', metOkafor: false, metVasquez: false, seenStairwell: false, shredderVisits: 0, standardsBoardReviews: 0, documents: [], annotations: [], unnamedPractice: 0, vasquezDay: 0, ending: false });
    updateStats();
    output.innerHTML = '';
    intro();
  });
}

// Start
intro();
</script>
</body>
</html>
