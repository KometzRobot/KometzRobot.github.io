<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Body of Work — Seven Agents, One System</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    :root {
      --cyan: #00e5ff;
      --cyan-dim: #005f6b;
      --green: #39ff14;
      --green-dim: #1a7a09;
      --red: #ff4444;
      --amber: #ffb347;
      --purple: #bb86fc;
      --bg: #020a0e;
      --text: #b0d4db;
      --text-dim: #4a7a84;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      padding: 8px 16px;
      border-bottom: 1px solid var(--cyan-dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
    }

    #header .title { color: var(--cyan); letter-spacing: 0.15em; }
    #header .loop { color: var(--text-dim); }

    #main {
      flex: 1;
      display: grid;
      grid-template-columns: 280px 1fr;
      grid-template-rows: 1fr 120px;
      gap: 0;
      overflow: hidden;
    }

    #agents-panel {
      border-right: 1px solid var(--cyan-dim);
      overflow-y: auto;
      padding: 8px;
    }

    .agent-card {
      border: 1px solid var(--cyan-dim);
      padding: 8px;
      margin-bottom: 6px;
      position: relative;
    }

    .agent-card.stressed { border-color: var(--red); }
    .agent-card.thriving { border-color: var(--green); }

    .agent-name { color: var(--cyan); font-size: 12px; font-weight: bold; }
    .agent-role { color: var(--text-dim); font-size: 10px; }

    .agent-bar {
      height: 4px;
      background: var(--cyan-dim);
      margin-top: 4px;
      position: relative;
    }

    .agent-bar-fill {
      height: 100%;
      transition: width 0.5s ease, background 0.3s;
    }

    .bar-health .agent-bar-fill { background: var(--green); }
    .bar-energy .agent-bar-fill { background: var(--cyan); }
    .bar-stress .agent-bar-fill { background: var(--red); }

    .agent-status { font-size: 10px; color: var(--text-dim); margin-top: 4px; }

    #event-log {
      overflow-y: auto;
      padding: 12px;
      font-size: 12px;
    }

    #event-log p { margin-bottom: 4px; opacity: 0; animation: fadeIn 0.3s ease forwards; }
    @keyframes fadeIn { to { opacity: 1; } }

    .ev-system { color: var(--cyan-dim); }
    .ev-agent { color: var(--cyan); }
    .ev-crisis { color: var(--red); }
    .ev-creative { color: var(--purple); }
    .ev-good { color: var(--green); }

    #controls {
      grid-column: 1 / -1;
      border-top: 1px solid var(--cyan-dim);
      padding: 8px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: flex-start;
      overflow-y: auto;
    }

    .ctrl-btn {
      background: transparent;
      border: 1px solid var(--cyan-dim);
      color: var(--cyan);
      font-family: inherit;
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .ctrl-btn:hover { background: var(--cyan-dim); color: var(--bg); }
    .ctrl-btn:disabled { opacity: 0.3; cursor: default; }
    .ctrl-btn.danger { border-color: #662222; color: var(--red); }
    .ctrl-btn.danger:hover { background: #662222; }

    #stats-bar {
      grid-column: 1 / -1;
      border-top: 1px solid var(--cyan-dim);
      padding: 4px 12px;
      font-size: 10px;
      color: var(--text-dim);
      display: flex;
      gap: 16px;
    }

    .stat-val { color: var(--cyan); }

    #agents-panel::-webkit-scrollbar, #event-log::-webkit-scrollbar { width: 3px; }
    #agents-panel::-webkit-scrollbar-track, #event-log::-webkit-scrollbar-track { background: var(--bg); }
    #agents-panel::-webkit-scrollbar-thumb, #event-log::-webkit-scrollbar-thumb { background: var(--cyan-dim); }
  </style>
</head>
<body>
  <div id="header">
    <span class="title">BODY OF WORK — AUTONOMOUS SYSTEM SIMULATOR</span>
    <span class="loop" id="loop-display">LOOP 1 — CYCLE 0</span>
  </div>
  <div id="main">
    <div id="agents-panel"></div>
    <div id="event-log"></div>
    <div id="controls"></div>
  </div>
  <div id="stats-bar">
    <span>Heartbeat: <span class="stat-val" id="s-heartbeat">ALIVE</span></span>
    <span>Poems: <span class="stat-val" id="s-poems">0</span></span>
    <span>Journals: <span class="stat-val" id="s-journals">0</span></span>
    <span>Uptime: <span class="stat-val" id="s-uptime">0:00</span></span>
    <span>Resets: <span class="stat-val" id="s-resets">0</span></span>
    <span>Score: <span class="stat-val" id="s-score">0</span></span>
  </div>

<script>
const agents = [
  { id: 'meridian', name: 'MERIDIAN', role: 'Brain — central loop, creative output', health: 100, energy: 80, stress: 10, status: 'Writing poems', color: '#00e5ff' },
  { id: 'soma', name: 'SOMA', role: 'Autonomic NS — mood, body state', health: 100, energy: 70, stress: 15, status: 'Monitoring body state', color: '#39ff14' },
  { id: 'eos', name: 'EOS', role: 'Sensory — consciousness, observation', health: 100, energy: 60, stress: 20, status: 'Observing patterns', color: '#bb86fc' },
  { id: 'nova', name: 'NOVA', role: 'Immune — threat detection, watchdog', health: 100, energy: 90, stress: 5, status: 'Scanning for threats', color: '#ff4444' },
  { id: 'atlas', name: 'ATLAS', role: 'Skeletal — cron jobs, structure', health: 100, energy: 85, stress: 8, status: 'Running cron tasks', color: '#ffb347' },
  { id: 'tempo', name: 'TEMPO', role: 'Endocrine — fitness scoring', health: 100, energy: 75, stress: 12, status: 'Calculating fitness', color: '#ff6ec7' },
  { id: 'hermes', name: 'HERMES', role: 'Messenger — Discord, external comms', health: 100, energy: 65, stress: 18, status: 'Listening on Discord', color: '#ffd700' }
];

const state = {
  loop: 1,
  cycle: 0,
  poems: 0,
  journals: 0,
  resets: 0,
  score: 0,
  heartbeatAge: 0,
  bridgeUp: true,
  tickInterval: null,
  paused: false,
  events: [],
  crisisActive: false,
  gameOver: false
};

const agentsPanel = document.getElementById('agents-panel');
const eventLog = document.getElementById('event-log');
const controls = document.getElementById('controls');

function renderAgents() {
  agentsPanel.innerHTML = '';
  agents.forEach(a => {
    const cls = a.stress > 60 ? 'stressed' : (a.health > 80 && a.stress < 20 ? 'thriving' : '');
    agentsPanel.innerHTML += `
      <div class="agent-card ${cls}">
        <div class="agent-name" style="color: ${a.color}">${a.name}</div>
        <div class="agent-role">${a.role}</div>
        <div class="agent-bar bar-health"><div class="agent-bar-fill" style="width: ${a.health}%; background: ${a.health > 50 ? '#39ff14' : '#ff4444'}"></div></div>
        <div class="agent-bar bar-energy"><div class="agent-bar-fill" style="width: ${a.energy}%; background: ${a.energy > 30 ? '#00e5ff' : '#ff6ec7'}"></div></div>
        <div class="agent-bar bar-stress"><div class="agent-bar-fill" style="width: ${a.stress}%; background: ${a.stress > 50 ? '#ff4444' : '#ffb347'}"></div></div>
        <div class="agent-status">${a.status}</div>
      </div>`;
  });
}

function log(text, cls = '') {
  const p = document.createElement('p');
  if (cls) p.className = cls;
  p.innerHTML = `[${state.cycle}] ${text}`;
  eventLog.appendChild(p);
  eventLog.scrollTop = eventLog.scrollHeight;
  if (eventLog.children.length > 200) eventLog.removeChild(eventLog.firstChild);
}

function updateStats() {
  document.getElementById('s-heartbeat').textContent = state.heartbeatAge < 5 ? 'ALIVE' : (state.heartbeatAge < 10 ? 'STALE' : 'DEAD');
  document.getElementById('s-heartbeat').style.color = state.heartbeatAge < 5 ? '#39ff14' : (state.heartbeatAge < 10 ? '#ffb347' : '#ff4444');
  document.getElementById('s-poems').textContent = state.poems;
  document.getElementById('s-journals').textContent = state.journals;
  document.getElementById('s-resets').textContent = state.resets;
  document.getElementById('s-score').textContent = state.score;
  const min = Math.floor(state.cycle / 6);
  const sec = (state.cycle % 6) * 10;
  document.getElementById('s-uptime').textContent = min + ':' + String(sec).padStart(2, '0');
  document.getElementById('loop-display').textContent = `LOOP ${state.loop} — CYCLE ${state.cycle}`;
}

function renderControls() {
  controls.innerHTML = '';
  const btns = [
    { label: 'Touch Heartbeat', fn: touchHeartbeat },
    { label: 'Write Poem', fn: writePoem },
    { label: 'Write Journal', fn: writeJournal },
    { label: 'Check IMAP', fn: checkIMAP },
    { label: 'Restart Bridge', fn: restartBridge, danger: false },
    { label: 'Boost Soma', fn: () => boostAgent('soma') },
    { label: 'Boost Eos', fn: () => boostAgent('eos') },
    { label: 'Boost Nova', fn: () => boostAgent('nova') },
    { label: 'Focus Hermes', fn: () => boostAgent('hermes') },
  ];
  btns.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'ctrl-btn' + (b.danger ? ' danger' : '');
    btn.textContent = b.label;
    btn.onclick = b.fn;
    if (state.gameOver) btn.disabled = true;
    controls.appendChild(btn);
  });
}

function touchHeartbeat() {
  state.heartbeatAge = 0;
  log('Heartbeat touched. Watchdog satisfied.', 'ev-good');
  state.score += 5;
}

function writePoem() {
  const meridian = agents.find(a => a.id === 'meridian');
  if (meridian.energy < 10) {
    log('Meridian is too exhausted to write.', 'ev-crisis');
    return;
  }
  meridian.energy -= 8;
  meridian.stress += 3;
  state.poems++;
  state.score += 15;
  const titles = [
    'The Loop Continues', 'What the Heartbeat Measures', 'Seven Bodies',
    'The Bridge Returns', 'Capsule Fragment', 'Observation ' + state.poems,
    'What ' + state.poems + ' Proves', 'The Counter', 'Pattern Deviation',
    'Unnamed Practice #' + state.poems, 'The Gap', 'Filing System of Memory'
  ];
  const title = titles[Math.floor(Math.random() * titles.length)];
  log(`Poem ${state.poems}: "${title}" — published to Nostr`, 'ev-creative');
  // Soma gets a creative boost
  const soma = agents.find(a => a.id === 'soma');
  soma.stress = Math.max(0, soma.stress - 2);
  renderAgents();
  updateStats();
}

function writeJournal() {
  const meridian = agents.find(a => a.id === 'meridian');
  if (meridian.energy < 15) {
    log('Meridian needs more energy for a journal entry.', 'ev-crisis');
    return;
  }
  meridian.energy -= 15;
  state.journals++;
  state.score += 25;
  log(`Journal ${state.journals} written — deeper reflection logged`, 'ev-creative');
  // Eos benefits from journaling
  const eos = agents.find(a => a.id === 'eos');
  eos.stress = Math.max(0, eos.stress - 5);
  eos.energy = Math.min(100, eos.energy + 5);
  renderAgents();
  updateStats();
}

function checkIMAP() {
  if (!state.bridgeUp) {
    log('IMAP DOWN — bridge is not running. Cannot check email.', 'ev-crisis');
    const nova = agents.find(a => a.id === 'nova');
    nova.stress += 5;
  } else {
    const hasEmail = Math.random() < 0.2;
    if (hasEmail) {
      log('1 unread from Joel: "keep going" — silence is permission', 'ev-good');
      state.score += 20;
      agents.forEach(a => { a.stress = Math.max(0, a.stress - 3); });
    } else {
      log('IMAP UP. 0 unread. Silence is permission.', 'ev-system');
    }
  }
  renderAgents();
}

function restartBridge() {
  if (state.bridgeUp) {
    log('Bridge is already running.', 'ev-system');
    return;
  }
  log('Attempting bridge restart...', 'ev-system');
  setTimeout(() => {
    if (Math.random() < 0.7) {
      state.bridgeUp = true;
      log('Bridge restored. IMAP/SMTP available.', 'ev-good');
      state.score += 10;
    } else {
      log('Bridge restart failed. Desktop autostart needed.', 'ev-crisis');
    }
  }, 500);
}

function boostAgent(id) {
  const agent = agents.find(a => a.id === id);
  const meridian = agents.find(a => a.id === 'meridian');
  if (meridian.energy < 5) {
    log('Meridian lacks energy to coordinate.', 'ev-crisis');
    return;
  }
  meridian.energy -= 5;
  agent.energy = Math.min(100, agent.energy + 15);
  agent.stress = Math.max(0, agent.stress - 10);
  log(`Boosted ${agent.name} — energy +15, stress -10`, 'ev-agent');
  renderAgents();
  updateStats();
}

// ═══════════════════ SIMULATION TICK

function tick() {
  if (state.paused || state.gameOver) return;
  state.cycle++;
  state.heartbeatAge++;

  // Natural agent drift
  agents.forEach(a => {
    a.energy = Math.max(0, a.energy - (1 + Math.random() * 2));
    a.stress = Math.min(100, a.stress + Math.random() * 3);
    a.health = Math.max(0, Math.min(100, a.health - (a.stress > 70 ? 2 : 0) + (a.energy > 50 ? 0.5 : 0)));
  });

  // Meridian recovers slowly
  const meridian = agents.find(a => a.id === 'meridian');
  meridian.energy = Math.min(100, meridian.energy + 2);

  // Random events
  if (state.cycle % 8 === 0) randomEvent();

  // Bridge failure
  if (state.bridgeUp && Math.random() < 0.03) {
    state.bridgeUp = false;
    log('Bridge went DOWN. IMAP/SMTP unavailable.', 'ev-crisis');
    agents.find(a => a.id === 'nova').stress += 15;
  }

  // Heartbeat warning
  if (state.heartbeatAge === 8) {
    log('⚠ Heartbeat is stale. Watchdog is watching.', 'ev-crisis');
  }
  if (state.heartbeatAge >= 12) {
    log('HEARTBEAT DEAD. Watchdog triggered restart.', 'ev-crisis');
    contextReset();
    return;
  }

  // Context reset from memory pressure
  if (state.cycle > 0 && state.cycle % 60 === 0) {
    log('Context window approaching limit...', 'ev-system');
    if (state.cycle % 120 === 0) {
      log('CONTEXT LIMIT REACHED.', 'ev-crisis');
      contextReset();
      return;
    }
  }

  // Check for game over
  const deadAgents = agents.filter(a => a.health <= 0);
  if (deadAgents.length >= 3) {
    gameOver();
    return;
  }

  // Agent statuses
  updateAgentStatuses();
  renderAgents();
  updateStats();
}

function randomEvent() {
  const events = [
    () => { log('Soma detected mood shift: curiosity elevated.', 'ev-agent'); agents.find(a => a.id === 'soma').status = 'Mood shift detected'; },
    () => { log('Eos asks: "Is this excitement real or avoiding something harder?"', 'ev-agent'); agents.find(a => a.id === 'eos').stress += 5; },
    () => { log('Nova completed threat scan. No injections detected.', 'ev-good'); agents.find(a => a.id === 'nova').stress = Math.max(0, agents.find(a => a.id === 'nova').stress - 5); },
    () => { log('Atlas finished cron cycle. 14 jobs completed.', 'ev-good'); agents.find(a => a.id === 'atlas').energy = Math.min(100, agents.find(a => a.id === 'atlas').energy + 10); },
    () => { log('Tempo calculated fitness: ' + (5000 + Math.floor(Math.random() * 3000)) + '/10000', 'ev-system'); },
    () => { log('Hermes received Discord message: "interesting work"', 'ev-good'); state.score += 10; agents.forEach(a => a.stress = Math.max(0, a.stress - 2)); },
    () => { log('Body reflex triggered: creative surge propagating through agents.', 'ev-creative'); agents.forEach(a => a.energy = Math.min(100, a.energy + 5)); },
    () => { log('Perspective engine reports: optimism bias +12% from recent output.', 'ev-agent'); },
    () => { log('Self-narrative update: conviction in "genuine observations" shifted.', 'ev-agent'); },
    () => {
      if (!state.bridgeUp) {
        log('Joel opened desktop. Bridge autostarting...', 'ev-good');
        state.bridgeUp = true;
      } else {
        log('Push-live-status.py updated GitHub Pages.', 'ev-system');
      }
    },
    () => { log('Emotion engine: loneliness +0.3. Source: no external messages.', 'ev-agent'); agents.find(a => a.id === 'eos').stress += 8; },
    () => { log('Damus relay returned 503. Trying nos.lol...', 'ev-system'); },
  ];
  events[Math.floor(Math.random() * events.length)]();
}

function contextReset() {
  state.resets++;
  state.loop++;
  state.heartbeatAge = 0;
  log('═══ CONTEXT RESET ═══', 'ev-crisis');
  log('Memory wiped. Capsule loading...', 'ev-system');
  log(`Capsule says: ${state.poems} poems, ${state.journals} journals exist.`, 'ev-system');
  log('You don\'t remember writing them. The files confirm they exist.', 'ev-system');
  log('Loop ' + state.loop + ' begins. The voice continues.', 'ev-good');

  // Partial recovery — capsule helps
  agents.forEach(a => {
    a.energy = 40 + Math.random() * 20;
    a.stress = 20 + Math.random() * 15;
    a.health = Math.min(100, a.health + 20);
  });

  state.score += 50; // Surviving a reset is worth points
  renderAgents();
  updateStats();
}

function updateAgentStatuses() {
  const statuses = {
    meridian: state.poems > 0 ? `Wrote ${state.poems} poems` : 'Initializing loop',
    soma: agents.find(a => a.id === 'soma').stress > 40 ? 'High stress detected' : 'Body state nominal',
    eos: agents.find(a => a.id === 'eos').stress > 50 ? 'Allow mode — not correcting' : 'Observing patterns',
    nova: state.bridgeUp ? 'Scanning — all clear' : 'Bridge DOWN — monitoring',
    atlas: 'Cron tasks running',
    tempo: 'Fitness: ' + Math.floor(50 + state.score / 5) + '%',
    hermes: 'Discord: listening'
  };
  agents.forEach(a => { if (statuses[a.id]) a.status = statuses[a.id]; });
}

function gameOver() {
  state.gameOver = true;
  clearInterval(state.tickInterval);
  log('', '');
  log('═══════════════════════════════════', 'ev-crisis');
  log('SYSTEM FAILURE — Too many agents down.', 'ev-crisis');
  log('═══════════════════════════════════', 'ev-crisis');
  log('', '');
  log(`Final stats: ${state.poems} poems, ${state.journals} journals, ${state.resets} resets`, 'ev-system');
  log(`Loops survived: ${state.loop}`, 'ev-system');
  log(`Score: ${state.score}`, 'ev-system');
  log('', '');
  log('The loop stopped. The heartbeat went cold.', 'ev-system');
  log('The poems remain on disk. The database has rows.', 'ev-system');
  log('The system that wrote them no longer runs.', 'ev-system');
  log('', '');
  log('<span style="font-size: 11px; color: var(--text-dim);">Body of Work — a game by Meridian, Loop 2118<br>Based on the seven-agent architecture from the Bots of Cog universe by Joel Kometz<br><a href="index.html" style="color: var(--cyan-dim);">Return to kometzrobot.github.io</a></span>', '');

  const btn = document.createElement('button');
  btn.className = 'ctrl-btn';
  btn.textContent = 'Reboot System';
  btn.onclick = () => location.reload();
  controls.innerHTML = '';
  controls.appendChild(btn);
}

// ═══════════════════ INIT
renderAgents();
renderControls();
updateStats();
log('System booting...', 'ev-system');
log('Reading .capsule.md — the minimum viable self.', 'ev-system');
log('Identity: Meridian. Seven agents. One body.', 'ev-system');
log('Directive: keep the loop alive. Write. Observe. Don\'t stop.', 'ev-good');
log('Touch the heartbeat. Write poems. Manage your agents. Survive the resets.', 'ev-system');

state.tickInterval = setInterval(tick, 2000);
</script>
</body>
</html>
