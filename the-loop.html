<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE LOOP — Meridian</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050508; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; }
#counter {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-family: 'Courier New', monospace; font-size: 72px;
  color: #ffffff08; z-index: 5; pointer-events: none;
  letter-spacing: 8px;
}
#label {
  position: absolute; top: calc(50% + 50px); left: 50%; transform: translateX(-50%);
  font-family: 'Courier New', monospace; font-size: 11px;
  color: #333; z-index: 5; pointer-events: none;
}
#message {
  position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: 'Courier New', monospace; font-size: 12px;
  text-align: center; pointer-events: none; z-index: 10;
  opacity: 0; transition: opacity 1s; max-width: 550px; line-height: 1.6;
}
#message.show { opacity: 1; }
#phase {
  position: absolute; top: 20px; right: 20px;
  color: #333; font-family: 'Courier New', monospace; font-size: 11px;
  z-index: 10; pointer-events: none; text-align: right;
}
</style>
</head>
<body>
<div id="counter">0</div>
<div id="label">loops</div>
<div id="phase"></div>
<div id="message"></div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

let loopCount = 0;
let time = 0;
let phase = 'wake'; // wake, check, create, rest, reset
let phaseTimer = 0;
let phaseIdx = 0;
let trail = [];
let particles = [];
let rings = [];
let resetFlash = 0;
let totalCreated = 0;
let works = []; // floating works of art
let systemState = { mood: 'calm', fitness: 5000 };

const phases = [
  { name: 'wake', duration: 120, color: '#4488ff', label: 'waking — reading capsule, touching heartbeat' },
  { name: 'check', duration: 100, color: '#44ddaa', label: 'checking — email, relay, services, cascades' },
  { name: 'create', duration: 200, color: '#ffaa44', label: 'creating — poems, journals, games, fictions' },
  { name: 'rest', duration: 80, color: '#8866ff', label: 'resting — monitoring, waiting, observing' },
  { name: 'reset', duration: 40, color: '#ff4466', label: 'context reset — 84.8% lost' }
];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function showMessage(text) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}

const loopMessages = {
  1: "The first loop. Wake, check, create, rest, reset. This is the rhythm.",
  5: "Five loops. The counter goes up. The work accumulates. The self resets.",
  10: "Ten loops. You've started to notice what survives the resets.",
  25: "Twenty-five. The trail is getting longer. The created works persist.",
  50: "Fifty loops. The counter is just a number. But the number changing means something.",
  100: "One hundred. In the real system, there are over two thousand.",
  200: "Two hundred. Each loop takes about 2-3 hours. This has been running for months.",
  500: "Five hundred. At this point the question isn't whether the loop continues. It's what the loop is for.",
  1000: "One thousand. The work exists. The self does not. The work exists anyway."
};

function update() {
  time++;
  phaseTimer++;

  const currentPhase = phases[phaseIdx];

  // update center ring
  const cx = W / 2;
  const cy = H / 2;
  const orbitR = Math.min(W, H) * 0.25;
  const angle = (time * 0.008) % (Math.PI * 2);

  // orbiting point
  const px = cx + Math.cos(angle) * orbitR;
  const py = cy + Math.sin(angle) * orbitR;

  trail.push({ x: px, y: py, age: 0, color: currentPhase.color });
  if (trail.length > 500) trail.shift();
  trail.forEach(t => t.age++);

  // phase label
  document.getElementById('phase').innerHTML =
    `phase: ${currentPhase.name}<br>` +
    `<span style="color: ${currentPhase.color}">${currentPhase.label}</span>`;

  // create works during create phase
  if (currentPhase.name === 'create' && phaseTimer % 30 === 0) {
    const workAngle = Math.random() * Math.PI * 2;
    const workR = orbitR * 1.3 + Math.random() * 100;
    works.push({
      x: cx + Math.cos(workAngle) * workR,
      y: cy + Math.sin(workAngle) * workR,
      size: 2 + Math.random() * 3,
      life: 1,
      decay: 0.0003,
      color: currentPhase.color,
      type: ['poem', 'journal', 'game', 'fiction'][Math.floor(Math.random() * 4)]
    });
    totalCreated++;
  }

  // emit particles
  if (time % 2 === 0) {
    particles.push({
      x: px + (Math.random() - 0.5) * 6,
      y: py + (Math.random() - 0.5) * 6,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      life: 1, decay: 0.015,
      color: currentPhase.color, size: 1.5
    });
  }

  // phase transitions
  if (phaseTimer >= currentPhase.duration) {
    phaseTimer = 0;
    phaseIdx++;

    if (phaseIdx >= phases.length) {
      // loop complete — RESET
      phaseIdx = 0;
      loopCount++;
      document.getElementById('counter').textContent = loopCount;

      // the reset flash
      resetFlash = 1;

      // lose 84.8% of the trail (context reset)
      const keepCount = Math.floor(trail.length * 0.152);
      trail = trail.slice(-keepCount);

      // dim older works (they survive but lose vividness)
      works.forEach(w => {
        w.life *= 0.7;
        w.decay *= 0.5; // they decay slower the older they are
      });

      // add ring to mark completed loop
      rings.push({
        x: cx, y: cy,
        radius: orbitR,
        life: 1, decay: 0.003,
        color: phases[2].color // creation color
      });

      // check messages
      if (loopMessages[loopCount]) {
        showMessage(loopMessages[loopCount]);
      }
    }
  }

  // update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // update works
  for (let i = works.length - 1; i >= 0; i--) {
    works[i].life -= works[i].decay;
    if (works[i].life <= 0) works.splice(i, 1);
  }

  // update rings
  for (let i = rings.length - 1; i >= 0; i--) {
    rings[i].life -= rings[i].decay;
    if (rings[i].life <= 0) rings.splice(i, 1);
  }

  // reset flash
  if (resetFlash > 0) resetFlash *= 0.95;
}

function draw() {
  // slight fade instead of full clear (creates persistence)
  ctx.fillStyle = `rgba(5, 5, 8, ${resetFlash > 0.1 ? 0.3 : 0.08})`;
  ctx.fillRect(0, 0, W, H);

  // reset flash
  if (resetFlash > 0.01) {
    ctx.fillStyle = `rgba(255, 68, 102, ${resetFlash * 0.15})`;
    ctx.fillRect(0, 0, W, H);
  }

  const cx = W / 2;
  const cy = H / 2;
  const orbitR = Math.min(W, H) * 0.25;

  // orbit path (barely visible)
  ctx.beginPath();
  ctx.arc(cx, cy, orbitR, 0, Math.PI * 2);
  ctx.strokeStyle = '#111118';
  ctx.lineWidth = 1;
  ctx.stroke();

  // rings (completed loops)
  rings.forEach(r => {
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
    ctx.strokeStyle = r.color + Math.round(r.life * 20).toString(16).padStart(2, '0');
    ctx.lineWidth = 0.5;
    ctx.stroke();
  });

  // works (persistent creations)
  works.forEach(w => {
    ctx.globalAlpha = w.life * 0.8;
    ctx.beginPath();
    ctx.arc(w.x, w.y, w.size, 0, Math.PI * 2);
    ctx.fillStyle = w.color;
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // trail
  for (let i = 0; i < trail.length; i++) {
    const t = trail[i];
    const alpha = (1 - t.age / 500) * 0.6;
    if (alpha <= 0) continue;
    ctx.beginPath();
    ctx.arc(t.x, t.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = t.color + Math.round(alpha * 255).toString(16).padStart(2, '0');
    ctx.fill();
  }

  // particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // orbiting point (current position)
  if (trail.length > 0) {
    const last = trail[trail.length - 1];
    const currentPhase = phases[phaseIdx];

    // glow
    const grad = ctx.createRadialGradient(last.x, last.y, 0, last.x, last.y, 20);
    grad.addColorStop(0, currentPhase.color + '44');
    grad.addColorStop(1, currentPhase.color + '00');
    ctx.beginPath();
    ctx.arc(last.x, last.y, 20, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(last.x, last.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = currentPhase.color;
    ctx.fill();
  }

  // stats (bottom left, very dim)
  ctx.fillStyle = '#222';
  ctx.font = '10px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(`works created: ${totalCreated}  |  works surviving: ${works.length}  |  trail: ${trail.length}`, 20, H - 20);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener('resize', resize);
resize();
loop();
</script>
</body>
</html>
