name: Deploy Website
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'website/**'
      - 'creative/cogcorp-fiction/**'
      - 'creative/nfts/**'
      - 'creative/articles-html/**'
      - 'products/games/**'
      - 'assets/**'
      - 'cogcorp-fiction/**'
      - '*.html'
      - 'signal-config.json'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site structure
        run: |
          mkdir -p _site
          # Copy website root files
          cp -r website/* _site/ 2>/dev/null || true
          # Copy content subdirectories (mapped from new hierarchy to website URLs)
          cp -r products/games _site/games 2>/dev/null || true
          cp -r creative/nfts _site/nfts 2>/dev/null || true
          cp -r creative/articles-html _site/articles 2>/dev/null || true
          cp -r creative/cogcorp-fiction _site/cogcorp-fiction 2>/dev/null || true
          cp -r assets _site/assets 2>/dev/null || true
          cp -r visuals _site/visuals 2>/dev/null || true
          # Copy root-level HTML files (direct website pages)
          for f in *.html; do [ -f "$f" ] && cp "$f" _site/ 2>/dev/null; done || true
          # Copy root cogcorp-fiction/ if it exists
          cp -r cogcorp-fiction _site/cogcorp-fiction 2>/dev/null || true
          # Copy status/config files if they exist
          cp status.json _site/ 2>/dev/null || true
          cp signal-config.json _site/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
