<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="ng" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="15%" stop-color="#eeddff"/>
      <stop offset="40%" stop-color="#cc88ff"/>
      <stop offset="70%" stop-color="#ff6644"/>
      <stop offset="100%" stop-color="#440022"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Explosion shockwave -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#cc66ff" stroke-width="1.5" opacity="0.3"/>
  <circle cx="32" cy="32" r="26" fill="none" stroke="#ff8866" stroke-width="1" opacity="0.4"/>
  <!-- Explosion arms -->
  <path d="M32,32 L28,2 L32,14 L36,2 Z" fill="#cc88ff" opacity="0.5" filter="url(#glow)"/>
  <path d="M32,32 L62,28 L50,32 L62,36 Z" fill="#cc88ff" opacity="0.5" filter="url(#glow)"/>
  <path d="M32,32 L28,62 L32,50 L36,62 Z" fill="#cc88ff" opacity="0.5" filter="url(#glow)"/>
  <path d="M32,32 L2,28 L14,32 L2,36 Z" fill="#cc88ff" opacity="0.5" filter="url(#glow)"/>
  <!-- Diagonal arms -->
  <path d="M32,32 L48,4 L42,18 L56,8 Z" fill="#ff8866" opacity="0.3"/>
  <path d="M32,32 L60,48 L46,42 L56,56 Z" fill="#ff8866" opacity="0.3"/>
  <path d="M32,32 L16,60 L22,46 L8,56 Z" fill="#ff8866" opacity="0.3"/>
  <path d="M32,32 L4,16 L18,22 L8,8 Z" fill="#ff8866" opacity="0.3"/>
  <!-- Core -->
  <circle cx="32" cy="32" r="10" fill="url(#ng)" filter="url(#glow)"/>
  <!-- White-hot center -->
  <circle cx="32" cy="32" r="4" fill="#ffffff"/>
  <!-- Debris particles -->
  <circle cx="14" cy="8" r="1.5" fill="#ff6644" opacity="0.7"/>
  <circle cx="52" cy="10" r="1" fill="#cc88ff" opacity="0.6"/>
  <circle cx="8" cy="48" r="1.2" fill="#ff8866" opacity="0.5"/>
  <circle cx="56" cy="52" r="1" fill="#cc66ff" opacity="0.5"/>
</svg>