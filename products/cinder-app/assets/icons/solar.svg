<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="sg" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#fff8cc"/>
      <stop offset="50%" stop-color="#ffcc00"/>
      <stop offset="80%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#cc4400"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Corona -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#ff8800" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="#ffaa33" stroke-width="1.5" opacity="0.4"/>
  <!-- Solar flares -->
  <path d="M10,32 Q4,28 6,22 Q10,26 10,32" fill="#ff6600" opacity="0.5"/>
  <path d="M54,32 Q60,28 58,22 Q54,26 54,32" fill="#ff6600" opacity="0.5"/>
  <path d="M32,10 Q28,4 22,6 Q26,10 32,10" fill="#ff8800" opacity="0.4"/>
  <path d="M18,16 Q10,10 8,16 Q14,14 18,16" fill="#ff7700" opacity="0.4"/>
  <path d="M46,48 Q52,54 56,50 Q50,48 46,48" fill="#ff5500" opacity="0.4"/>
  <!-- Sun body -->
  <circle cx="32" cy="32" r="16" fill="url(#sg)" filter="url(#glow)"/>
  <!-- Surface texture -->
  <circle cx="26" cy="28" r="3" fill="#ffdd44" opacity="0.4"/>
  <circle cx="38" cy="36" r="2.5" fill="#ffdd44" opacity="0.3"/>
  <circle cx="34" cy="26" r="2" fill="#ffee66" opacity="0.3"/>
  <!-- Bright core -->
  <circle cx="32" cy="32" r="7" fill="#ffffff" opacity="0.7"/>
</svg>