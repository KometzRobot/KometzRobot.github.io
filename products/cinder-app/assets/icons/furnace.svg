<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="fg" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#8b0000"/>
      <stop offset="40%" stop-color="#cc3300"/>
      <stop offset="70%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#ffcc00"/>
    </linearGradient>
    <radialGradient id="hg" cx="50%" cy="65%" r="30%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#ffee88"/>
      <stop offset="100%" stop-color="#ff8800"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Furnace structure -->
  <rect x="14" y="30" width="36" height="28" rx="4" fill="#3a3a3a" stroke="#555" stroke-width="1.5"/>
  <rect x="16" y="32" width="32" height="18" rx="2" fill="#1a1a1a"/>
  <!-- Opening arch -->
  <path d="M20,50 Q20,34 32,32 Q44,34 44,50" fill="#2a1a0a"/>
  <!-- Fire inside furnace -->
  <path d="M24,50 Q22,42 26,36 Q28,42 32,34 Q36,42 38,36 Q42,44 40,50 Z" fill="url(#fg)" filter="url(#glow)"/>
  <!-- White-hot core -->
  <ellipse cx="32" cy="46" rx="6" ry="4" fill="url(#hg)" opacity="0.9"/>
  <!-- Heat waves -->
  <path d="M22,26 Q26,22 30,26" fill="none" stroke="#ff6600" stroke-width="1" opacity="0.5"/>
  <path d="M30,22 Q34,18 38,22" fill="none" stroke="#ff8800" stroke-width="1" opacity="0.4"/>
  <path d="M26,18 Q30,14 34,18" fill="none" stroke="#ffaa00" stroke-width="1" opacity="0.3"/>
  <!-- Rivets -->
  <circle cx="18" cy="34" r="1.5" fill="#666"/>
  <circle cx="46" cy="34" r="1.5" fill="#666"/>
  <circle cx="18" cy="54" r="1.5" fill="#666"/>
  <circle cx="46" cy="54" r="1.5" fill="#666"/>
</svg>