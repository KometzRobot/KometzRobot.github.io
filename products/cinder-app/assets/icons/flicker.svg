<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="fg" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff4500"/>
      <stop offset="40%" stop-color="#ff6b35"/>
      <stop offset="80%" stop-color="#ffcc44"/>
      <stop offset="100%" stop-color="#fff8dc"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Main flickering flame -->
  <path d="M32,48 Q22,38 24,26 Q26,32 28,18 Q30,28 32,10 Q34,28 36,16 Q38,26 40,24 Q42,38 32,48 Z" fill="url(#fg)" filter="url(#glow)"/>
  <!-- Inner bright core -->
  <path d="M32,48 Q26,40 28,30 Q30,36 32,22 Q34,36 36,28 Q38,40 32,48 Z" fill="#ffdd77" opacity="0.7"/>
  <!-- Bright center -->
  <ellipse cx="32" cy="42" rx="4" ry="3" fill="#fff4cc" opacity="0.8"/>
  <!-- Floating sparks -->
  <circle cx="20" cy="14" r="1.2" fill="#ff9944" opacity="0.6"/>
  <circle cx="42" cy="10" r="1" fill="#ffaa55" opacity="0.5"/>
</svg>