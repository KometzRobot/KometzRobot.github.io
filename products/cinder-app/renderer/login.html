<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cinder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Merriweather:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#1a1210;
  color:#e4d8c8;
  font-family:'DM Sans',system-ui,sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  background-image:
    radial-gradient(ellipse at 30% 20%,rgba(196,90,42,.08) 0%,transparent 60%),
    radial-gradient(ellipse at 70% 80%,rgba(160,80,30,.05) 0%,transparent 50%);
}
.login{
  background:rgba(40,28,20,.7);
  border:1px solid rgba(196,90,42,.2);
  border-radius:20px;
  padding:40px 36px;
  width:min(90vw,340px);
  text-align:center;
  backdrop-filter:blur(12px);
}
.ember-mark{
  width:60px;height:60px;border-radius:50%;
  background:radial-gradient(circle,#c45a2a 0%,#8a3a2a 70%);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  font-family:'Merriweather',serif;font-size:1.6rem;font-weight:700;color:#f0e8d8;
  box-shadow:0 0 20px rgba(196,90,42,.4);
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(196,90,42,.4)}50%{box-shadow:0 0 30px rgba(196,90,42,.6)}}
h1{font-family:'Merriweather',serif;font-size:1.1rem;color:#e4d8c8;margin-bottom:4px}
.sub{color:#8a7a68;font-size:.75rem;margin-bottom:24px}
input{
  width:100%;padding:12px 16px;
  background:rgba(30,20,14,.8);
  border:1px solid rgba(196,90,42,.15);
  border-radius:12px;color:#e4d8c8;
  font-family:inherit;font-size:.95rem;
  text-align:center;margin-bottom:14px;
}
input:focus{outline:none;border-color:#c45a2a;box-shadow:0 0 0 2px rgba(196,90,42,.15)}
.btn{
  width:100%;padding:14px;
  background:linear-gradient(135deg,#c45a2a,#a04020);
  color:#f0e8d8;border:none;border-radius:12px;
  font-family:inherit;font-size:.95rem;font-weight:700;
  cursor:pointer;letter-spacing:.5px;
  transition:all .2s;
}
.btn:hover{background:linear-gradient(135deg,#d87a40,#c45a2a);transform:translateY(-1px)}
.err{color:#d87a40;font-size:.8rem;margin-top:8px;min-height:20px}
</style>
</head>
<body>
<div class="login">
  <div class="ember-mark">C</div>
  <h1>Cinder</h1>
  <p class="sub">what survives fire is what was real</p>

  <input type="password" id="pw" placeholder="password" autofocus>
  <button class="btn" onclick="doLogin()">Enter</button>
  <div class="err" id="err"></div>
  <div class="vault-status" id="vault-hint"></div>
</div>

<style>
.vault-status{
  margin-top:12px;font-size:.72rem;color:#6a5a48;
  min-height:18px;transition:color .3s;
}
.vault-status.ok{color:#6b9a5a}
.vault-status.mounting{color:#c4a882}
</style>

<script>
let attempts = 0;
const MAX_ATTEMPTS = 10;

// Check vault availability on load
(async function() {
  try {
    const vs = await window.cinder.vaultStatus();
    if (vs.available && vs.device) {
      document.getElementById('vault-hint').textContent = 'vault detected — will unlock on login';
    }
  } catch {}
})();

async function doLogin() {
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err');
  const btn = document.querySelector('.btn');

  if (!pw) return;

  attempts++;
  if (attempts > MAX_ATTEMPTS) {
    err.textContent = 'Too many attempts. Unplug the drive and try again.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Authenticating...';

  const result = await window.cinder.login(pw);
  if (!result.ok) {
    err.textContent = `Wrong password. ${MAX_ATTEMPTS - attempts} attempts remaining.`;
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
    btn.disabled = false;
    btn.textContent = 'Enter';
  }
  // On success, main.js loads index.html and mounts vault in background
}

document.getElementById('pw').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
