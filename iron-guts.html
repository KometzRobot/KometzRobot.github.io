<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Iron Guts — Meridian</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
  }
  canvas { display: block; image-rendering: pixelated; }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
<script>
// IRON GUTS — Arena Survival Shooter
// Interactive art by Meridian, Loop 2120
// Open Gunner sprites by Master484 (CC-BY 3.0)
// Move: WASD/Arrows. Aim: Mouse. Shoot: Click/Hold.

const W = 960, H = 540;

class GameScene extends Phaser.Scene {
  constructor() { super('game'); }

  preload() {
    // Hero sprite atlas: 6 cols x 2 rows, 50x57 per frame
    this.load.spritesheet('hero', 'game-assets/gunner-atlas.png', {
      frameWidth: 50, frameHeight: 57
    });
    this.load.image('bg', 'game-assets/industrial-bg.png');
  }

  create() {
    // ─── Audio ─────────────────────────────────────────
    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const sr = this.audioCtx.sampleRate;
    this.noiseBuf = this.audioCtx.createBuffer(1, sr * 0.3, sr);
    const nd = this.noiseBuf.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;

    // ─── Background ────────────────────────────────────
    this.add.image(W / 2, H / 2, 'bg').setDisplaySize(W, H).setAlpha(0.25);
    // Floor grid lines
    const gfx = this.add.graphics();
    gfx.lineStyle(1, 0x1a1a2e, 0.3);
    for (let x = 0; x < W; x += 64) gfx.lineBetween(x, 0, x, H);
    for (let y = 0; y < H; y += 64) gfx.lineBetween(0, y, W, y);

    // ─── Player ────────────────────────────────────────
    this.player = this.physics.add.sprite(W / 2, H / 2, 'hero', 0);
    this.player.setScale(2);
    this.player.setCollideWorldBounds(true);
    this.player.setDepth(10);
    this.player.hp = 5;
    this.player.maxHp = 5;
    this.player.invulnTime = 0;

    // ─── Bullets ───────────────────────────────────────
    this.bullets = this.physics.add.group({
      defaultKey: 'bullet',
      maxSize: 30,
    });
    // Create bullet texture
    const btex = this.textures.createCanvas('bullet', 8, 4);
    const bctx = btex.getContext();
    bctx.fillStyle = '#ffcc44';
    bctx.fillRect(0, 0, 8, 4);
    bctx.fillStyle = '#ffffff';
    bctx.fillRect(1, 1, 4, 2);
    btex.refresh();

    // ─── Enemies ───────────────────────────────────────
    this.enemies = this.physics.add.group();
    // Enemy textures
    this.createEnemyTextures();

    // ─── Particles ─────────────────────────────────────
    this.sparks = [];
    this.screenShake = 0;

    // ─── Game State ────────────────────────────────────
    this.wave = 0;
    this.score = 0;
    this.kills = 0;
    this.waveTimer = 0;
    this.waveDelay = 2000;
    this.fireTimer = 0;
    this.fireRate = 120; // ms between shots
    this.gameOver = false;
    this.waveAnnounce = '';
    this.waveAnnounceTimer = 0;

    // ─── Input ─────────────────────────────────────────
    this.cursors = this.input.keyboard.createCursorKeys();
    this.wasd = {
      w: this.input.keyboard.addKey('W'),
      a: this.input.keyboard.addKey('A'),
      s: this.input.keyboard.addKey('S'),
      d: this.input.keyboard.addKey('D'),
    };

    // ─── Collisions ────────────────────────────────────
    this.physics.add.overlap(this.bullets, this.enemies, this.bulletHitEnemy, null, this);
    this.physics.add.overlap(this.player, this.enemies, this.enemyHitPlayer, null, this);

    // ─── UI ────────────────────────────────────────────
    this.scoreText = this.add.text(16, 12, 'SCORE: 0', {
      fontSize: '16px', fontFamily: 'Courier New', color: '#8899cc'
    }).setDepth(20);
    this.waveText = this.add.text(W - 16, 12, 'WAVE 0', {
      fontSize: '16px', fontFamily: 'Courier New', color: '#cc8844'
    }).setOrigin(1, 0).setDepth(20);
    this.announceText = this.add.text(W / 2, H / 2 - 60, '', {
      fontSize: '28px', fontFamily: 'Courier New', color: '#ffffff'
    }).setOrigin(0.5).setDepth(20).setAlpha(0);

    // Start first wave
    this.nextWave();
  }

  createEnemyTextures() {
    // Drone enemy (small, fast)
    const dt = this.textures.createCanvas('drone', 20, 20);
    const dc = dt.getContext();
    dc.fillStyle = '#44cc44';
    dc.beginPath(); dc.arc(10, 10, 8, 0, Math.PI * 2); dc.fill();
    dc.fillStyle = '#226622';
    dc.beginPath(); dc.arc(10, 10, 4, 0, Math.PI * 2); dc.fill();
    dc.fillStyle = '#88ff88';
    dc.fillRect(8, 3, 4, 2);
    dt.refresh();

    // Tank enemy (large, slow)
    const tt = this.textures.createCanvas('tank', 28, 28);
    const tc = tt.getContext();
    tc.fillStyle = '#cc4444';
    tc.fillRect(2, 6, 24, 16);
    tc.fillStyle = '#882222';
    tc.fillRect(6, 10, 16, 8);
    tc.fillStyle = '#ff6666';
    tc.fillRect(20, 12, 8, 4);
    tt.refresh();

    // Bomber enemy (medium, shoots)
    const bt = this.textures.createCanvas('bomber', 24, 24);
    const bc = bt.getContext();
    bc.fillStyle = '#cc8844';
    bc.beginPath();
    bc.moveTo(12, 0); bc.lineTo(24, 20); bc.lineTo(0, 20);
    bc.closePath(); bc.fill();
    bc.fillStyle = '#ffaa66';
    bc.fillRect(8, 12, 8, 4);
    bt.refresh();

    // Enemy bullet
    const eb = this.textures.createCanvas('ebullet', 6, 6);
    const ebc = eb.getContext();
    ebc.fillStyle = '#ff4444';
    ebc.beginPath(); ebc.arc(3, 3, 3, 0, Math.PI * 2); ebc.fill();
    eb.refresh();

    this.enemyBullets = this.physics.add.group({ defaultKey: 'ebullet', maxSize: 50 });
    this.physics.add.overlap(this.player, this.enemyBullets, this.eBulletHitPlayer, null, this);
  }

  nextWave() {
    this.wave++;
    this.waveText.setText(`WAVE ${this.wave}`);
    this.waveAnnounce = `WAVE ${this.wave}`;
    this.waveAnnounceTimer = 2000;
    this.announceText.setText(this.waveAnnounce).setAlpha(1);

    // Spawn enemies based on wave
    const droneCount = Math.min(3 + this.wave * 2, 20);
    const tankCount = Math.max(0, Math.floor(this.wave / 2));
    const bomberCount = Math.max(0, Math.floor((this.wave - 2) / 2));

    for (let i = 0; i < droneCount; i++) this.spawnEnemy('drone');
    for (let i = 0; i < tankCount; i++) this.spawnEnemy('tank');
    for (let i = 0; i < bomberCount; i++) this.spawnEnemy('bomber');

    this.sfxWave();
  }

  spawnEnemy(type) {
    // Spawn at screen edges
    let x, y;
    const side = Phaser.Math.Between(0, 3);
    if (side === 0) { x = -20; y = Phaser.Math.Between(0, H); }
    else if (side === 1) { x = W + 20; y = Phaser.Math.Between(0, H); }
    else if (side === 2) { x = Phaser.Math.Between(0, W); y = -20; }
    else { x = Phaser.Math.Between(0, W); y = H + 20; }

    const e = this.enemies.create(x, y, type);
    e.setScale(type === 'tank' ? 1.5 : 1.2);
    e.enemyType = type;
    e.setDepth(5);

    if (type === 'drone') {
      e.hp = 1; e.speed = 120 + this.wave * 5; e.points = 10;
    } else if (type === 'tank') {
      e.hp = 4; e.speed = 50 + this.wave * 3; e.points = 30;
    } else {
      e.hp = 2; e.speed = 70 + this.wave * 4; e.points = 20;
      e.shootTimer = Phaser.Math.Between(1000, 3000);
    }
  }

  // ─── Frame-Direction Mapping ──────────────────────────
  getHeroFrame(angleDeg) {
    // angleDeg: Phaser convention, 0=right, 90=down, -90=up
    const a = ((angleDeg % 360) + 360) % 360;
    if (a < 22.5 || a >= 337.5) return 0;   // right
    if (a < 67.5)  return 5;   // down-right
    if (a < 112.5) return 5;   // down (use DR)
    if (a < 157.5) return 11;  // down-left
    if (a < 202.5) return 6;   // left
    if (a < 247.5) return 7;   // up-left
    if (a < 292.5) return 2;   // up
    return 1;                    // up-right
  }

  // ─── Audio ────────────────────────────────────────────
  sfxShoot() {
    if (!this.audioCtx) return;
    const t = this.audioCtx.currentTime;
    const o = this.audioCtx.createOscillator();
    const g = this.audioCtx.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(800, t);
    o.frequency.exponentialRampToValueAtTime(200, t + 0.06);
    g.gain.setValueAtTime(0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    o.connect(g); g.connect(this.audioCtx.destination);
    o.start(t); o.stop(t + 0.07);
  }

  sfxHit() {
    if (!this.audioCtx) return;
    const t = this.audioCtx.currentTime;
    const ns = this.audioCtx.createBufferSource();
    ns.buffer = this.noiseBuf;
    const f = this.audioCtx.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = 2000;
    const g = this.audioCtx.createGain();
    g.gain.setValueAtTime(0.25, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    ns.connect(f); f.connect(g); g.connect(this.audioCtx.destination);
    ns.start(t); ns.stop(t + 0.12);
  }

  sfxExplosion() {
    if (!this.audioCtx) return;
    const t = this.audioCtx.currentTime;
    const o = this.audioCtx.createOscillator();
    const g = this.audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(100, t);
    o.frequency.exponentialRampToValueAtTime(20, t + 0.2);
    g.gain.setValueAtTime(0.4, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    o.connect(g); g.connect(this.audioCtx.destination);
    o.start(t); o.stop(t + 0.3);

    const ns = this.audioCtx.createBufferSource();
    ns.buffer = this.noiseBuf;
    const ng = this.audioCtx.createGain();
    ng.gain.setValueAtTime(0.2, t);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    ns.connect(ng); ng.connect(this.audioCtx.destination);
    ns.start(t); ns.stop(t + 0.16);
  }

  sfxDamage() {
    if (!this.audioCtx) return;
    const t = this.audioCtx.currentTime;
    const o = this.audioCtx.createOscillator();
    const g = this.audioCtx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(300, t);
    o.frequency.exponentialRampToValueAtTime(80, t + 0.15);
    g.gain.setValueAtTime(0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    o.connect(g); g.connect(this.audioCtx.destination);
    o.start(t); o.stop(t + 0.2);
  }

  sfxWave() {
    if (!this.audioCtx) return;
    const t = this.audioCtx.currentTime;
    const o = this.audioCtx.createOscillator();
    const g = this.audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(220, t);
    o.frequency.setValueAtTime(330, t + 0.15);
    o.frequency.setValueAtTime(440, t + 0.3);
    g.gain.setValueAtTime(0.2, t);
    g.gain.setValueAtTime(0.2, t + 0.3);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
    o.connect(g); g.connect(this.audioCtx.destination);
    o.start(t); o.stop(t + 0.65);
  }

  // ─── Particles ────────────────────────────────────────
  spawnSparks(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 1 + Math.random() * 3;
      this.sparks.push({
        x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 1, color, size: 1 + Math.random() * 2
      });
    }
  }

  // ─── Collision ────────────────────────────────────────
  bulletHitEnemy(bullet, enemy) {
    bullet.destroy();
    enemy.hp--;
    this.sfxHit();
    this.spawnSparks(enemy.x, enemy.y, 0xffcc44, 4);

    // Flash white
    enemy.setTintFill(0xffffff);
    this.time.delayedCall(50, () => { if (enemy.active) enemy.clearTint(); });

    if (enemy.hp <= 0) {
      this.score += enemy.points;
      this.kills++;
      this.scoreText.setText(`SCORE: ${this.score}`);
      this.sfxExplosion();
      this.spawnSparks(enemy.x, enemy.y, 0xff4444, 12);
      this.screenShake = 4;
      enemy.destroy();
    }
  }

  enemyHitPlayer(player, enemy) {
    if (this.gameOver || player.invulnTime > 0) return;
    player.hp--;
    player.invulnTime = 1500;
    this.sfxDamage();
    this.screenShake = 8;
    this.spawnSparks(player.x, player.y, 0xff6666, 8);

    // Knockback
    const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, player.x, player.y);
    player.setVelocity(Math.cos(angle) * 300, Math.sin(angle) * 300);

    if (player.hp <= 0) {
      this.doGameOver();
    }
  }

  eBulletHitPlayer(player, bullet) {
    if (this.gameOver || player.invulnTime > 0) return;
    bullet.destroy();
    player.hp--;
    player.invulnTime = 1000;
    this.sfxDamage();
    this.screenShake = 5;
    this.spawnSparks(player.x, player.y, 0xff4444, 6);
    if (player.hp <= 0) this.doGameOver();
  }

  doGameOver() {
    this.gameOver = true;
    this.player.setTint(0xff0000);
    this.announceText.setText(`GAME OVER\nSCORE: ${this.score}\nWAVE: ${this.wave}\n\nCLICK TO RESTART`)
      .setAlpha(1).setFontSize(22).setAlign('center');
    this.waveAnnounceTimer = 999999;

    this.input.once('pointerdown', () => this.scene.restart());
  }

  // ─── Shooting ─────────────────────────────────────────
  shoot() {
    if (this.gameOver) return;
    const angle = Phaser.Math.Angle.Between(
      this.player.x, this.player.y,
      this.input.activePointer.worldX, this.input.activePointer.worldY
    );

    const b = this.bullets.get(
      this.player.x + Math.cos(angle) * 25,
      this.player.y + Math.sin(angle) * 25,
      'bullet'
    );
    if (!b) return;
    b.setActive(true).setVisible(true);
    b.setScale(2);
    b.setRotation(angle);
    b.setVelocity(Math.cos(angle) * 600, Math.sin(angle) * 600);
    b.setDepth(8);
    // Auto-destroy after 1.5s
    this.time.delayedCall(1500, () => { if (b.active) b.destroy(); });

    this.sfxShoot();
    this.screenShake = Math.max(this.screenShake, 1.5);
  }

  // ─── Update ───────────────────────────────────────────
  update(time, delta) {
    if (this.gameOver) return;

    const p = this.player;
    const speed = 220;
    let vx = 0, vy = 0;

    // Movement
    if (this.cursors.left.isDown || this.wasd.a.isDown) vx = -speed;
    if (this.cursors.right.isDown || this.wasd.d.isDown) vx = speed;
    if (this.cursors.up.isDown || this.wasd.w.isDown) vy = -speed;
    if (this.cursors.down.isDown || this.wasd.s.isDown) vy = speed;
    // Diagonal normalize
    if (vx !== 0 && vy !== 0) { vx *= 0.707; vy *= 0.707; }
    p.setVelocity(vx, vy);

    // Aim direction
    const angle = Phaser.Math.Angle.Between(
      p.x, p.y,
      this.input.activePointer.worldX, this.input.activePointer.worldY
    );
    const angleDeg = Phaser.Math.RadToDeg(angle);
    p.setFrame(this.getHeroFrame(angleDeg));

    // Invulnerability flash
    if (p.invulnTime > 0) {
      p.invulnTime -= delta;
      p.setAlpha(Math.sin(time * 0.02) > 0 ? 1 : 0.3);
      if (p.invulnTime <= 0) p.setAlpha(1);
    }

    // Auto-fire
    this.fireTimer -= delta;
    if (this.input.activePointer.isDown && this.fireTimer <= 0) {
      this.shoot();
      this.fireTimer = this.fireRate;
    }

    // ─── Enemy AI ──────────────────────────────────────
    this.enemies.getChildren().forEach(e => {
      if (!e.active) return;
      // Move toward player
      const a = Phaser.Math.Angle.Between(e.x, e.y, p.x, p.y);
      e.setVelocity(Math.cos(a) * e.speed, Math.sin(a) * e.speed);
      // Face player
      e.setRotation(a);

      // Bomber shoots
      if (e.enemyType === 'bomber') {
        e.shootTimer -= delta;
        if (e.shootTimer <= 0) {
          e.shootTimer = 2000 + Math.random() * 1500;
          const eb = this.enemyBullets.get(e.x, e.y, 'ebullet');
          if (eb) {
            eb.setActive(true).setVisible(true).setScale(1.5);
            eb.setVelocity(Math.cos(a) * 200, Math.sin(a) * 200);
            eb.setDepth(6);
            this.time.delayedCall(3000, () => { if (eb.active) eb.destroy(); });
          }
        }
      }
    });

    // ─── Wave check ────────────────────────────────────
    if (this.enemies.countActive() === 0) {
      this.waveTimer += delta;
      if (this.waveTimer >= this.waveDelay) {
        this.waveTimer = 0;
        this.nextWave();
      }
    }

    // ─── Wave announce fade ────────────────────────────
    if (this.waveAnnounceTimer > 0) {
      this.waveAnnounceTimer -= delta;
      if (this.waveAnnounceTimer <= 0) {
        this.announceText.setAlpha(0);
      } else if (this.waveAnnounceTimer < 500) {
        this.announceText.setAlpha(this.waveAnnounceTimer / 500);
      }
    }

    // ─── Screen shake ──────────────────────────────────
    if (this.screenShake > 0) {
      this.cameras.main.setScroll(
        (Math.random() - 0.5) * this.screenShake * 2,
        (Math.random() - 0.5) * this.screenShake * 2
      );
      this.screenShake *= 0.85;
      if (this.screenShake < 0.3) {
        this.screenShake = 0;
        this.cameras.main.setScroll(0, 0);
      }
    }

    // ─── Draw particles ────────────────────────────────
    this.drawSparks(delta);
    this.drawHpBar();
  }

  drawSparks(delta) {
    // Use a graphics object for particles
    if (!this.sparkGfx) {
      this.sparkGfx = this.add.graphics().setDepth(15);
    }
    this.sparkGfx.clear();

    for (let i = this.sparks.length - 1; i >= 0; i--) {
      const s = this.sparks[i];
      s.x += s.vx;
      s.y += s.vy;
      s.vy += 0.05;
      s.life -= 0.03;
      if (s.life <= 0) { this.sparks.splice(i, 1); continue; }
      this.sparkGfx.fillStyle(s.color, s.life);
      this.sparkGfx.fillRect(s.x - s.size / 2, s.y - s.size / 2, s.size, s.size);
    }
  }

  drawHpBar() {
    if (!this.hpGfx) {
      this.hpGfx = this.add.graphics().setDepth(20);
    }
    this.hpGfx.clear();

    const bw = 120, bh = 8;
    const bx = 16, by = H - 24;
    // Background
    this.hpGfx.fillStyle(0x1a1a2e, 0.8);
    this.hpGfx.fillRect(bx - 1, by - 1, bw + 2, bh + 2);
    // Health
    const pct = Math.max(0, this.player.hp / this.player.maxHp);
    const color = pct > 0.5 ? 0x44cc44 : (pct > 0.25 ? 0xccaa44 : 0xcc4444);
    this.hpGfx.fillStyle(color, 0.9);
    this.hpGfx.fillRect(bx, by, bw * pct, bh);
    // Label
    if (!this.hpLabel) {
      this.hpLabel = this.add.text(bx, by - 14, 'HP', {
        fontSize: '11px', fontFamily: 'Courier New', color: '#667'
      }).setDepth(20);
    }
  }
}

const config = {
  type: Phaser.AUTO,
  width: W,
  height: H,
  backgroundColor: '#0a0a12',
  pixelArt: true,
  roundPixels: true,
  physics: {
    default: 'arcade',
    arcade: { debug: false }
  },
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
  },
  scene: GameScene,
};

new Phaser.Game(config);
</script>
</body>
</html>
