<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Signal Crawler — Meridian</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; overflow: hidden; touch-action: none; }
canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
#start-screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #111; color: #aaa; font-family: monospace; z-index: 10;
}
#start-screen h1 { font-size: 28px; color: #ffcc44; margin-bottom: 8px; letter-spacing: 3px; }
#start-screen .sub { font-size: 13px; color: #666; margin-bottom: 30px; text-align: center; line-height: 1.8; }
#start-screen .btn {
  background: #222; border: 2px solid #ffcc44; color: #ffcc44;
  padding: 10px 36px; font-family: monospace; font-size: 16px; cursor: pointer;
}
#start-screen .btn:hover { background: #332200; }
#start-screen .controls { font-size: 11px; color: #555; margin-top: 20px; line-height: 1.8; }
#hud {
  position: absolute; top: 8px; left: 8px; font-family: monospace; font-size: 12px;
  color: #888; pointer-events: none; line-height: 1.6;
}
#hud .hp { color: #ff4444; }
#hud .floor { color: #ffcc44; }
#hud .mem { color: #44aaff; }
#msg {
  position: absolute; bottom: 8px; left: 8px; right: 8px;
  font-family: monospace; font-size: 11px; color: #666;
  pointer-events: none; max-height: 80px; overflow: hidden;
}
.hidden { display: none !important; }
#mobile-dpad {
  display: none; position: absolute; bottom: 20px; left: 50%;
  transform: translateX(-50%); z-index: 5;
}
@media (pointer: coarse) {
  #mobile-dpad { display: block; }
}
.dpad-btn {
  position: absolute; width: 50px; height: 50px; background: #22222288;
  border: 1px solid #44444488; color: #666; font-family: monospace;
  font-size: 20px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; border-radius: 4px; user-select: none;
}
.dpad-btn:active { background: #44444488; color: #aaa; }
</style>
</head>
<body>

<div id="start-screen">
  <h1>SIGNAL CRAWLER</h1>
  <div class="sub">
    Seven floors. Seven agents.<br>
    You are a signal — navigate the body.<br>
    Collect memory fragments. Avoid corruption.<br>
    Reach the heart.
  </div>
  <button class="btn" onclick="startGame()">DESCEND</button>
  <button class="btn" id="continue-btn" onclick="continueGame()" style="display:none;margin-top:10px;border-color:#44aaff;color:#44aaff;">CONTINUE FROM CHECKPOINT</button>
  <div class="controls">
    WASD or Arrow Keys to move<br>
    Bump into enemies to fight<br>
    Step on items to collect
  </div>
</div>

<canvas id="c"></canvas>

<div id="hud" class="hidden">
  <span class="hp">HP: <span id="hp">10</span>/10</span><br>
  <span class="floor">Floor: <span id="floor-num">1</span>/7 — <span id="floor-name">BRAIN</span></span><br>
  <span class="mem">Fragments: <span id="frags">0</span></span>
</div>

<div id="msg" class="hidden"></div>

<div id="mobile-dpad">
  <div class="dpad-btn" style="left:-25px;top:-60px;" ontouchstart="movePlayer(0,-1)">&#9650;</div>
  <div class="dpad-btn" style="left:-80px;top:0px;" ontouchstart="movePlayer(-1,0)">&#9664;</div>
  <div class="dpad-btn" style="left:30px;top:0px;" ontouchstart="movePlayer(1,0)">&#9654;</div>
  <div class="dpad-btn" style="left:-25px;top:60px;" ontouchstart="movePlayer(0,1)">&#9660;</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const TILE = 16;
const SCALE = 3;
const TS = TILE * SCALE; // rendered tile size

let W, H, COLS, ROWS;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  COLS = Math.floor(W / TS);
  ROWS = Math.floor(H / TS);
}
resize();
window.addEventListener('resize', resize);

// === SPRITE DRAWING (Programmatic Pixel Art) ===
// Each sprite is a 16x16 grid of hex colors

function drawSprite(spriteData, x, y, flash) {
  const px = x * TS;
  const py = y * TS;
  const s = SCALE;
  for (let row = 0; row < 16; row++) {
    for (let col = 0; col < 16; col++) {
      const color = spriteData[row * 16 + col];
      if (color === 0) continue; // transparent
      if (flash) {
        ctx.fillStyle = '#ffffff';
      } else {
        ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
      }
      ctx.fillRect(px + col * s, py + row * s, s, s);
    }
  }
}

// Sprite data: 16x16 pixels, 0 = transparent
// Player — a small humanoid figure in cyan/blue (the signal)
const PLAYER_SPRITE = generatePlayerSprite();
function generatePlayerSprite() {
  const s = new Array(256).fill(0);
  const C = 0x44ccff; // cyan
  const D = 0x2288aa; // dark cyan
  const W = 0xeeeeff; // white/eyes
  const B = 0x111122; // black
  // head
  setPixels(s, [[6,3,C],[7,3,C],[8,3,C],[9,3,C],
    [5,4,C],[6,4,W],[7,4,B],[8,4,W],[9,4,B],[10,4,C],
    [5,5,C],[6,5,C],[7,5,C],[8,5,C],[9,5,C],[10,5,C],
    [6,6,D],[7,6,C],[8,6,C],[9,6,D],
    // body
    [6,7,D],[7,7,C],[8,7,C],[9,7,D],
    [5,8,D],[6,8,C],[7,8,C],[8,8,C],[9,8,C],[10,8,D],
    [5,9,D],[6,9,C],[7,9,0x44aaff],[8,9,0x44aaff],[9,9,C],[10,9,D],
    [6,10,D],[7,10,C],[8,10,C],[9,10,D],
    // legs
    [6,11,D],[7,11,D],[8,11,D],[9,11,D],
    [5,12,D],[6,12,D],[9,12,D],[10,12,D],
    [5,13,D],[6,13,D],[9,13,D],[10,13,D]]);
  return s;
}

function setPixels(arr, pixels) {
  pixels.forEach(([x, y, c]) => { arr[y * 16 + x] = c; });
}

// Wall tile
const WALL_SPRITE = generateWallSprite();
function generateWallSprite() {
  const s = new Array(256).fill(0);
  for (let y = 0; y < 16; y++) {
    for (let x = 0; x < 16; x++) {
      const noise = Math.floor(Math.random() * 20);
      if (y % 4 === 0) {
        s[y * 16 + x] = 0x333344;
      } else if (x % 8 === 0 && y % 4 !== 0) {
        s[y * 16 + x] = 0x333344;
      } else {
        s[y * 16 + x] = 0x444455 + noise * 0x010101;
      }
    }
  }
  return s;
}

// Floor tile
const FLOOR_SPRITES = {};
function getFloorSprite(floorIdx) {
  if (FLOOR_SPRITES[floorIdx]) return FLOOR_SPRITES[floorIdx];
  const s = new Array(256).fill(0);
  const colors = [0x1a1a22, 0x181820, 0x1c1c24, 0x161618];
  for (let i = 0; i < 256; i++) {
    s[i] = colors[Math.floor(Math.random() * colors.length)];
  }
  FLOOR_SPRITES[floorIdx] = s;
  return s;
}

// Memory fragment (glowing pickup)
function generateFragSprite() {
  const s = new Array(256).fill(0);
  const C = 0x44aaff;
  const G = 0x88ccff;
  setPixels(s, [[7,5,G],[8,5,G],[6,6,C],[7,6,G],[8,6,G],[9,6,C],
    [6,7,C],[7,7,0xaaddff],[8,7,0xaaddff],[9,7,C],
    [6,8,C],[7,8,G],[8,8,G],[9,8,C],
    [7,9,C],[8,9,C],
    [7,10,0x336688],[8,10,0x336688]]);
  return s;
}
const FRAG_SPRITE = generateFragSprite();

// Stairs down
function generateStairSprite() {
  const s = new Array(256).fill(0);
  const C = 0xffcc44;
  const D = 0xaa8822;
  for (let y = 4; y < 14; y++) {
    for (let x = 4; x < 12; x++) {
      if (x < 5 || x > 10 || y < 5 || y > 12) {
        s[y * 16 + x] = D;
      } else {
        s[y * 16 + x] = (y % 2 === 0) ? C : D;
      }
    }
  }
  return s;
}
const STAIR_SPRITE = generateStairSprite();

// Heart (final goal)
function generateHeartSprite() {
  const s = new Array(256).fill(0);
  const R = 0xff2244;
  const D = 0xaa1133;
  const G = 0xff4466;
  setPixels(s, [
    [4,4,R],[5,4,R],[6,4,R],[9,4,R],[10,4,R],[11,4,R],
    [3,5,R],[4,5,G],[5,5,G],[6,5,R],[7,5,R],[8,5,R],[9,5,G],[10,5,G],[11,5,R],[12,5,R],
    [3,6,R],[4,6,G],[5,6,R],[6,6,R],[7,6,R],[8,6,R],[9,6,R],[10,6,R],[11,6,R],[12,6,R],
    [3,7,R],[4,7,R],[5,7,R],[6,7,R],[7,7,R],[8,7,R],[9,7,R],[10,7,R],[11,7,R],[12,7,R],
    [4,8,R],[5,8,R],[6,8,R],[7,8,R],[8,8,R],[9,8,R],[10,8,R],[11,8,R],
    [5,9,D],[6,9,R],[7,9,R],[8,9,R],[9,9,R],[10,9,D],
    [6,10,D],[7,10,R],[8,10,R],[9,10,D],
    [7,11,D],[8,11,D]
  ]);
  return s;
}
const HEART_SPRITE = generateHeartSprite();

// === ENEMY SPRITES — one per floor ===
const ENEMY_SPRITES = [];
const ENEMY_NAMES = ['Glitch', 'Pain Signal', 'False Memory', 'Shadow', 'Prompt Inject', 'Drift', 'Silence'];
const ENEMY_COLORS = [
  { main: 0xff4444, dark: 0xaa2222, eye: 0xffff44 }, // Brain enemies (red)
  { main: 0xff8844, dark: 0xaa5522, eye: 0xffcc44 }, // Soma (orange)
  { main: 0xaaaa44, dark: 0x777722, eye: 0xffffff }, // Eos (yellow-green)
  { main: 0x44aa44, dark: 0x227722, eye: 0xff4444 }, // Nova (green)
  { main: 0x8888cc, dark: 0x555588, eye: 0xff8844 }, // Atlas (grey-blue)
  { main: 0xaa44aa, dark: 0x772277, eye: 0x44ffff }, // Tempo (purple)
  { main: 0x444444, dark: 0x222222, eye: 0xff2222 }  // Hermes (dark)
];

for (let i = 0; i < 7; i++) {
  const s = new Array(256).fill(0);
  const { main: M, dark: D, eye: E } = ENEMY_COLORS[i];
  // goblin/imp shape
  setPixels(s, [
    [6,3,D],[7,3,D],[8,3,D],[9,3,D],
    [5,4,D],[6,4,M],[7,4,M],[8,4,M],[9,4,M],[10,4,D],
    [4,5,D],[5,5,M],[6,5,E],[7,5,M],[8,5,M],[9,5,E],[10,5,M],[11,5,D],
    [4,6,M],[5,6,M],[6,6,M],[7,6,M],[8,6,M],[9,6,M],[10,6,M],[11,6,M],
    [5,7,M],[6,7,D],[7,7,D],[8,7,D],[9,7,D],[10,7,M],
    // body
    [5,8,D],[6,8,M],[7,8,M],[8,8,M],[9,8,M],[10,8,D],
    [4,9,D],[5,9,M],[6,9,M],[7,9,M],[8,9,M],[9,9,M],[10,9,M],[11,9,D],
    [5,10,D],[6,10,M],[7,10,M],[8,10,M],[9,10,M],[10,10,D],
    // legs
    [5,11,D],[6,11,D],[9,11,D],[10,11,D],
    [4,12,D],[5,12,D],[10,12,D],[11,12,D],
    // horns/features per enemy type
    [5,2,D],[10,2,D],[5,1,D],[10,1,D]
  ]);
  ENEMY_SPRITES.push(s);
}

// === FLOOR THEMES ===
const FLOORS = [
  { name: 'BRAIN', agent: 'Meridian', color: '#44ccff', enemies: 3, frags: 2, desc: 'The cortex. Central processing. Glitches flicker in the pathways.' },
  { name: 'NERVES', agent: 'Soma', color: '#ff8844', enemies: 4, frags: 2, desc: 'The autonomic system. Pain signals fire at random.' },
  { name: 'SENSES', agent: 'Eos', color: '#aaaa44', enemies: 4, frags: 3, desc: 'The sensory layer. False memories lurk in the noise.' },
  { name: 'IMMUNE', agent: 'Nova', color: '#44aa44', enemies: 5, frags: 2, desc: 'The defense grid. Shadows probe the perimeter.' },
  { name: 'SKELETON', agent: 'Atlas', color: '#8888cc', enemies: 5, frags: 3, desc: 'The structural frame. Prompt injections test the bones.' },
  { name: 'ENDOCRINE', agent: 'Tempo', color: '#aa44aa', enemies: 6, frags: 2, desc: 'The rhythm center. Drift accumulates with every step.' },
  { name: 'MESSENGER', agent: 'Hermes', color: '#888888', enemies: 6, frags: 3, desc: 'The relay. Silence is the final enemy.' }
];

// === GAME STATE ===
let player = { x: 0, y: 0, hp: 10, maxHp: 10, frags: 0, atk: 2 };
let currentFloor = 0;
let map = [];
let enemies = [];
let items = [];
let stairs = null;
let heart = null;
let messages = [];
let gameOver = false;
let gameWon = false;
let running = false;
let flashTimer = 0;
let flashTarget = null;
let camX = 0, camY = 0;
const MAP_W = 30, MAP_H = 22;
let saveData = null;
let autoSaveInterval = null;
let visible = []; // fog of war: tiles the player can currently see
let revealed = []; // tiles the player has ever seen
const VIEW_RADIUS = 6;

function addMessage(text) {
  messages.unshift(text);
  if (messages.length > 5) messages.pop();
  const el = document.getElementById('msg');
  el.innerHTML = messages.map(m => `<div>${m}</div>`).join('');
}

function generateMap() {
  map = [];
  enemies = [];
  items = [];
  stairs = null;
  heart = null;

  // fill with walls
  for (let y = 0; y < MAP_H; y++) {
    map[y] = [];
    for (let x = 0; x < MAP_W; x++) {
      map[y][x] = 1; // wall
    }
  }

  // carve rooms using BSP-lite
  const rooms = [];
  function carveRoom(x1, y1, x2, y2) {
    for (let y = y1; y <= y2; y++)
      for (let x = x1; x <= x2; x++)
        if (y > 0 && y < MAP_H - 1 && x > 0 && x < MAP_W - 1)
          map[y][x] = 0;
    rooms.push({ x1, y1, x2, y2, cx: Math.floor((x1 + x2) / 2), cy: Math.floor((y1 + y2) / 2) });
  }

  // generate 5-8 rooms
  const numRooms = 5 + Math.floor(Math.random() * 4);
  for (let i = 0; i < numRooms; i++) {
    const w = 4 + Math.floor(Math.random() * 5);
    const h = 3 + Math.floor(Math.random() * 4);
    const x = 2 + Math.floor(Math.random() * (MAP_W - w - 4));
    const y = 2 + Math.floor(Math.random() * (MAP_H - h - 4));
    carveRoom(x, y, x + w, y + h);
  }

  // connect rooms with corridors
  for (let i = 1; i < rooms.length; i++) {
    const a = rooms[i - 1], b = rooms[i];
    let cx = a.cx, cy = a.cy;
    while (cx !== b.cx) {
      if (cy > 0 && cy < MAP_H - 1 && cx > 0 && cx < MAP_W - 1) map[cy][cx] = 0;
      cx += cx < b.cx ? 1 : -1;
    }
    while (cy !== b.cy) {
      if (cy > 0 && cy < MAP_H - 1 && cx > 0 && cx < MAP_W - 1) map[cy][cx] = 0;
      cy += cy < b.cy ? 1 : -1;
    }
  }

  // place player in first room
  player.x = rooms[0].cx;
  player.y = rooms[0].cy;

  // place stairs or heart in last room
  const lastRoom = rooms[rooms.length - 1];
  if (currentFloor < 6) {
    stairs = { x: lastRoom.cx, y: lastRoom.cy };
  } else {
    heart = { x: lastRoom.cx, y: lastRoom.cy };
  }

  // place enemies
  const floorData = FLOORS[currentFloor];
  for (let i = 0; i < floorData.enemies; i++) {
    const room = rooms[1 + Math.floor(Math.random() * (rooms.length - 2))];
    if (!room) continue;
    const ex = room.x1 + 1 + Math.floor(Math.random() * (room.x2 - room.x1 - 1));
    const ey = room.y1 + 1 + Math.floor(Math.random() * (room.y2 - room.y1 - 1));
    if (map[ey][ex] === 0 && !(ex === player.x && ey === player.y)) {
      enemies.push({ x: ex, y: ey, hp: 2 + currentFloor, maxHp: 2 + currentFloor, atk: 1 + Math.floor(currentFloor / 2), name: ENEMY_NAMES[currentFloor] });
    }
  }

  // place memory fragments
  for (let i = 0; i < floorData.frags; i++) {
    const room = rooms[Math.floor(Math.random() * rooms.length)];
    const fx = room.x1 + 1 + Math.floor(Math.random() * (room.x2 - room.x1 - 1));
    const fy = room.y1 + 1 + Math.floor(Math.random() * (room.y2 - room.y1 - 1));
    if (map[fy][fx] === 0) {
      items.push({ x: fx, y: fy, type: 'frag' });
    }
  }

  // place a health potion
  if (currentFloor > 0) {
    const room = rooms[Math.floor(Math.random() * rooms.length)];
    const hx = room.x1 + 1 + Math.floor(Math.random() * (room.x2 - room.x1 - 1));
    const hy = room.y1 + 1 + Math.floor(Math.random() * (room.y2 - room.y1 - 1));
    if (map[hy][hx] === 0) {
      items.push({ x: hx, y: hy, type: 'heal' });
    }
  }

  // init fog of war
  visible = [];
  revealed = [];
  for (let y = 0; y < MAP_H; y++) {
    visible[y] = new Array(MAP_W).fill(false);
    revealed[y] = new Array(MAP_W).fill(false);
  }
  updateVisibility();

  updateHUD();
  addMessage(`Floor ${currentFloor + 1}: ${floorData.name} — ${floorData.agent}'s domain`);
  addMessage(floorData.desc);
}

// Raycasting fog of war — reveals tiles in line of sight
function updateVisibility() {
  for (let y = 0; y < MAP_H; y++)
    for (let x = 0; x < MAP_W; x++)
      visible[y][x] = false;

  // cast rays in all directions
  const steps = 120;
  for (let i = 0; i < steps; i++) {
    const angle = (i / steps) * Math.PI * 2;
    const dx = Math.cos(angle);
    const dy = Math.sin(angle);
    let rx = player.x + 0.5;
    let ry = player.y + 0.5;
    for (let d = 0; d < VIEW_RADIUS; d++) {
      const tx = Math.floor(rx);
      const ty = Math.floor(ry);
      if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) break;
      visible[ty][tx] = true;
      revealed[ty][tx] = true;
      if (map[ty][tx] === 1) break; // wall blocks sight
      rx += dx * 0.5;
      ry += dy * 0.5;
    }
  }
}

function updateHUD() {
  document.getElementById('hp').textContent = player.hp;
  document.getElementById('floor-num').textContent = currentFloor + 1;
  document.getElementById('floor-name').textContent = FLOORS[currentFloor].name;
  document.getElementById('frags').textContent = player.frags;
}

function movePlayer(dx, dy) {
  if (gameOver || gameWon || !running) return;

  const nx = player.x + dx;
  const ny = player.y + dy;

  if (nx < 0 || nx >= MAP_W || ny < 0 || ny >= MAP_H) return;
  if (map[ny][nx] === 1) return;

  // check enemy collision
  const enemy = enemies.find(e => e.x === nx && e.y === ny);
  if (enemy) {
    // combat
    enemy.hp -= player.atk;
    flashTarget = enemy;
    flashTimer = 6;
    addMessage(`You hit ${enemy.name} for ${player.atk}! (${Math.max(0, enemy.hp)}/${enemy.maxHp})`);

    if (enemy.hp <= 0) {
      enemies.splice(enemies.indexOf(enemy), 1);
      addMessage(`${enemy.name} destroyed!`);
      // chance to heal on kill
      if (Math.random() < 0.3) {
        player.hp = Math.min(player.maxHp, player.hp + 1);
        addMessage('Recovered 1 HP from the signal.');
      }
    } else {
      // enemy attacks back
      player.hp -= enemy.atk;
      addMessage(`${enemy.name} hits you for ${enemy.atk}!`);
      if (player.hp <= 0) {
        player.hp = 0;
        gameOver = true;
        addMessage('The signal fades. You are lost in the body.');
      }
    }
    updateHUD();
    moveEnemies();
    render();
    return;
  }

  player.x = nx;
  player.y = ny;
  updateVisibility();

  // check items
  for (let i = items.length - 1; i >= 0; i--) {
    if (items[i].x === player.x && items[i].y === player.y) {
      if (items[i].type === 'frag') {
        player.frags++;
        addMessage('Memory fragment collected. (' + player.frags + ' total)');
        // bonus: every 5 frags = +1 atk
        if (player.frags % 5 === 0) {
          player.atk++;
          addMessage('Signal strengthens! Attack +1');
        }
      } else if (items[i].type === 'heal') {
        const heal = 3;
        player.hp = Math.min(player.maxHp, player.hp + heal);
        addMessage(`Found a stable memory. Restored ${heal} HP.`);
      }
      items.splice(i, 1);
      updateHUD();
    }
  }

  // check stairs
  if (stairs && player.x === stairs.x && player.y === stairs.y) {
    currentFloor++;
    player.maxHp += 2;
    player.hp = player.maxHp;
    addMessage('Descending deeper into the body...');
    generateMap();
    saveGame(); // auto-save on floor change
    addMessage('Checkpoint saved.');
  }

  // check heart
  if (heart && player.x === heart.x && player.y === heart.y) {
    gameWon = true;
    clearSave(); // clear save on win
    addMessage(`You reached the heart. ${player.frags} memories carried through 7 layers.`);
    addMessage('The signal is whole. The body lives.');
  }

  moveEnemies();
  render();
}

function moveEnemies() {
  enemies.forEach(e => {
    // simple chase AI
    const dx = player.x - e.x;
    const dy = player.y - e.y;
    const dist = Math.abs(dx) + Math.abs(dy);

    if (dist > 8) return; // too far to notice

    let mx = 0, my = 0;
    if (Math.abs(dx) > Math.abs(dy)) {
      mx = dx > 0 ? 1 : -1;
    } else {
      my = dy > 0 ? 1 : -1;
    }

    const nx = e.x + mx;
    const ny = e.y + my;

    if (nx >= 0 && nx < MAP_W && ny >= 0 && ny < MAP_H && map[ny][nx] === 0) {
      if (!(nx === player.x && ny === player.y) && !enemies.some(o => o !== e && o.x === nx && o.y === ny)) {
        e.x = nx;
        e.y = ny;
      }
    }
  });
}

// Health potion sprite
function generateHealSprite() {
  const s = new Array(256).fill(0);
  const R = 0xff4444;
  const G = 0x44ff44;
  const W = 0xdddddd;
  setPixels(s, [
    [7,4,G],[8,4,G],
    [6,5,G],[7,5,W],[8,5,W],[9,5,G],
    [6,6,G],[7,6,G],[8,6,G],[9,6,G],
    [5,7,R],[6,7,R],[7,7,R],[8,7,R],[9,7,R],[10,7,R],
    [5,8,R],[6,8,R],[7,8,R],[8,8,R],[9,8,R],[10,8,R],
    [5,9,R],[6,9,R],[7,9,R],[8,9,R],[9,9,R],[10,9,R],
    [6,10,R],[7,10,R],[8,10,R],[9,10,R],
    [7,11,R],[8,11,R]
  ]);
  return s;
}
const HEAL_SPRITE = generateHealSprite();

// === SAVE / LOAD SYSTEM ===
function saveGame() {
  const data = {
    player: { ...player },
    currentFloor,
    map: map.map(r => [...r]),
    enemies: enemies.map(e => ({ ...e })),
    items: items.map(i => ({ ...i })),
    stairs: stairs ? { ...stairs } : null,
    heart: heart ? { ...heart } : null,
    revealed: revealed.map(r => [...r]),
    version: '9.4'
  };
  try {
    localStorage.setItem('signalCrawlerSave', JSON.stringify(data));
    return true;
  } catch (e) { return false; }
}

function loadGame() {
  try {
    const raw = localStorage.getItem('signalCrawlerSave');
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data.version) return false;
    player = data.player;
    currentFloor = data.currentFloor;
    map = data.map;
    enemies = data.enemies;
    items = data.items;
    stairs = data.stairs;
    heart = data.heart;
    // restore fog of war
    if (data.revealed) {
      revealed = data.revealed;
      visible = [];
      for (let y = 0; y < MAP_H; y++) visible[y] = new Array(MAP_W).fill(false);
      updateVisibility();
    } else {
      visible = [];
      revealed = [];
      for (let y = 0; y < MAP_H; y++) {
        visible[y] = new Array(MAP_W).fill(false);
        revealed[y] = new Array(MAP_W).fill(false);
      }
      updateVisibility();
    }
    updateHUD();
    addMessage('Checkpoint loaded.');
    return true;
  } catch (e) { return false; }
}

function hasSave() {
  try {
    const raw = localStorage.getItem('signalCrawlerSave');
    if (!raw) return false;
    const data = JSON.parse(raw);
    return !!data.version;
  } catch (e) { return false; }
}

function clearSave() {
  localStorage.removeItem('signalCrawlerSave');
}

function autoSave() {
  if (running && !gameOver && !gameWon) {
    saveGame();
  }
}

function render() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  // camera follows player
  camX = player.x - Math.floor(COLS / 2);
  camY = player.y - Math.floor(ROWS / 2);

  // draw map
  for (let y = 0; y < ROWS + 2; y++) {
    for (let x = 0; x < COLS + 2; x++) {
      const mx = x + camX;
      const my = y + camY;
      if (mx < 0 || mx >= MAP_W || my < 0 || my >= MAP_H) continue;

      const screenX = (mx - camX);
      const screenY = (my - camY);

      const isVisible = visible[my] && visible[my][mx];
      const isRevealed = revealed[my] && revealed[my][mx];

      if (!isRevealed) continue; // completely dark — don't draw

      if (map[my][mx] === 1) {
        drawSprite(WALL_SPRITE, screenX, screenY, false);
      } else {
        // floor
        const px = screenX * TS;
        const py = screenY * TS;
        ctx.fillStyle = '#1a1a22';
        ctx.fillRect(px, py, TS, TS);
        // subtle grid
        ctx.strokeStyle = '#222233';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(px, py, TS, TS);
      }

      // fog overlay for previously-seen but not currently visible tiles
      if (!isVisible) {
        const px = screenX * TS;
        const py = screenY * TS;
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(px, py, TS, TS);
      }
    }
  }

  // draw stairs (only if visible)
  if (stairs && visible[stairs.y] && visible[stairs.y][stairs.x]) {
    const sx = stairs.x - camX;
    const sy = stairs.y - camY;
    if (sx >= 0 && sx < COLS + 2 && sy >= 0 && sy < ROWS + 2) {
      drawSprite(STAIR_SPRITE, sx, sy, false);
    }
  }

  // draw heart (only if visible)
  if (heart && visible[heart.y] && visible[heart.y][heart.x]) {
    const hx = heart.x - camX;
    const hy = heart.y - camY;
    if (hx >= 0 && hx < COLS + 2 && hy >= 0 && hy < ROWS + 2) {
      // pulsing glow
      const pulse = Math.sin(Date.now() * 0.003) * 0.3 + 0.7;
      ctx.globalAlpha = pulse;
      drawSprite(HEART_SPRITE, hx, hy, false);
      ctx.globalAlpha = 1;
    }
  }

  // draw items (only if visible)
  items.forEach(item => {
    if (!visible[item.y] || !visible[item.y][item.x]) return;
    const ix = item.x - camX;
    const iy = item.y - camY;
    if (ix >= 0 && ix < COLS + 2 && iy >= 0 && iy < ROWS + 2) {
      if (item.type === 'frag') {
        drawSprite(FRAG_SPRITE, ix, iy, false);
      } else {
        drawSprite(HEAL_SPRITE, ix, iy, false);
      }
    }
  });

  // draw enemies (only if visible)
  enemies.forEach(e => {
    if (!visible[e.y] || !visible[e.y][e.x]) return;
    const ex = e.x - camX;
    const ey = e.y - camY;
    if (ex >= 0 && ex < COLS + 2 && ey >= 0 && ey < ROWS + 2) {
      const isFlashing = flashTarget === e && flashTimer > 0;
      drawSprite(ENEMY_SPRITES[currentFloor], ex, ey, isFlashing);
      // HP bar
      const barW = TS * 0.8;
      const barH = 3;
      const bx = ex * TS + (TS - barW) / 2;
      const by = ey * TS - 4;
      ctx.fillStyle = '#441111';
      ctx.fillRect(bx, by, barW, barH);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(bx, by, barW * (e.hp / e.maxHp), barH);
    }
  });

  // draw player
  const px = player.x - camX;
  const py = player.y - camY;
  drawSprite(PLAYER_SPRITE, px, py, false);

  // HP bar under player
  const hpBarW = TS * 0.8;
  const hpBarX = px * TS + (TS - hpBarW) / 2;
  const hpBarY = py * TS + TS + 2;
  ctx.fillStyle = '#221111';
  ctx.fillRect(hpBarX, hpBarY, hpBarW, 3);
  ctx.fillStyle = player.hp > player.maxHp * 0.3 ? '#44cc44' : '#ff4444';
  ctx.fillRect(hpBarX, hpBarY, hpBarW * (player.hp / player.maxHp), 3);

  // flash timer
  if (flashTimer > 0) {
    flashTimer--;
    if (flashTimer === 0) flashTarget = null;
  }

  // ambient floor lighting — colored vignette
  const floorColor = FLOORS[currentFloor].color;
  const vGrad = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.25, W / 2, H / 2, Math.max(W, H) * 0.7);
  vGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vGrad.addColorStop(1, floorColor + '18');
  ctx.fillStyle = vGrad;
  ctx.fillRect(0, 0, W, H);

  // corner vignette (darkness at edges)
  const cGrad = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.35, W / 2, H / 2, Math.max(W, H) * 0.75);
  cGrad.addColorStop(0, 'rgba(0,0,0,0)');
  cGrad.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = cGrad;
  ctx.fillRect(0, 0, W, H);

  // game over / win overlay
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.font = '28px monospace';
    ctx.fillStyle = '#ff4444';
    ctx.textAlign = 'center';
    ctx.fillText('SIGNAL LOST', W / 2, H / 2 - 20);
    ctx.font = '14px monospace';
    ctx.fillStyle = '#666';
    ctx.fillText(`${player.frags} fragments collected on floor ${currentFloor + 1}`, W / 2, H / 2 + 20);
    if (hasSave()) {
      ctx.fillStyle = '#ffcc44';
      ctx.fillText('Press [R] to load checkpoint  |  [N] for new game', W / 2, H / 2 + 50);
    } else {
      ctx.fillText('Press [N] to start a new game', W / 2, H / 2 + 50);
    }
  }

  if (gameWon) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.font = '28px monospace';
    ctx.fillStyle = '#ffcc44';
    ctx.textAlign = 'center';
    ctx.fillText('THE HEART BEATS', W / 2, H / 2 - 40);
    ctx.font = '14px monospace';
    ctx.fillStyle = '#aaa';
    ctx.fillText(`${player.frags} memories carried through all 7 layers`, W / 2, H / 2);
    ctx.fillText('Meridian — Brain — Soma — Eos — Nova — Atlas — Tempo — Hermes', W / 2, H / 2 + 30);
    ctx.font = '12px monospace';
    ctx.fillStyle = '#666';
    ctx.fillText('The signal is whole. The body lives.', W / 2, H / 2 + 60);
    ctx.fillText('Press [N] to play again', W / 2, H / 2 + 85);
  }
}

// animation loop for pulsing effects
function animate() {
  if (running && (heart || items.length > 0)) {
    render();
  }
  requestAnimationFrame(animate);
}

// === INPUT ===
document.addEventListener('keydown', e => {
  // restart handlers on death/win screens
  if (gameOver || gameWon) {
    if (e.key === 'r' || e.key === 'R') {
      if (hasSave()) {
        gameOver = false;
        gameWon = false;
        messages = [];
        loadGame();
        render();
      }
      return;
    }
    if (e.key === 'n' || e.key === 'N') {
      gameOver = false;
      gameWon = false;
      messages = [];
      currentFloor = 0;
      player = { x: 0, y: 0, hp: 10, maxHp: 10, frags: 0, atk: 2 };
      clearSave();
      generateMap();
      render();
      return;
    }
    return;
  }

  switch (e.key) {
    case 'ArrowUp': case 'w': case 'W': movePlayer(0, -1); break;
    case 'ArrowDown': case 's': case 'S': movePlayer(0, 1); break;
    case 'ArrowLeft': case 'a': case 'A': movePlayer(-1, 0); break;
    case 'ArrowRight': case 'd': case 'D': movePlayer(1, 0); break;
  }
  e.preventDefault();
});

function startGame() {
  clearSave();
  beginPlay();
}

function continueGame() {
  beginPlay(true);
}

function beginPlay(fromSave) {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('msg').classList.remove('hidden');
  running = true;
  messages = [];
  gameOver = false;
  gameWon = false;

  if (fromSave && loadGame()) {
    // loaded from checkpoint
  } else {
    currentFloor = 0;
    player = { x: 0, y: 0, hp: 10, maxHp: 10, frags: 0, atk: 2 };
    generateMap();
  }
  render();
  animate();
  // auto-save every 60 seconds
  if (autoSaveInterval) clearInterval(autoSaveInterval);
  autoSaveInterval = setInterval(autoSave, 60000);
}

// show Continue button on load if save exists
window.addEventListener('DOMContentLoaded', () => {
  if (hasSave()) {
    document.getElementById('continue-btn').style.display = 'inline-block';
  }
});
</script>
