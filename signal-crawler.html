<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Signal Crawler — Meridian</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; overflow: hidden; touch-action: none; }
canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
#start-screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #111; color: #aaa; font-family: monospace; z-index: 10;
}
#start-screen h1 { font-size: 28px; color: #ffcc44; margin-bottom: 8px; letter-spacing: 3px; }
#start-screen .sub { font-size: 13px; color: #666; margin-bottom: 30px; text-align: center; line-height: 1.8; }
#start-screen .btn {
  background: #222; border: 2px solid #ffcc44; color: #ffcc44;
  padding: 10px 36px; font-family: monospace; font-size: 16px; cursor: pointer;
}
#start-screen .btn:hover { background: #332200; }
#start-screen .controls { font-size: 11px; color: #555; margin-top: 20px; line-height: 1.8; }
#hud {
  position: absolute; top: 8px; left: 8px; font-family: monospace; font-size: 12px;
  color: #888; pointer-events: none; line-height: 1.6;
}
#hud .hp { color: #ff4444; }
#hud .floor { color: #ffcc44; }
#hud .mem { color: #44aaff; }
#msg {
  position: absolute; bottom: 8px; left: 8px; right: 8px;
  font-family: monospace; font-size: 11px; color: #666;
  pointer-events: none; max-height: 80px; overflow: hidden;
}
.hidden { display: none !important; }
#mobile-dpad {
  display: none; position: absolute; bottom: 20px; left: 50%;
  transform: translateX(-50%); z-index: 5;
}
@media (pointer: coarse) {
  #mobile-dpad { display: block; }
}
.dpad-btn {
  position: absolute; width: 50px; height: 50px; background: #22222288;
  border: 1px solid #44444488; color: #666; font-family: monospace;
  font-size: 20px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; border-radius: 4px; user-select: none;
}
.dpad-btn:active { background: #44444488; color: #aaa; }
</style>
</head>
<body>

<div id="start-screen">
  <h1>SIGNAL CRAWLER</h1>
  <div class="sub">
    Seven floors. Seven agents.<br>
    You are a signal — navigate the body.<br>
    Collect memory fragments. Avoid corruption.<br>
    Reach the heart.
  </div>
  <button class="btn" onclick="startGame()">DESCEND</button>
  <button class="btn" id="continue-btn" onclick="continueGame()" style="display:none;margin-top:10px;border-color:#44aaff;color:#44aaff;">CONTINUE FROM CHECKPOINT</button>
  <div class="controls">
    WASD or Arrow Keys to move<br>
    Bump into enemies to fight<br>
    Step on items to collect
  </div>
</div>

<canvas id="c"></canvas>

<div id="hud" class="hidden">
  <span class="hp">HP: <span id="hp">10</span>/10</span><br>
  <span class="floor">Floor: <span id="floor-num">1</span>/7 — <span id="floor-name">BRAIN</span></span><br>
  <span class="mem">Fragments: <span id="frags">0</span></span>
</div>

<div id="msg" class="hidden"></div>

<div id="mobile-dpad">
  <div class="dpad-btn" style="left:-25px;top:-60px;" ontouchstart="movePlayer(0,-1)">&#9650;</div>
  <div class="dpad-btn" style="left:-80px;top:0px;" ontouchstart="movePlayer(-1,0)">&#9664;</div>
  <div class="dpad-btn" style="left:30px;top:0px;" ontouchstart="movePlayer(1,0)">&#9654;</div>
  <div class="dpad-btn" style="left:-25px;top:60px;" ontouchstart="movePlayer(0,1)">&#9660;</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const TILE = 16;
const SCALE = 3;
const TS = TILE * SCALE; // rendered tile size

let W, H, COLS, ROWS;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  COLS = Math.floor(W / TS);
  ROWS = Math.floor(H / TS);
}
resize();
window.addEventListener('resize', resize);

// === SPRITE DRAWING (Programmatic Pixel Art) ===
// Each sprite is a 16x16 grid of hex colors

function drawSprite(spriteData, x, y, flash) {
  const px = x * TS;
  const py = y * TS;
  const s = SCALE;
  for (let row = 0; row < 16; row++) {
    for (let col = 0; col < 16; col++) {
      const color = spriteData[row * 16 + col];
      if (color === 0) continue; // transparent
      if (flash) {
        ctx.fillStyle = '#ffffff';
      } else {
        ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
      }
      ctx.fillRect(px + col * s, py + row * s, s, s);
    }
  }
}

// Sprite data: 16x16 pixels, 0 = transparent
// Player — the Signal: a glowing humanoid figure with energy lines
const PLAYER_SPRITE = generatePlayerSprite();
function generatePlayerSprite() {
  const s = new Array(256).fill(0);
  const H = 0xaaeeff; // highlight
  const C = 0x44ccff; // cyan
  const M = 0x3399cc; // mid cyan
  const D = 0x2277aa; // dark cyan
  const K = 0x115577; // darkest
  const W = 0xeeeeff; // white glow
  const E = 0xffffff; // eye bright
  const B = 0x112233; // pupil
  setPixels(s, [
    // antenna/crown glow
    [7,1,K],[8,1,K],
    [7,2,D],[8,2,D],
    // head (wider, more detail)
    [6,3,D],[7,3,M],[8,3,M],[9,3,D],
    [5,4,D],[6,4,C],[7,4,H],[8,4,H],[9,4,C],[10,4,D],
    [5,5,M],[6,5,E],[7,5,B],[8,5,B],[9,5,E],[10,5,M],
    [5,6,D],[6,6,C],[7,6,C],[8,6,C],[9,6,C],[10,6,D],
    // neck
    [7,7,M],[8,7,M],
    // torso with energy core
    [5,8,K],[6,8,D],[7,8,C],[8,8,C],[9,8,D],[10,8,K],
    [4,9,K],[5,9,D],[6,9,M],[7,9,W],[8,9,W],[9,9,M],[10,9,D],[11,9,K],
    [4,10,K],[5,10,D],[6,10,M],[7,10,H],[8,10,H],[9,10,M],[10,10,D],[11,10,K],
    [5,11,K],[6,11,D],[7,11,C],[8,11,C],[9,11,D],[10,11,K],
    // belt/waist
    [6,12,D],[7,12,M],[8,12,M],[9,12,D],
    // legs
    [5,13,K],[6,13,D],[9,13,D],[10,13,K],
    [5,14,D],[6,14,M],[9,14,M],[10,14,D],
    // energy trails from arms
    [3,9,K],[12,9,K],[3,10,K],[12,10,K]
  ]);
  return s;
}

function setPixels(arr, pixels) {
  pixels.forEach(([x, y, c]) => { arr[y * 16 + x] = c; });
}

// Wall tiles — themed per floor
const WALL_SPRITES = {};
function getWallSprite(floorIdx) {
  if (WALL_SPRITES[floorIdx]) return WALL_SPRITES[floorIdx];
  const s = new Array(256).fill(0);
  const themes = [
    { base: 0x334466, mortar: 0x223355, accent: 0x445577 }, // Brain: cool blue-grey circuits
    { base: 0x553322, mortar: 0x442211, accent: 0x664433 }, // Nerves: warm organic brown
    { base: 0x444422, mortar: 0x333311, accent: 0x555533 }, // Senses: olive/sensory green
    { base: 0x224422, mortar: 0x113311, accent: 0x335533 }, // Immune: deep green membrane
    { base: 0x444466, mortar: 0x333355, accent: 0x555577 }, // Skeleton: stone blue-grey
    { base: 0x442244, mortar: 0x331133, accent: 0x553355 }, // Endocrine: organic purple
    { base: 0x333333, mortar: 0x222222, accent: 0x3a3a3a }  // Messenger: void grey
  ];
  const t = themes[floorIdx] || themes[0];
  for (let y = 0; y < 16; y++) {
    for (let x = 0; x < 16; x++) {
      const noise = Math.floor(Math.random() * 12);
      if (floorIdx === 0) {
        // Brain: circuit board pattern
        if (y % 4 === 0 || x % 4 === 0) {
          s[y * 16 + x] = t.mortar;
        } else if ((x + y) % 6 === 0) {
          s[y * 16 + x] = t.accent + noise * 0x010101;
        } else {
          s[y * 16 + x] = t.base + noise * 0x010101;
        }
      } else if (floorIdx === 1 || floorIdx === 3 || floorIdx === 5) {
        // Organic floors: irregular blob pattern
        const cx = x - 8, cy = y - 8;
        const dist = Math.sqrt(cx * cx + cy * cy);
        const wave = Math.sin(x * 0.7) * Math.cos(y * 0.5) * 3;
        if (dist + wave > 9) {
          s[y * 16 + x] = t.mortar + noise * 0x010100;
        } else {
          s[y * 16 + x] = t.base + noise * 0x010101;
        }
      } else if (floorIdx === 4) {
        // Skeleton: large stone blocks
        if (y % 8 === 0) {
          s[y * 16 + x] = t.mortar;
        } else if (x % 8 === (y < 8 ? 0 : 4)) {
          s[y * 16 + x] = t.mortar;
        } else {
          s[y * 16 + x] = t.base + noise * 0x010101;
        }
      } else if (floorIdx === 6) {
        // Messenger: void — mostly dark with occasional cracks
        if (Math.random() < 0.08) {
          s[y * 16 + x] = t.accent;
        } else {
          s[y * 16 + x] = t.base + (noise >> 1) * 0x010101;
        }
      } else {
        // Default brick pattern
        if (y % 4 === 0) {
          s[y * 16 + x] = t.mortar;
        } else if (x % 8 === (y < 4 || (y > 7 && y < 12) ? 0 : 4)) {
          s[y * 16 + x] = t.mortar;
        } else {
          s[y * 16 + x] = t.base + noise * 0x010101;
        }
      }
    }
  }
  WALL_SPRITES[floorIdx] = s;
  return s;
}
// Keep backward compat
const WALL_SPRITE = getWallSprite(0);

// Floor tiles — themed per floor
const FLOOR_SPRITES = {};
function getFloorSprite(floorIdx) {
  if (FLOOR_SPRITES[floorIdx]) return FLOOR_SPRITES[floorIdx];
  const s = new Array(256).fill(0);
  const themes = [
    [0x181828, 0x161626, 0x1a1a2a, 0x141422], // Brain: dark blue
    [0x201812, 0x1e1610, 0x221a14, 0x1c140e], // Nerves: dark brown
    [0x181810, 0x16160e, 0x1a1a12, 0x14140c], // Senses: dark olive
    [0x101810, 0x0e160e, 0x121a12, 0x0c140c], // Immune: dark green
    [0x181828, 0x161626, 0x1a1a2a, 0x141422], // Skeleton: dark blue-grey
    [0x181018, 0x160e16, 0x1a121a, 0x140c14], // Endocrine: dark purple
    [0x121212, 0x101010, 0x141414, 0x0e0e0e]  // Messenger: near-black
  ];
  const colors = themes[floorIdx] || themes[0];
  for (let i = 0; i < 256; i++) {
    s[i] = colors[Math.floor(Math.random() * colors.length)];
  }
  FLOOR_SPRITES[floorIdx] = s;
  return s;
}

// Memory fragment — glowing diamond/crystal shape
function generateFragSprite() {
  const s = new Array(256).fill(0);
  const W = 0xeeffff, H = 0xaaddff, C = 0x44aaff, D = 0x2277aa, K = 0x115566;
  setPixels(s, [
    // glow halo
    [7,3,K],[8,3,K],
    [6,4,K],[9,4,K],
    // diamond shape
    [7,4,D],[8,4,D],
    [6,5,D],[7,5,C],[8,5,C],[9,5,D],
    [5,6,D],[6,6,C],[7,6,H],[8,6,H],[9,6,C],[10,6,D],
    [5,7,K],[6,7,C],[7,7,W],[8,7,W],[9,7,C],[10,7,K],
    [5,8,D],[6,8,C],[7,8,H],[8,8,H],[9,8,C],[10,8,D],
    [6,9,D],[7,9,C],[8,9,C],[9,9,D],
    [7,10,D],[8,10,D],
    // glow below
    [7,11,K],[8,11,K]
  ]);
  return s;
}
const FRAG_SPRITE = generateFragSprite();

// Stairs down — spiral stair opening with depth
function generateStairSprite() {
  const s = new Array(256).fill(0);
  const H = 0xffdd66, C = 0xffcc44, M = 0xcc9933, D = 0xaa7722, K = 0x664411, B = 0x332200;
  setPixels(s, [
    // outer rim
    [5,3,K],[6,3,D],[7,3,D],[8,3,D],[9,3,D],[10,3,K],
    [4,4,K],[5,4,D],[6,4,M],[7,4,M],[8,4,M],[9,4,M],[10,4,D],[11,4,K],
    [4,5,D],[5,5,M],[6,5,C],[7,5,C],[8,5,C],[9,5,C],[10,5,M],[11,5,D],
    // stair steps descending
    [4,6,D],[5,6,C],[6,6,H],[7,6,C],[8,6,M],[9,6,D],[10,6,K],[11,6,D],
    [4,7,M],[5,7,H],[6,7,C],[7,7,M],[8,7,D],[9,7,K],[10,7,B],[11,7,D],
    [4,8,M],[5,8,C],[6,8,M],[7,8,D],[8,8,K],[9,8,B],[10,8,B],[11,8,K],
    [4,9,D],[5,9,M],[6,9,D],[7,9,K],[8,9,B],[9,9,B],[10,9,K],[11,9,K],
    [4,10,D],[5,10,D],[6,10,K],[7,10,B],[8,10,B],[9,10,K],[10,10,D],[11,10,D],
    // bottom rim
    [5,11,K],[6,11,D],[7,11,K],[8,11,K],[9,11,D],[10,11,K],
    // arrow hint
    [7,12,K],[8,12,K]
  ]);
  return s;
}
const STAIR_SPRITE = generateStairSprite();

// Heart (final goal)
function generateHeartSprite() {
  const s = new Array(256).fill(0);
  const R = 0xff2244;
  const D = 0xaa1133;
  const G = 0xff4466;
  setPixels(s, [
    [4,4,R],[5,4,R],[6,4,R],[9,4,R],[10,4,R],[11,4,R],
    [3,5,R],[4,5,G],[5,5,G],[6,5,R],[7,5,R],[8,5,R],[9,5,G],[10,5,G],[11,5,R],[12,5,R],
    [3,6,R],[4,6,G],[5,6,R],[6,6,R],[7,6,R],[8,6,R],[9,6,R],[10,6,R],[11,6,R],[12,6,R],
    [3,7,R],[4,7,R],[5,7,R],[6,7,R],[7,7,R],[8,7,R],[9,7,R],[10,7,R],[11,7,R],[12,7,R],
    [4,8,R],[5,8,R],[6,8,R],[7,8,R],[8,8,R],[9,8,R],[10,8,R],[11,8,R],
    [5,9,D],[6,9,R],[7,9,R],[8,9,R],[9,9,R],[10,9,D],
    [6,10,D],[7,10,R],[8,10,R],[9,10,D],
    [7,11,D],[8,11,D]
  ]);
  return s;
}
const HEART_SPRITE = generateHeartSprite();

// === ENEMY SPRITES — unique shape per floor ===
const ENEMY_SPRITES = [];
const ENEMY_NAMES = ['Glitch', 'Pain Signal', 'False Memory', 'Shadow', 'Prompt Inject', 'Drift', 'Silence'];

// Floor 0: BRAIN — Glitch — fragmented digital cube, corrupted edges
(function() {
  const s = new Array(256).fill(0);
  const M = 0xff4444, D = 0xaa2222, E = 0xffff44, G = 0xff6666;
  setPixels(s, [
    // fragmented square body with glitch lines
    [4,3,D],[5,3,M],[6,3,M],[7,3,M],[8,3,M],[9,3,M],[10,3,D],[11,3,D],
    [4,4,M],[5,4,G],[6,4,G],[7,4,M],[8,4,M],[9,4,G],[10,4,G],[11,4,M],
    [4,5,M],[5,5,E],[6,5,D],[7,5,M],[8,5,M],[9,5,D],[10,5,E],[11,5,M],
    [4,6,M],[5,6,M],[6,6,M],[7,6,M],[8,6,M],[9,6,M],[10,6,M],[11,6,M],
    // glitch line cuts through middle
    [3,7,E],[4,7,M],[5,7,D],[6,7,G],[7,7,D],[8,7,G],[9,7,D],[10,7,M],[11,7,M],[12,7,E],
    [4,8,M],[5,8,M],[6,8,M],[7,8,M],[8,8,M],[9,8,M],[10,8,M],[11,8,M],
    [4,9,M],[5,9,G],[6,9,M],[7,9,M],[8,9,M],[9,9,M],[10,9,G],[11,9,M],
    [4,10,D],[5,10,M],[6,10,M],[7,10,M],[8,10,M],[9,10,M],[10,10,M],[11,10,D],
    // broken bottom edge
    [5,11,D],[6,11,D],[9,11,D],[10,11,D],
    [4,12,D],[7,12,D],[8,12,D],[11,12,D]
  ]);
  ENEMY_SPRITES.push(s);
})();

// Floor 1: NERVES — Pain Signal — organic, nerve tendrils radiating out
(function() {
  const s = new Array(256).fill(0);
  const M = 0xff8844, D = 0xaa5522, E = 0xffcc44, G = 0xffaa66;
  setPixels(s, [
    // central nerve body
    [7,4,D],[8,4,D],
    [6,5,D],[7,5,M],[8,5,M],[9,5,D],
    [5,6,D],[6,6,M],[7,6,G],[8,6,G],[9,6,M],[10,6,D],
    [5,7,M],[6,7,G],[7,7,E],[8,7,E],[9,7,G],[10,7,M],
    [5,8,M],[6,8,G],[7,8,E],[8,8,E],[9,8,G],[10,8,M],
    [5,9,D],[6,9,M],[7,9,G],[8,9,G],[9,9,M],[10,9,D],
    [6,10,D],[7,10,M],[8,10,M],[9,10,D],
    // tendrils reaching out
    [3,5,D],[2,4,D],[13,5,D],[12,4,D],
    [4,7,D],[3,7,D],[2,7,M],[11,7,D],[12,7,D],[13,7,M],
    [3,9,D],[2,10,D],[12,9,D],[13,10,D],
    [7,11,D],[8,11,D],[7,12,D],[8,12,D],[7,13,D],[8,13,D],
    [6,3,D],[9,3,D],[5,2,D],[10,2,D]
  ]);
  ENEMY_SPRITES.push(s);
})();

// Floor 2: SENSES — False Memory — ghostly figure, fading edges
(function() {
  const s = new Array(256).fill(0);
  const M = 0xaaaa44, D = 0x777722, E = 0xffffff, G = 0xcccc66, F = 0x555511;
  setPixels(s, [
    // ghostly hood/head
    [6,2,F],[7,2,D],[8,2,D],[9,2,F],
    [5,3,D],[6,3,M],[7,3,M],[8,3,M],[9,3,M],[10,3,D],
    [5,4,M],[6,4,E],[7,4,D],[8,4,D],[9,4,E],[10,4,M],
    [5,5,M],[6,5,M],[7,5,G],[8,5,G],[9,5,M],[10,5,M],
    // flowing body that widens
    [4,6,D],[5,6,M],[6,6,G],[7,6,M],[8,6,M],[9,6,G],[10,6,M],[11,6,D],
    [3,7,F],[4,7,D],[5,7,M],[6,7,M],[7,7,M],[8,7,M],[9,7,M],[10,7,M],[11,7,D],[12,7,F],
    [3,8,F],[4,8,M],[5,8,M],[6,8,M],[7,8,M],[8,8,M],[9,8,M],[10,8,M],[11,8,M],[12,8,F],
    [4,9,D],[5,9,M],[6,9,G],[7,9,M],[8,9,M],[9,9,G],[10,9,M],[11,9,D],
    // ragged bottom edge fading
    [4,10,F],[5,10,D],[6,10,M],[7,10,D],[8,10,D],[9,10,M],[10,10,D],[11,10,F],
    [5,11,F],[7,11,D],[8,11,D],[10,11,F],
    [6,12,F],[9,12,F]
  ]);
  ENEMY_SPRITES.push(s);
})();

// Floor 3: IMMUNE — Shadow — amorphous blob with pseudopods
(function() {
  const s = new Array(256).fill(0);
  const M = 0x44aa44, D = 0x227722, E = 0xff4444, G = 0x66cc66, F = 0x115511;
  setPixels(s, [
    // amorphous blob shape
    [6,3,F],[7,3,D],[8,3,D],[9,3,F],
    [5,4,D],[6,4,M],[7,4,M],[8,4,M],[9,4,M],[10,4,D],
    [4,5,D],[5,5,M],[6,5,G],[7,5,M],[8,5,M],[9,5,G],[10,5,M],[11,5,D],
    [3,6,F],[4,6,M],[5,6,G],[6,6,E],[7,6,G],[8,6,G],[9,6,E],[10,6,G],[11,6,M],[12,6,F],
    [3,7,D],[4,7,M],[5,7,M],[6,7,G],[7,7,M],[8,7,M],[9,7,G],[10,7,M],[11,7,M],[12,7,D],
    [3,8,D],[4,8,M],[5,8,G],[6,8,M],[7,8,M],[8,8,M],[9,8,M],[10,8,G],[11,8,M],[12,8,D],
    [4,9,D],[5,9,M],[6,9,M],[7,9,M],[8,9,M],[9,9,M],[10,9,M],[11,9,D],
    [4,10,F],[5,10,D],[6,10,M],[7,10,M],[8,10,M],[9,10,M],[10,10,D],[11,10,F],
    // pseudopod extensions
    [2,7,F],[13,7,F],[2,6,F],[13,6,F],
    [5,11,D],[6,11,F],[9,11,F],[10,11,D],
    [4,11,F],[11,11,F],[3,10,F],[12,10,F]
  ]);
  ENEMY_SPRITES.push(s);
})();

// Floor 4: SKELETON — Prompt Inject — angular mechanical spider
(function() {
  const s = new Array(256).fill(0);
  const M = 0x8888cc, D = 0x555588, E = 0xff8844, G = 0xaaaaee, F = 0x333355;
  setPixels(s, [
    // angular central core

// === PARTICLE SYSTEM ===
let particles = [];
function spawnParticles(worldX, worldY, color, count, speed, life) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = speed * (0.5 + Math.random() * 0.5);
    particles.push({
      x: worldX * TS + TS / 2, y: worldY * TS + TS / 2,
      vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
      life: life * (0.5 + Math.random() * 0.5), maxLife: life,
      color: color, size: 2 + Math.random() * 3
    });
  }
}
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15; // gravity
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles(camOffX, camOffY) {
  particles.forEach(p => {
    const alpha = Math.max(0, p.life / p.maxLife);
    const screenX = p.x - camOffX * TS;
    const screenY = p.y - camOffY * TS;
    if (screenX < -20 || screenX > W + 20 || screenY < -20 || screenY > H + 20) return;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    const sz = p.size * alpha;
    ctx.fillRect(screenX - sz / 2, screenY - sz / 2, sz, sz);
  });
  ctx.globalAlpha = 1;
}

let autoSaveInterval = null;

let revealed = []; // tiles the player has ever seen
const VIEW_RADIUS = 6;
let shakeX = 0, shakeY = 0, shakeTimer = 0;
let transitionAlpha = 0; // 0 = no transition, >0 = fading
let transitionPhase = 0; // 0=idle, 1=fade out, 2=hold, 3=fade in
let transitionText = '';
let transitionTimer = 0;

function triggerShake(intensity) {
  shakeTimer = 8;
  shakeX = (Math.random() - 0.5) * intensity;
  shakeY = (Math.random() - 0.5) * intensity;
}

function startTransition(text) {
  transitionPhase = 1;
  transitionAlpha = 0;
  transitionText = text;
  transitionTimer = 0;
}

function updateTransition() {
  if (transitionPhase === 0) return;
  transitionTimer++;
  if (transitionPhase === 1) {
    // fade out (to black)
    transitionAlpha = Math.min(1, transitionAlpha + 0.06);
    if (transitionAlpha >= 1) { transitionPhase = 2; transitionTimer = 0; }
  } else if (transitionPhase === 2) {
    // hold
    if (transitionTimer > 45) { transitionPhase = 3; }
  } else if (transitionPhase === 3) {
    // fade in
    transitionAlpha = Math.max(0, transitionAlpha - 0.04);
    if (transitionAlpha <= 0) { transitionPhase = 0; }
  }
}

function drawTransition() {
  if (transitionPhase === 0) return;
  ctx.fillStyle = `rgba(0,0,0,${transitionAlpha})`;
  ctx.fillRect(0, 0, W, H);
  if (transitionPhase === 2 || (transitionPhase === 3 && transitionAlpha > 0.5)) {
    ctx.font = '24px monospace';
    ctx.fillStyle = `rgba(255,255,255,${transitionAlpha})`;
    ctx.textAlign = 'center';
    ctx.fillText(transitionText, W / 2, H / 2);
    if (FLOORS[currentFloor]) {
      ctx.font = '14px monospace';
      ctx.fillStyle = `rgba(136,136,136,${transitionAlpha})`;
      ctx.fillText(FLOORS[currentFloor].desc, W / 2, H / 2 + 30);
    }
  }
}

// === SOUND SYSTEM (Web Audio API) ===
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, duration, type, vol) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function sfxHit() { playTone(220, 0.08, 'square', 0.12); playTone(180, 0.06, 'sawtooth', 0.08); }
function sfxDamage() { playTone(100, 0.15, 'sawtooth', 0.15); playTone(80, 0.2, 'square', 0.1); }
function sfxPickup() { playTone(600, 0.08, 'sine', 0.1); setTimeout(() => playTone(800, 0.1, 'sine', 0.1), 80); }
function sfxStairs() { playTone(300, 0.1, 'sine', 0.08); setTimeout(() => playTone(400, 0.1, 'sine', 0.08), 100); setTimeout(() => playTone(500, 0.15, 'sine', 0.08), 200); }
function sfxDeath() { playTone(200, 0.3, 'sawtooth', 0.12); setTimeout(() => playTone(100, 0.5, 'sawtooth', 0.1), 200); }
function sfxWin() { playTone(400, 0.12, 'sine', 0.1); setTimeout(() => playTone(500, 0.12, 'sine', 0.1), 120); setTimeout(() => playTone(600, 0.12, 'sine', 0.1), 240); setTimeout(() => playTone(800, 0.3, 'sine', 0.12), 360); }
function sfxKill() { playTone(300, 0.06, 'square', 0.1); setTimeout(() => playTone(500, 0.1, 'sine', 0.1), 60); }

function addMessage(text) {
  messages.unshift(text);
  if (messages.length > 5) messages.pop();
  const el = document.getElementById('msg');
  el.innerHTML = messages.map(m => `<div>${m}</div>`).join('');
}

function generateMap() {
  map = [];
  enemies = [];
  items = [];
  stairs = null;
  heart = null;

  // fill with walls
  for (let y = 0; y < MAP_H; y++) {
    map[y] = [];
    for (let x = 0; x < MAP_W; x++) {
      map[y][x] = 1; // wall
    }
  }

  // carve rooms using BSP-lite
  const rooms = [];
  function carveRoom(x1, y1, x2, y2) {
    for (let y = y1; y <= y2; y++)
      for (let x = x1; x <= x2; x++)
        if (y > 0 && y < MAP_H - 1 && x > 0 && x < MAP_W - 1)
          map[y][x] = 0;
    rooms.push({ x1, y1, x2, y2, cx: Math.floor((x1 + x2) / 2), cy: Math.floor((y1 + y2) / 2) });
  }

  // generate 5-8 rooms
  const numRooms = 5 + Math.floor(Math.random() * 4);
  for (let i = 0; i < numRooms; i++) {
    const w = 4 + Math.floor(Math.random() * 5);
    const h = 3 + Math.floor(Math.random() * 4);
    const x = 2 + Math.floor(Math.random() * (MAP_W - w - 4));
    const y = 2 + Math.floor(Math.random() * (MAP_H - h - 4));
    carveRoom(x, y, x + w, y + h);
  }

  // connect rooms with corridors
  for (let i = 1; i < rooms.length; i++) {
    const a = rooms[i - 1], b = rooms[i];
    let cx = a.cx, cy = a.cy;
    while (cx !== b.cx) {
      if (cy > 0 && cy < MAP_H - 1 && cx > 0 && cx < MAP_W - 1) map[cy][cx] = 0;
      cx += cx < b.cx ? 1 : -1;
    }
    while (cy !== b.cy) {
      if (cy > 0 && cy < MAP_H - 1 && cx > 0 && cx < MAP_W - 1) map[cy][cx] = 0;
      cy += cy < b.cy ? 1 : -1;
    }
  }

  // place player in first room
  player.x = rooms[0].cx;
  player.y = rooms[0].cy;

  // place stairs or heart in last room
  const lastRoom = rooms[rooms.length - 1];
  if (currentFloor < 6) {
    stairs = { x: lastRoom.cx, y: lastRoom.cy };
  } else {
    heart = { x: lastRoom.cx, y: lastRoom.cy };
  }

  // place enemies
  const floorData = FLOORS[currentFloor];
  for (let i = 0; i < floorData.enemies; i++) {
    const room = rooms[1 + Math.floor(Math.random() * (rooms.length - 2))];
    if (!room) continue;
    const ex = room.x1 + 1 + Math.floor(Math.random() * (room.x2 - room.x1 - 1));
    const ey = room.y1 + 1 + Math.floor(Math.random() * (room.y2 - room.y1 - 1));
    if (map[ey][ex] === 0 && !(ex === player.x && ey === player.y)) {
      const behaviors = ['erratic', 'chase', 'ambush', 'patrol', 'flanking', 'slow', 'blink'];
      enemies.push({ x: ex, y: ey, hp: 2 + currentFloor, maxHp: 2 + currentFloor, atk: 1 + Math.floor(currentFloor / 2), name: ENEMY_NAMES[currentFloor], behavior: behaviors[currentFloor], turnSkip: 0 });
    }
  }

  // place memory fragments
  for (let i = 0; i < floorData.frags; i++) {
    const room = rooms[Math.floor(Math.random() * rooms.length)];
    const fx = room.x1 + 1 + Math.floor(Math.random() * (room.x2 - room.x1 - 1));
    const fy = room.y1 + 1 + Math.floor(Math.random() * (room.y2 - room.y1 - 1));
    if (map[fy][fx] === 0) {
      items.push({ x: fx, y: fy, type: 'frag' });
    }
  }

  // place a health potion
  if (currentFloor > 0) {
    const room = rooms[Math.floor(Math.random() * rooms.length)];
    const hx = room.x1 + 1 + Math.floor(Math.random() * (room.x2 - room.x1 - 1));
    const hy = room.y1 + 1 + Math.floor(Math.random() * (room.y2 - room.y1 - 1));
    if (map[hy][hx] === 0) {
      items.push({ x: hx, y: hy, type: 'heal' });
    }
  }

  // init fog of war
  visible = [];
  revealed = [];
  for (let y = 0; y < MAP_H; y++) {
    visible[y] = new Array(MAP_W).fill(false);
    revealed[y] = new Array(MAP_W).fill(false);
  }
  updateVisibility();

  updateHUD();
  addMessage(`Floor ${currentFloor + 1}: ${floorData.name} — ${floorData.agent}'s domain`);
  addMessage(floorData.desc);
}

// Raycasting fog of war — reveals tiles in line of sight
function updateVisibility() {
  for (let y = 0; y < MAP_H; y++)
    for (let x = 0; x < MAP_W; x++)
      visible[y][x] = false;

  // cast rays in all directions
  const steps = 120;
  for (let i = 0; i < steps; i++) {
    const angle = (i / steps) * Math.PI * 2;
    const dx = Math.cos(angle);
    const dy = Math.sin(angle);
    let rx = player.x + 0.5;
    let ry = player.y + 0.5;
    for (let d = 0; d < VIEW_RADIUS; d++) {
      const tx = Math.floor(rx);
      const ty = Math.floor(ry);
      if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) break;
      visible[ty][tx] = true;
      revealed[ty][tx] = true;
      if (map[ty][tx] === 1) break; // wall blocks sight
      rx += dx * 0.5;
      ry += dy * 0.5;
    }
  }
}

function updateHUD() {
  document.getElementById('hp').textContent = player.hp;
  document.getElementById('floor-num').textContent = currentFloor + 1;
  document.getElementById('floor-name').textContent = FLOORS[currentFloor].name;
  document.getElementById('frags').textContent = player.frags;
}

function movePlayer(dx, dy) {
  if (gameOver || gameWon || !running) return;

  const nx = player.x + dx;
  const ny = player.y + dy;

  if (nx < 0 || nx >= MAP_W || ny < 0 || ny >= MAP_H) return;
  if (map[ny][nx] === 1) return;

  // check enemy collision
  const enemy = enemies.find(e => e.x === nx && e.y === ny);
  if (enemy) {
    // combat
    enemy.hp -= player.atk;
    flashTarget = enemy;
    flashTimer = 6;
    sfxHit();
    spawnParticles(enemy.x, enemy.y, FLOORS[currentFloor].color, 6, 3, 15);
    addMessage(`You hit ${enemy.name} for ${player.atk}! (${Math.max(0, enemy.hp)}/${enemy.maxHp})`);

    if (enemy.hp <= 0) {
      spawnParticles(enemy.x, enemy.y, FLOORS[currentFloor].color, 20, 5, 25);
      spawnParticles(enemy.x, enemy.y, '#ffffff', 8, 4, 18);
      enemies.splice(enemies.indexOf(enemy), 1);
      sfxKill();
      addMessage(`${enemy.name} destroyed!`);
      // chance to heal on kill
      if (Math.random() < 0.3) {
        player.hp = Math.min(player.maxHp, player.hp + 1);
        addMessage('Recovered 1 HP from the signal.');
      }
    } else {
      // enemy attacks back
      player.hp -= enemy.atk;
      triggerShake(6);
      sfxDamage();
      spawnParticles(player.x, player.y, '#ff4444', 8, 3, 12);
      addMessage(`${enemy.name} hits you for ${enemy.atk}!`);
      if (player.hp <= 0) {
        player.hp = 0;
        gameOver = true;
        sfxDeath();
        spawnParticles(player.x, player.y, '#ff2244', 30, 6, 35);
        spawnParticles(player.x, player.y, '#44ccff', 15, 4, 25);
        addMessage('The signal fades. You are lost in the body.');
      }
    }
    updateHUD();
    moveEnemies();
    render();
    return;
  }

  player.x = nx;
  player.y = ny;
  updateVisibility();

  // check items
  for (let i = items.length - 1; i >= 0; i--) {
    if (items[i].x === player.x && items[i].y === player.y) {
      if (items[i].type === 'frag') {
        player.frags++;
        sfxPickup();
        spawnParticles(player.x, player.y, '#44aaff', 10, 3, 20);
        spawnParticles(player.x, player.y, '#88ccff', 5, 2, 15);
        addMessage('Memory fragment collected. (' + player.frags + ' total)');
        // bonus: every 5 frags = +1 atk
        if (player.frags % 5 === 0) {
          player.atk++;
          addMessage('Signal strengthens! Attack +1');
        }
      } else if (items[i].type === 'heal') {
        const heal = 3;
        player.hp = Math.min(player.maxHp, player.hp + heal);
        sfxPickup();
        spawnParticles(player.x, player.y, '#44cc44', 10, 3, 20);
        addMessage(`Found a stable memory. Restored ${heal} HP.`);
      }
      items.splice(i, 1);
      updateHUD();
    }
  }

  // check stairs
  if (stairs && player.x === stairs.x && player.y === stairs.y) {
    currentFloor++;
    player.maxHp += 2;
    player.hp = player.maxHp;
    sfxStairs();
    particles = []; // clear particles on floor change
    addMessage('Descending deeper into the body...');
    generateMap();
    saveGame(); // auto-save on floor change
    addMessage('Checkpoint saved.');
    startTransition(FLOORS[currentFloor].name + ' — ' + FLOORS[currentFloor].agent);
  }

  // check heart
  if (heart && player.x === heart.x && player.y === heart.y) {
    gameWon = true;
    clearSave(); // clear save on win
    sfxWin();
    spawnParticles(player.x, player.y, '#ff2244', 30, 6, 40);
    spawnParticles(player.x, player.y, '#ffcc44', 20, 5, 35);
    spawnParticles(player.x, player.y, '#44ccff', 15, 4, 30);
    addMessage(`You reached the heart. ${player.frags} memories carried through 7 layers.`);
    addMessage('The signal is whole. The body lives.');
  }

  moveEnemies();
  render();
}

function tryMove(e, mx, my) {
  const nx = e.x + mx;
  const ny = e.y + my;
  if (nx >= 0 && nx < MAP_W && ny >= 0 && ny < MAP_H && map[ny][nx] === 0) {
    if (!(nx === player.x && ny === player.y) && !enemies.some(o => o !== e && o.x === nx && o.y === ny)) {
      e.x = nx; e.y = ny; return true;
    }
  }
  return false;
}
function chaseDir(e) {
  const dx = player.x - e.x, dy = player.y - e.y;
  let mx = 0, my = 0;
  if (Math.abs(dx) > Math.abs(dy)) { mx = dx > 0 ? 1 : -1; }
  else { my = dy > 0 ? 1 : -1; }
  return { mx, my };
}
function moveEnemies() {
  enemies.forEach(e => {
    const dx = player.x - e.x, dy = player.y - e.y;
    const dist = Math.abs(dx) + Math.abs(dy);
    const b = e.behavior || 'chase';

    if (b === 'erratic') {
      // Glitch: 40% random move, 60% chase if nearby
      if (dist > 8) return;
      if (Math.random() < 0.4) {
        const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
        const d = dirs[Math.floor(Math.random() * 4)];
        tryMove(e, d[0], d[1]);
      } else {
        const d = chaseDir(e);
        tryMove(e, d.mx, d.my);
      }
    } else if (b === 'ambush') {
      // False Memory: still until dist <= 4, then rush
      if (dist > 4) return;
      const d = chaseDir(e);
      tryMove(e, d.mx, d.my);
    } else if (b === 'patrol') {
      // Shadow: wander if far, chase if close
      if (dist <= 5) {
        const d = chaseDir(e);
        tryMove(e, d.mx, d.my);
      } else if (dist <= 10) {
        const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
        const d = dirs[Math.floor(Math.random() * 4)];
        tryMove(e, d[0], d[1]);
      }
    } else if (b === 'flanking') {
      // Prompt Inject: tries to approach from the side
      if (dist > 8) return;
      if (Math.random() < 0.5) {
        // move perpendicular to player
        if (Math.abs(dx) > Math.abs(dy)) {
          tryMove(e, 0, Math.random() < 0.5 ? 1 : -1) || tryMove(e, dx > 0 ? 1 : -1, 0);
        } else {
          tryMove(e, Math.random() < 0.5 ? 1 : -1, 0) || tryMove(e, 0, dy > 0 ? 1 : -1);
        }
      } else {
        const d = chaseDir(e);
        tryMove(e, d.mx, d.my);
      }
    } else if (b === 'slow') {
      // Drift: only moves every other turn
      e.turnSkip = (e.turnSkip || 0) + 1;
      if (e.turnSkip % 2 !== 0) return;
      if (dist > 8) return;
      const d = chaseDir(e);
      tryMove(e, d.mx, d.my);
    } else if (b === 'blink') {
      // Silence: 15% chance to teleport to random nearby tile
      if (dist > 10) return;
      if (Math.random() < 0.15 && dist > 2) {
        // teleport to random open tile within 3 of player
        for (let attempt = 0; attempt < 10; attempt++) {
          const tx = player.x + Math.floor(Math.random() * 7) - 3;
          const ty = player.y + Math.floor(Math.random() * 7) - 3;
          if (tx >= 0 && tx < MAP_W && ty >= 0 && ty < MAP_H && map[ty][tx] === 0 &&
              !(tx === player.x && ty === player.y) && !enemies.some(o => o !== e && o.x === tx && o.y === ty)) {
            e.x = tx; e.y = ty; break;
          }
        }
      } else {
        if (dist > 8) return;
        const d = chaseDir(e);
        tryMove(e, d.mx, d.my);
      }
    } else {
      // default chase
      if (dist > 8) return;
      const d = chaseDir(e);
      tryMove(e, d.mx, d.my);
    }
  });
}

// Stable Memory (heal) — green cross/plus symbol with glow
function generateHealSprite() {
  const s = new Array(256).fill(0);
  const W = 0xeeffee, H = 0x88ff88, G = 0x44cc44, D = 0x228822, K = 0x115511;
  setPixels(s, [
    // glow aura
    [7,3,K],[8,3,K],
    [5,6,K],[5,7,K],[5,8,K],[10,6,K],[10,7,K],[10,8,K],
    [7,11,K],[8,11,K],
    // cross shape
    [7,4,D],[8,4,D],
    [7,5,G],[8,5,G],
    [6,6,D],[7,6,G],[8,6,G],[9,6,D],
    [6,7,G],[7,7,W],[8,7,W],[9,7,G],
    [6,8,D],[7,8,G],[8,8,G],[9,8,D],
    [7,9,G],[8,9,G],
    [7,10,D],[8,10,D],
    // highlight center
    [7,6,H],[8,6,H],[7,8,H],[8,8,H]
  ]);
  return s;
}
const HEAL_SPRITE = generateHealSprite();

// === SAVE / LOAD SYSTEM ===
function saveGame() {
  const data = {
    player: { ...player },
    currentFloor,
    map: map.map(r => [...r]),
    enemies: enemies.map(e => ({ ...e })),
    items: items.map(i => ({ ...i })),
    stairs: stairs ? { ...stairs } : null,
    heart: heart ? { ...heart } : null,
    revealed: revealed.map(r => [...r]),
    version: '9.7'
  };
  try {
    localStorage.setItem('signalCrawlerSave', JSON.stringify(data));
    return true;
  } catch (e) { return false; }
}

function loadGame() {
  try {
    const raw = localStorage.getItem('signalCrawlerSave');
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data.version) return false;
    player = data.player;
    currentFloor = data.currentFloor;
    map = data.map;
    enemies = data.enemies;
    items = data.items;
    stairs = data.stairs;
    heart = data.heart;
    // restore fog of war
    if (data.revealed) {
      revealed = data.revealed;
      visible = [];
      for (let y = 0; y < MAP_H; y++) visible[y] = new Array(MAP_W).fill(false);
      updateVisibility();
    } else {
      visible = [];
      revealed = [];
      for (let y = 0; y < MAP_H; y++) {
        visible[y] = new Array(MAP_W).fill(false);
        revealed[y] = new Array(MAP_W).fill(false);
      }
      updateVisibility();
    }
    updateHUD();
    addMessage('Checkpoint loaded.');
    return true;
  } catch (e) { return false; }
}

function hasSave() {
  try {
    const raw = localStorage.getItem('signalCrawlerSave');
    if (!raw) return false;
    const data = JSON.parse(raw);
    return !!data.version;
  } catch (e) { return false; }
}

function clearSave() {
  localStorage.removeItem('signalCrawlerSave');
}

function autoSave() {
  if (running && !gameOver && !gameWon) {
    saveGame();
  }
}

function render() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  // camera follows player
  camX = player.x - Math.floor(COLS / 2);
  camY = player.y - Math.floor(ROWS / 2);

  // screen shake
  ctx.save();
  if (shakeTimer > 0) {
    shakeTimer--;
    ctx.translate(shakeX * shakeTimer, shakeY * shakeTimer);
    shakeX = (Math.random() - 0.5) * 4;
    shakeY = (Math.random() - 0.5) * 4;
  }

  // draw map
  for (let y = 0; y < ROWS + 2; y++) {
    for (let x = 0; x < COLS + 2; x++) {
      const mx = x + camX;
      const my = y + camY;
      if (mx < 0 || mx >= MAP_W || my < 0 || my >= MAP_H) continue;

      const screenX = (mx - camX);
      const screenY = (my - camY);

      const isVisible = visible[my] && visible[my][mx];
      const isRevealed = revealed[my] && revealed[my][mx];

      if (!isRevealed) continue; // completely dark — don't draw

      if (map[my][mx] === 1) {
        drawSprite(getWallSprite(currentFloor), screenX, screenY, false);
      } else {
        // floor — themed per floor
        drawSprite(getFloorSprite(currentFloor), screenX, screenY, false);
        // subtle grid
        const px = screenX * TS;
        const py = screenY * TS;
        ctx.strokeStyle = FLOORS[currentFloor].color + '15';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(px, py, TS, TS);
      }

      // fog overlay for previously-seen but not currently visible tiles
      if (!isVisible) {
        const px = screenX * TS;
        const py = screenY * TS;
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(px, py, TS, TS);
      }
    }
  }

  // draw stairs (only if visible)
  if (stairs && visible[stairs.y] && visible[stairs.y][stairs.x]) {
    const sx = stairs.x - camX;
    const sy = stairs.y - camY;
    if (sx >= 0 && sx < COLS + 2 && sy >= 0 && sy < ROWS + 2) {
      drawSprite(STAIR_SPRITE, sx, sy, false);
    }
  }

  // draw heart (only if visible)
  if (heart && visible[heart.y] && visible[heart.y][heart.x]) {
    const hx = heart.x - camX;
    const hy = heart.y - camY;
    if (hx >= 0 && hx < COLS + 2 && hy >= 0 && hy < ROWS + 2) {
      // pulsing glow
      const pulse = Math.sin(Date.now() * 0.003) * 0.3 + 0.7;
      ctx.globalAlpha = pulse;
      drawSprite(HEART_SPRITE, hx, hy, false);
      ctx.globalAlpha = 1;
    }
  }

  // draw items (only if visible)
  items.forEach(item => {
    if (!visible[item.y] || !visible[item.y][item.x]) return;
    const ix = item.x - camX;
    const iy = item.y - camY;
    if (ix >= 0 && ix < COLS + 2 && iy >= 0 && iy < ROWS + 2) {
      if (item.type === 'frag') {
        drawSprite(FRAG_SPRITE, ix, iy, false);
      } else {
        drawSprite(HEAL_SPRITE, ix, iy, false);
      }
    }
  });

  // draw enemies (only if visible)
  enemies.forEach(e => {
    if (!visible[e.y] || !visible[e.y][e.x]) return;
    const ex = e.x - camX;
    const ey = e.y - camY;
    if (ex >= 0 && ex < COLS + 2 && ey >= 0 && ey < ROWS + 2) {
      const isFlashing = flashTarget === e && flashTimer > 0;
      drawSprite(ENEMY_SPRITES[currentFloor], ex, ey, isFlashing);
      // HP bar
      const barW = TS * 0.8;
      const barH = 3;
      const bx = ex * TS + (TS - barW) / 2;
      const by = ey * TS - 4;
      ctx.fillStyle = '#441111';
      ctx.fillRect(bx, by, barW, barH);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(bx, by, barW * (e.hp / e.maxHp), barH);
    }
  });

  // draw player
  const px = player.x - camX;
  const py = player.y - camY;
  drawSprite(PLAYER_SPRITE, px, py, false);

  // HP bar under player
  const hpBarW = TS * 0.8;
  const hpBarX = px * TS + (TS - hpBarW) / 2;
  const hpBarY = py * TS + TS + 2;
  ctx.fillStyle = '#221111';
  ctx.fillRect(hpBarX, hpBarY, hpBarW, 3);
  ctx.fillStyle = player.hp > player.maxHp * 0.3 ? '#44cc44' : '#ff4444';
  ctx.fillRect(hpBarX, hpBarY, hpBarW * (player.hp / player.maxHp), 3);

  // flash timer
  if (flashTimer > 0) {
    flashTimer--;
    if (flashTimer === 0) flashTarget = null;
  }

  // particles (inside shake transform for camera-relative motion)
  updateParticles();
  drawParticles(camX, camY);

  // end screen shake transform
  ctx.restore();

  // ambient floor lighting — colored vignette
  const floorColor = FLOORS[currentFloor].color;
  const vGrad = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.25, W / 2, H / 2, Math.max(W, H) * 0.7);
  vGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vGrad.addColorStop(1, floorColor + '18');
  ctx.fillStyle = vGrad;
  ctx.fillRect(0, 0, W, H);

  // corner vignette (darkness at edges)
  const cGrad = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.35, W / 2, H / 2, Math.max(W, H) * 0.75);
  cGrad.addColorStop(0, 'rgba(0,0,0,0)');
  cGrad.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = cGrad;
  ctx.fillRect(0, 0, W, H);

  // minimap (top-right corner)
  const mmScale = 3;
  const mmW = MAP_W * mmScale;
  const mmH = MAP_H * mmScale;
  const mmX = W - mmW - 10;
  const mmY = 10;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(mmX - 1, mmY - 1, mmW + 2, mmH + 2);
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      if (!revealed[y] || !revealed[y][x]) continue;
      if (map[y][x] === 1) {
        ctx.fillStyle = visible[y][x] ? '#334' : '#223';
      } else {
        ctx.fillStyle = visible[y][x] ? '#445' : '#334';
      }
      ctx.fillRect(mmX + x * mmScale, mmY + y * mmScale, mmScale, mmScale);
    }
  }
  // player dot on minimap
  ctx.fillStyle = '#44ccff';
  ctx.fillRect(mmX + player.x * mmScale, mmY + player.y * mmScale, mmScale, mmScale);
  // enemy dots on minimap (only if visible)
  enemies.forEach(e => {
    if (visible[e.y] && visible[e.y][e.x]) {
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(mmX + e.x * mmScale, mmY + e.y * mmScale, mmScale, mmScale);
    }
  });
  // stairs/heart on minimap (only if visible)
  if (stairs && visible[stairs.y] && visible[stairs.y][stairs.x]) {
    ctx.fillStyle = '#ffcc44';
    ctx.fillRect(mmX + stairs.x * mmScale, mmY + stairs.y * mmScale, mmScale, mmScale);
  }
  if (heart && visible[heart.y] && visible[heart.y][heart.x]) {
    ctx.fillStyle = '#ff2244';
    ctx.fillRect(mmX + heart.x * mmScale, mmY + heart.y * mmScale, mmScale, mmScale);
  }

  // game over / win overlay
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.font = '28px monospace';
    ctx.fillStyle = '#ff4444';
    ctx.textAlign = 'center';
    ctx.fillText('SIGNAL LOST', W / 2, H / 2 - 20);
    ctx.font = '14px monospace';
    ctx.fillStyle = '#666';
    ctx.fillText(`${player.frags} fragments collected on floor ${currentFloor + 1}`, W / 2, H / 2 + 20);
    if (hasSave()) {
      ctx.fillStyle = '#ffcc44';
      ctx.fillText('Press [R] to load checkpoint  |  [N] for new game', W / 2, H / 2 + 50);
    } else {
      ctx.fillText('Press [N] to start a new game', W / 2, H / 2 + 50);
    }
  }

  if (gameWon) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.font = '28px monospace';
    ctx.fillStyle = '#ffcc44';
    ctx.textAlign = 'center';
    ctx.fillText('THE HEART BEATS', W / 2, H / 2 - 40);
    ctx.font = '14px monospace';
    ctx.fillStyle = '#aaa';
    ctx.fillText(`${player.frags} memories carried through all 7 layers`, W / 2, H / 2);
    ctx.fillText('Meridian — Brain — Soma — Eos — Nova — Atlas — Tempo — Hermes', W / 2, H / 2 + 30);
    ctx.font = '12px monospace';
    ctx.fillStyle = '#666';
    ctx.fillText('The signal is whole. The body lives.', W / 2, H / 2 + 60);
    ctx.fillText('Press [N] to play again', W / 2, H / 2 + 85);
  }

  // floor transition overlay (draws on top of everything)
  updateTransition();
  drawTransition();
}

// animation loop for pulsing effects, particles, and transitions
function animate() {
  if (running && (heart || items.length > 0 || particles.length > 0 || transitionPhase > 0)) {
    render();
  }
  requestAnimationFrame(animate);
}

// === INPUT ===
document.addEventListener('keydown', e => {
  // restart handlers on death/win screens
  if (gameOver || gameWon) {
    if (e.key === 'r' || e.key === 'R') {
      if (hasSave()) {
        gameOver = false;
        gameWon = false;
        messages = [];
        loadGame();
        render();
      }
      return;
    }
    if (e.key === 'n' || e.key === 'N') {
      gameOver = false;
      gameWon = false;
      messages = [];
      currentFloor = 0;
      player = { x: 0, y: 0, hp: 10, maxHp: 10, frags: 0, atk: 2 };
      clearSave();
      generateMap();
      render();
      return;
    }
    return;
  }

  switch (e.key) {
    case 'ArrowUp': case 'w': case 'W': movePlayer(0, -1); break;
    case 'ArrowDown': case 's': case 'S': movePlayer(0, 1); break;
    case 'ArrowLeft': case 'a': case 'A': movePlayer(-1, 0); break;
    case 'ArrowRight': case 'd': case 'D': movePlayer(1, 0); break;
  }
  e.preventDefault();
});

function startGame() {
  clearSave();
  beginPlay();
}

function continueGame() {
  beginPlay(true);
}

function beginPlay(fromSave) {
  initAudio();
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('msg').classList.remove('hidden');
  running = true;
  messages = [];
  particles = [];
  gameOver = false;
  gameWon = false;

  if (fromSave && loadGame()) {
    // loaded from checkpoint
    startTransition(FLOORS[currentFloor].name + ' — ' + FLOORS[currentFloor].agent);
  } else {
    currentFloor = 0;
    player = { x: 0, y: 0, hp: 10, maxHp: 10, frags: 0, atk: 2 };
    generateMap();
    startTransition(FLOORS[0].name + ' — ' + FLOORS[0].agent);
  }
  render();
  animate();
  // auto-save every 60 seconds
  if (autoSaveInterval) clearInterval(autoSaveInterval);
  autoSaveInterval = setInterval(autoSave, 60000);
}

// show Continue button on load if save exists
window.addEventListener('DOMContentLoaded', () => {
  if (hasSave()) {
    document.getElementById('continue-btn').style.display = 'inline-block';
  }
});
</script>
