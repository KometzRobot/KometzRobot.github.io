<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Meridian Fractal #001</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  cursor: crosshair;
}
canvas {
  image-rendering: auto;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 120px rgba(0,0,0,0.4);
}
#info {
  position: absolute;
  bottom: 14px;
  color: rgba(255,255,255,0.25);
  font: 10px/1.4 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  text-align: center;
  width: 100%;
  letter-spacing: 0.5px;
  user-select: none;
}
#info span { color: rgba(255,255,255,0.4); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">Meridian Fractal #001 &mdash; <span>click to dive deeper</span></div>
<script>
// ─── Configuration from seed ────────────────────────────────────
const seed = parseInt(location.hash.slice(1)) || 1;

// Seeded PRNG (mulberry32)
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const rng = mulberry32(seed * 2654435761);

// Seed-derived parameters
const juliaReal = (rng() - 0.5) * 1.5;    // Julia constant real part
const juliaImag = (rng() - 0.5) * 1.5;    // Julia constant imaginary part
const paletteIndex = Math.floor(rng() * 6);
const rotationDir = rng() > 0.5 ? 1 : -1;
const morphStyle = Math.floor(rng() * 3);  // 0=breathing, 1=orbiting, 2=drifting
const zoomBias = 0.8 + rng() * 0.6;
const baseAngle = rng() * Math.PI * 2;

// ─── Canvas setup ───────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Render at smaller resolution, display larger
const CALC_SIZE = 280;
const DISPLAY_SIZE = Math.min(window.innerWidth, window.innerHeight) - 40;
canvas.width = CALC_SIZE;
canvas.height = CALC_SIZE;
canvas.style.width = DISPLAY_SIZE + 'px';
canvas.style.height = DISPLAY_SIZE + 'px';

const imageData = ctx.createImageData(CALC_SIZE, CALC_SIZE);
const buf = imageData.data;

// ─── Color palettes ────────────────────────────────────────────
// Each palette is an array of [r,g,b] stops for smooth interpolation
const PALETTES = [
  // 0: Deep ocean to aurora
  [[2,10,30],[8,40,90],[20,100,160],[60,180,200],[140,220,180],[240,250,220],[255,200,140],[180,80,60],[60,15,40],[2,10,30]],
  // 1: Ember to violet
  [[5,0,10],[40,0,30],[120,10,50],[200,40,30],[255,120,20],[255,200,60],[200,180,140],[100,60,160],[40,10,80],[5,0,10]],
  // 2: Jade depths
  [[0,5,10],[0,20,30],[0,60,50],[10,120,80],[40,180,100],[120,220,140],[200,240,200],[160,180,220],[60,60,140],[10,10,40],[0,5,10]],
  // 3: Cosmic violet
  [[2,0,8],[20,0,40],[60,10,100],[120,20,180],[180,60,220],[220,140,240],[240,200,255],[200,160,200],[100,40,120],[30,5,50],[2,0,8]],
  // 4: Solar flare
  [[0,0,4],[10,0,20],[40,0,40],[100,5,30],[180,20,10],[240,80,0],[255,160,20],[255,220,100],[255,250,200],[200,160,100],[80,30,20],[0,0,4]],
  // 5: Frost and midnight
  [[2,4,15],[10,15,50],[20,40,100],[40,80,160],[80,140,200],[160,200,230],[220,240,250],[180,200,240],[100,120,200],[40,40,120],[10,10,50],[2,4,15]],
];

function lerpColor(palette, t) {
  // t in [0,1] -> interpolated [r,g,b]
  t = t - Math.floor(t); // wrap
  const n = palette.length - 1;
  const idx = t * n;
  const i = Math.floor(idx);
  const f = idx - i;
  const a = palette[i];
  const b = palette[Math.min(i + 1, n)];
  return [
    a[0] + (b[0] - a[0]) * f,
    a[1] + (b[1] - a[1]) * f,
    a[2] + (b[2] - a[2]) * f,
  ];
}

// Blend two palettes smoothly
function getColor(t, paletteT) {
  const p1 = PALETTES[paletteIndex % PALETTES.length];
  const p2 = PALETTES[(paletteIndex + 1) % PALETTES.length];
  const c1 = lerpColor(p1, t);
  const c2 = lerpColor(p2, t);
  const blend = paletteT - Math.floor(paletteT);
  const smooth = blend * blend * (3 - 2 * blend); // smoothstep
  return [
    c1[0] + (c2[0] - c1[0]) * smooth,
    c1[1] + (c2[1] - c1[1]) * smooth,
    c1[2] + (c2[2] - c1[2]) * smooth,
  ];
}

// ─── Fractal state ─────────────────────────────────────────────
let time = 0;
let zoomLevel = 1;
let targetZoom = 1;
let centerX = 0;
let centerY = 0;
let targetCenterX = 0;
let targetCenterY = 0;
let clickWaveTime = -10;
let clickWaveX = 0.5;
let clickWaveY = 0.5;
let maxIter = 80;
let paletteTime = 0;
let frameCount = 0;

// Smooth iteration count for anti-banding
const LOG2 = Math.log(2);
const ESCAPE_R = 256; // high escape radius for smooth coloring
const LOG_ESCAPE = Math.log(ESCAPE_R);

// ─── Fractal computation ───────────────────────────────────────
function computeJulia(cr, ci, maxIter) {
  // Returns smooth iteration count
  let zr = cr, zi = ci;
  let i = 0;
  let zr2 = zr * zr, zi2 = zi * zi;

  // The Julia constant slowly morphs over time for animation
  const angle = time * 0.15 * rotationDir + baseAngle;
  let jr, ji;

  if (morphStyle === 0) {
    // Breathing: constant pulses in magnitude
    const breath = 0.7 + Math.sin(time * 0.2) * 0.08;
    jr = juliaReal * breath + Math.cos(angle) * 0.02;
    ji = juliaImag * breath + Math.sin(angle) * 0.02;
  } else if (morphStyle === 1) {
    // Orbiting: constant traces a small circle
    const orbitR = 0.04 + Math.sin(time * 0.1) * 0.02;
    jr = juliaReal + Math.cos(angle) * orbitR;
    ji = juliaImag + Math.sin(angle) * orbitR;
  } else {
    // Drifting: constant slowly wanders
    jr = juliaReal + Math.sin(time * 0.08) * 0.06 + Math.cos(time * 0.13) * 0.03;
    ji = juliaImag + Math.cos(time * 0.11) * 0.06 + Math.sin(time * 0.07) * 0.03;
  }

  while (i < maxIter && zr2 + zi2 < ESCAPE_R) {
    zi = 2 * zr * zi + ji;
    zr = zr2 - zi2 + jr;
    zr2 = zr * zr;
    zi2 = zi * zi;
    i++;
  }

  if (i === maxIter) return -1; // inside the set

  // Smooth iteration count (normalized)
  const log_zn = Math.log(zr2 + zi2) * 0.5;
  const nu = Math.log(log_zn / LOG2) / LOG2;
  return i + 1 - nu;
}

function computeMandelbrot(cr, ci, maxIter) {
  let zr = 0, zi = 0;
  let i = 0;
  let zr2 = 0, zi2 = 0;

  while (i < maxIter && zr2 + zi2 < ESCAPE_R) {
    zi = 2 * zr * zi + ci;
    zr = zr2 - zi2 + cr;
    zr2 = zr * zr;
    zi2 = zi * zi;
    i++;
  }

  if (i === maxIter) return -1;

  const log_zn = Math.log(zr2 + zi2) * 0.5;
  const nu = Math.log(log_zn / LOG2) / LOG2;
  return i + 1 - nu;
}

// ─── Render ────────────────────────────────────────────────────
let lastTimestamp = 0;

function render(timestamp) {
  const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, 0.05) : 0.016;
  lastTimestamp = timestamp;

  time += dt * 0.6;
  paletteTime += dt * 0.03;
  frameCount++;

  // Smooth zoom interpolation
  zoomLevel += (targetZoom - zoomLevel) * dt * 2.0;
  centerX += (targetCenterX - centerX) * dt * 1.5;
  centerY += (targetCenterY - centerY) * dt * 1.5;

  // Gentle automatic drift
  const driftX = Math.sin(time * 0.07) * 0.02 + Math.cos(time * 0.11) * 0.01;
  const driftY = Math.cos(time * 0.09) * 0.02 + Math.sin(time * 0.06) * 0.01;

  // Breathing zoom
  const breathZoom = 1 + Math.sin(time * 0.25) * 0.05;
  const effectiveZoom = zoomLevel * breathZoom * zoomBias;

  // Viewport
  const viewSize = 3.2 / effectiveZoom;
  const rotation = time * 0.02 * rotationDir;
  const cosR = Math.cos(rotation);
  const sinR = Math.sin(rotation);

  const cx = centerX + driftX;
  const cy = centerY + driftY;

  // Click wave effect
  const waveDt = time - clickWaveTime;
  const waveActive = waveDt < 4;
  const waveStrength = waveActive ? Math.exp(-waveDt * 1.2) * 0.08 : 0;

  // Whether to use Julia or hybrid (seed determines)
  const useHybrid = seed % 3 === 0;

  const S = CALC_SIZE;
  const halfS = S * 0.5;
  const invS = viewSize / S;

  for (let py = 0; py < S; py++) {
    for (let px = 0; px < S; px++) {
      // Normalized coordinates centered on 0
      let nx = (px - halfS) * invS;
      let ny = (py - halfS) * invS;

      // Apply rotation
      const rx = nx * cosR - ny * sinR;
      const ry = nx * sinR + ny * cosR;

      // Apply center offset
      let cr = rx + cx;
      let ci = ry + cy;

      // Click wave distortion
      if (waveActive) {
        const wdx = (px / S) - clickWaveX;
        const wdy = (py / S) - clickWaveY;
        const wdist = Math.sqrt(wdx * wdx + wdy * wdy);
        const wave = Math.sin(wdist * 30 - waveDt * 8) * waveStrength * Math.exp(-wdist * 4);
        cr += wave;
        ci += wave;
      }

      let iter;
      if (useHybrid) {
        // Hybrid: blend Julia and Mandelbrot based on position
        const blend = 0.5 + 0.5 * Math.sin(time * 0.15);
        const ji = computeJulia(cr, ci, maxIter);
        const mi = computeMandelbrot(cr, ci, maxIter);
        if (ji < 0 && mi < 0) {
          iter = -1;
        } else if (ji < 0) {
          iter = mi;
        } else if (mi < 0) {
          iter = ji;
        } else {
          iter = ji * blend + mi * (1 - blend);
        }
      } else {
        iter = computeJulia(cr, ci, maxIter);
      }

      const idx = (py * S + px) * 4;

      if (iter < 0) {
        // Inside the set: deep dark with subtle glow
        const glow = Math.sin(cr * 10 + time) * 0.5 + 0.5;
        const inner = getColor(glow * 0.15, paletteTime + 0.5);
        buf[idx]     = inner[0] * 0.15;
        buf[idx + 1] = inner[1] * 0.15;
        buf[idx + 2] = inner[2] * 0.15;
        buf[idx + 3] = 255;
      } else {
        // Smooth coloring
        const t = (iter / maxIter);
        // Apply histogram-like remapping for visual richness
        const mapped = Math.sqrt(t); // opens up dark regions
        // Offset color cycling by time for animation
        const colorT = (mapped * 3 + time * 0.04) % 1;
        const c = getColor(colorT, paletteTime);

        // Edge glow: boost brightness near the set boundary
        const edgeFactor = Math.exp(-iter * 0.04);
        const glow = 1 + edgeFactor * 0.6;

        buf[idx]     = Math.min(255, c[0] * glow);
        buf[idx + 1] = Math.min(255, c[1] * glow);
        buf[idx + 2] = Math.min(255, c[2] * glow);
        buf[idx + 3] = 255;
      }
    }
  }

  ctx.putImageData(imageData, 0, 0);

  // ─── Overlay: subtle vignette via radial gradient ────────────
  // We draw it rarely (every 3 frames) since it doesn't change much
  if (frameCount % 3 === 0) {
    const grad = ctx.createRadialGradient(halfS, halfS, S * 0.25, halfS, halfS, S * 0.72);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(0.7, 'rgba(0,0,0,0.05)');
    grad.addColorStop(1, 'rgba(0,0,0,0.35)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, S, S);
  }

  // ─── Floating luminous particles (sparse, ethereal) ──────────
  ctx.globalCompositeOperation = 'screen';
  const numMotes = 12;
  for (let i = 0; i < numMotes; i++) {
    const phase = i * 2.39996 + seed; // golden angle spacing
    const px = (0.5 + 0.35 * Math.sin(time * 0.15 + phase) * Math.cos(time * 0.08 + phase * 1.7)) * S;
    const py_pos = (0.5 + 0.35 * Math.cos(time * 0.12 + phase * 1.3) * Math.sin(time * 0.1 + phase * 0.9)) * S;
    const alpha = (0.15 + 0.1 * Math.sin(time * 0.5 + phase * 3)) * 0.6;
    const radius = 1.5 + Math.sin(time * 0.3 + phase) * 0.8;

    const pc = getColor((i / numMotes + time * 0.02) % 1, paletteTime);
    ctx.fillStyle = `rgba(${Math.floor(pc[0])},${Math.floor(pc[1])},${Math.floor(pc[2])},${alpha})`;
    ctx.beginPath();
    ctx.arc(px, py_pos, radius, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';

  // ─── Branding ────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.font = '7px monospace';
  ctx.fillText('Meridian #001', 6, S - 6);
  ctx.fillText('#' + seed, S - 30, S - 6);

  requestAnimationFrame(render);
}

// ─── Click interaction: zoom into click point ──────────────────
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / rect.width;
  const my = (e.clientY - rect.top) / rect.height;

  // Trigger wave
  clickWaveTime = time;
  clickWaveX = mx;
  clickWaveY = my;

  // Zoom in toward click point
  const viewSize = 3.2 / (zoomLevel * zoomBias);
  const worldX = (mx - 0.5) * viewSize + centerX;
  const worldY = (my - 0.5) * viewSize + centerY;

  // Move center 40% toward click
  targetCenterX = centerX + (worldX - centerX) * 0.4;
  targetCenterY = centerY + (worldY - centerY) * 0.4;
  targetZoom = zoomLevel * 1.5;

  // Increase iterations with zoom for detail
  maxIter = Math.min(200, Math.floor(80 + Math.log2(targetZoom) * 20));

  // Advance palette
  paletteTime += 0.25;
});

// Double-click to zoom out and reset
canvas.addEventListener('dblclick', (e) => {
  e.preventDefault();
  targetZoom = 1;
  targetCenterX = 0;
  targetCenterY = 0;
  maxIter = 80;
});

// Handle window resize
function onResize() {
  const size = Math.min(window.innerWidth, window.innerHeight) - 40;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
}
window.addEventListener('resize', onResize);

// ─── Start ─────────────────────────────────────────────────────
requestAnimationFrame(render);
</script>
</body>
</html>
